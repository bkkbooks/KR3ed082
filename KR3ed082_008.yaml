body:
  text: 卷第八傷寒時疫治太陽中風陽脈浮陰脈弱發熱汗出惡寒按諸本寒作風鼻鳴乾嘔桂枝湯今傷寒古方謂之中風按注九字諸本無桂枝芍藥各一兩半甘草一兩炙上為粗末每服五錢按四字周本作抄五錢水一盞半生薑三片棗一枚同煎至八分去滓溫服若二三月病溫宜陽旦湯釋義桂枝氣味辛溫入足太陽能使風邪達表白芍藥氣味酸微寒入足厥陰能和陰守正甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性此傷寒風邪中太陽而致陽脈浮陰脈弱發熱惡寒鼻鳴乾嘔者以辛甘化其陽酸甘化其陰姜之辛溫泄其衛棗之甘緩泄其榮得微汗出風邪散而衛氣和矣治太陽病頭痛發熱身疼惡風無汗而喘麻黃湯麻黃去節百沸湯煮去黃汁焙乾一兩半桂枝一兩甘草半兩上為粗末每服五錢水一盞半煎至八分去滓溫服加減法並依活人書仲景論傷寒一則桂枝二則麻黃三則青龍桂枝治中風麻黃治傷寒青龍治中風見寒脈傷寒見風脈三者如鼎立人皆能言之而不曉前人處方用藥之意故醫者多不用無足怪也且脈浮而緩者中風也故嗇嗇惡寒淅淅惡風翕翕發熱仲景以桂枝湯對之脈浮緊而澀者傷寒也故頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘仲景以麻黃湯對之至中風脈浮緊傷寒脈浮緩仲景皆以青龍湯對之何也余嘗深究此三者若證候與脈相對用之無不應於手而愈何以言之風傷衛衛氣也寒傷榮榮血也榮行脈中衛行脈外風傷衛則風邪干陽氣按周本干作中陽氣不固則發越為汗是以自汗而表虛故仲景用桂枝以發其邪芍藥以治其血蓋中風則病在脈之外而其病稍輕雖同曰發汗特解肌之藥耳故仲景於桂枝證云令半身漐漐微似有汗者佳不可如水淋漓病必不除是知中風不可大發汗汗過多則反動榮血邪氣乘虛而襲之故病不除也寒傷榮則寒邪入陰血而榮行脈中者也寒邪居脈中非特榮受病邪自內作則並與衛氣犯之久則浸淫及骨是以汗不出而熱齒乾以煩冤仲景以麻黃髮其汗又以桂枝甘草助其發散欲滌除內外之邪榮衛之病耳大抵二藥皆發汗而桂枝則發其衛之邪麻黃並榮衛治之亦自有淺深也何以驗之仲景桂枝第十九證云病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯又第四十九證云發熱汗出者此為榮弱衛強故使汗出欲救邪風宜桂枝湯是知中風汗出者榮和而衛不和也又第一卷云寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗是知傷寒脈浮緊者榮衛俱病也麻黃湯中並用桂枝此仲景之意也至於青龍雖治傷風見寒脈傷寒見風脈之病然仲景云汗出惡風者不可服之服之厥逆便有筋惕肉瞤之證故青龍一湯尤難用按周本湯作症須是形證諦當然後可行故王寔大夫證治止用桂枝麻黃各半湯蓋慎之也釋義麻黃氣味辛溫發散入足太陽桂枝氣味辛溫達表入足太陽甘草氣味甘平入足太陰能緩諸藥之性太陽中寒以致頭痛發熱身疼惡風無汗而喘者寒邪入中太陽非大辛溫之藥不能表散惟恐藥性之猛烈故必以甘緩佐之使藥力恰中病所也桂枝加附子湯前方桂枝湯內加附子半兩如前入薑棗同煎釋義即前桂枝湯也加附子以其氣味辛鹹大熱入手足少陰乃發汗大過而致漏不止惡風小便難四肢微急難以屈伸者是誤汗傷陽惟恐寒邪入陰故必以辛鹹大熱之品理陽兼和榮衛也有一士得太陽病因發汗汗不止惡風小便澀足攣曲而不伸子診其脈浮而大浮為風大為虛子曰在仲景方中有兩證大同而小異一則小便難一則小便數用藥稍差有千里之失仲景第七證云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯第十六證云傷寒脈浮自汗出小便數心煩微惡寒腳攣急反以桂枝湯攻其表此誤也得之便厥咽中干煩躁吐逆一則漏風小便難按周本難作澀一則有汗小便數或惡風或惡寒病各不同也予用第七證桂枝加附子湯三啜而汗止復佐以甘草芍藥湯足便得伸其第十六證治法見本方桂枝加厚朴杏子湯桂枝去皮芍藥各一兩甘草六錢三字厚朴六錢三字杏仁去皮尖十七個上藥銼如麻豆大每服五大錢按五字周本作抄五大錢水一盞半生薑五片肥棗二枚擘破同煎至八分去滓溫服復取微汗釋義桂枝氣味辛溫入足太陽白芍藥氣味酸微寒入足厥陰甘草氣味甘平入足太陰厚朴氣味辛溫入手足太陰杏仁氣味苦溫入手太陰此治太陽病表未解而微喘者表邪不解肺氣壅遏不能下降用苦辛溫之藥使陰濁下行宜其奏功之捷耳戊申正月有一武臣為寇所執置舟中𦪗板下數日得脫歸乘飢恣食良久解衣捫蝨次日遂作傷寒自汗而胸膈不利按周本無胸字一醫作傷寒而下之一醫作解衣中邪而汗之雜治數日漸覺昏困上喘息高醫者愴惶失措予診之曰太陽病下之表未解微喘者桂枝加厚朴杏仁湯此仲景之法也指令醫者急治藥一啜喘定再啜漐漐微汗至晚身涼而脈已和矣醫者曰某平生不曾用仲景方不知神捷如是予曰仲景之法豈誑後人也哉人自寡學無以發明耳大柴胡湯柴胡二兩黃芩芍藥各三分半夏六錢二字按周本二作三枳實二枚炒大黃半兩伊尹湯液論太柴胡同薑棗共八味今監本無大黃或脫之也上為粗末每服五錢按四字周本作抄五錢水一盞半生薑五片肥棗一枚擘破煎至八分去滓溫服以利為度未利又服釋義柴胡氣味辛甘平入足少陽黃芩氣味苦寒入手太陰少陽白芍藥氣味酸微寒入足厥陰半夏氣味辛溫入足陽明枳實氣味苦寒入足太陰大黃氣味苦寒入足陽明有斬關奪門之能姜之辛以和衛棗之甘以和榮此傷寒風邪不解內結在裡往來寒熱脈洪大者三焦皆被無形之邪矇混非升散之藥兼以下奪豈能一旦掃除哉嘗記有人病傷寒必先喜嘔按周本作心煩喜嘔後來寒熱醫以小柴胡與之不除予曰脈洪大而實熱結在裡小柴胡安能去之仲景云傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯三服而病除蓋大黃盪滌蘊熱傷寒中要藥也王叔和云若不用大黃何以名大柴胡按何以周本作即不大黃不須酒洗按周本作須是酒洗生用為有力昔後周姚僧坦按諸本俱作坦考北史本傳作垣後仕北周而此則在梁時事名醫也帝因發熱欲服大黃藥僧坦曰大黃乃是快藥至尊年高不宜輕用帝不從服之遂至不起及元帝有疾諸醫皆謂至尊至貴不可輕服宜用平藥僧坦曰脈洪而實必有宿食不用大黃必無瘥理元帝從之果下宿食而愈合用與不合用必心下明瞭諦當然後可又記有人病傷寒身熱目痛鼻乾不得臥大便不通尺寸脈俱大已數日一夕汗出予謂速以大柴胡下之醫者駭曰陽明自汗津液已漏法當行蜜兌何苦須用大黃藥予謂曰子只知抱穩若用大柴胡此仲景不傳之妙法公安能知之予力爭竟用大柴胡二服而愈仲景論陽明病多汗者急下之人多謂已是自汗若更下之豈不表里俱虛又知論少陰證云少陰病一二日口乾燥者急下之人多謂病發於陰得之日淺但見乾燥若更下之豈不陰氣愈盛舉此二者則其他疑惑處不可勝數此仲景之書世人罕讀也予以為不然仲景稱急下者亦猶急當救表急當救里凡稱急者有三處謂才覺汗多未至津液乾燥便速下之則為徑捷免致用蜜兌也若胸中識得了了方可無疑若未能了了誤用之反不若蜜兌為穩也又記一鄉人傷寒身熱大便不通煩渴鬱冒醫者用巴豆藥下之頃得溏利病宛然如舊予視之陽明熱結在裡非大柴胡承氣等不可巴豆止去積安能盪滌邪熱蘊毒邪急進大柴胡等三服得汗而解嘗謂仲景一百一十三方為圓者有五如理中陷胸抵當烏梅麻仁是已但理中陷胸抵當皆大彈子煮化而服與湯散無異至於麻仁治脾約烏梅治濕䘌皆用小圓以達下部其他逐邪毒攻堅癖導瘀血潤燥屎之類按周本攻作破皆憑湯劑未聞用已豆小圓藥以下邪氣也既下而病不除不免重以大黃朴硝下之安能無損也哉治濕溫多汗白虎加蒼朮湯知母六兩甘草炙二兩石膏生一斤按諸本無生字蒼朮白粳米各三兩上藥銼如麻豆大每服四大錢水一盞半煎至八分去滓取六分清汁溫服釋義知母氣味苦寒入足陽明甘草氣味甘平入足太陰石膏氣味辛寒入手太陰足陽明蒼朮氣味苦辛溫入足太陰白粳米氣味甘平入手足太陰此治暑濕相搏而為濕溫病者以苦寒辛寒之藥清其暑以辛溫雄烈之藥燥其濕而以甘平之藥緩其中則賊邪正邪皆卻病自安矣癸丑年故人王彥龍作毗陵推官季夏得疾胸項多汗兩足逆冷譫語醫者不曉雜進藥已經旬日予診之其脈關前濡關後數予曰當作濕溫治蓋先受暑後受濕暑濕相搏是名濕溫先以白虎加人參湯次以白虎加蒼朮湯頭痛漸退足漸溫汗漸止三日愈此病名賊邪誤用藥有死之理一醫難曰何名賊邪予曰難經論五邪有實邪虛邪正邪微邪賊邪從後來者為虛邪從前來者為實邪從所不勝者為賊邪從所勝者為微邪自病者為正邪又曰假令心病中暑為正邪中濕得之為賊邪今心先受暑而濕邪勝之是水剋火從所不勝斯謂之賊邪此五邪之中最逆也難經又云濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也故經曰暑濕相搏名曰濕溫是謂賊邪不特此也予素有停飲之疾每至暑月兩足汗漐漐未嘗干每服此藥二三盞即便愈黃耆建中加當歸湯黃耆當歸各一兩半白芍藥三兩桂枝一兩一分甘草一兩上為粗末每服五錢生薑三片棗一枚擘去核水一盞半同煎至八分去滓取七分清汁日三服夜二服尺脈尚遲再作一劑釋義黃耆氣味甘平入手足太陰當歸氣味辛甘微溫入手足少陰足厥陰白芍藥氣味酸微寒入足厥陰桂枝氣味辛溫入足太陽甘草氣味甘平入足太陰薑棗之辛甘和榮衛此建中湯也以之治傷寒頭疼煩渴脈浮數而無力尺以下遲而弱者未可表散發汗故也司是術者當細心斟酌焉昔有鄉人邱生者病傷寒予為診視發熱頭疼煩渴脈雖浮數而無力尺以下遲而弱予曰雖屬麻黃證而尺脈遲弱仲景云尺中遲者榮氣不足血氣微少未可發汗予於建中湯加當歸黃耆令飲翌日脈尚爾其家煎迫日夜督與發汗藥去按督與周本作促幾不遜矣予忍之但只用建中調榮而已至五日尺部方應遂投麻黃湯啜至第二服發狂須臾稍定略睡已得汗矣信知此事是大難事按四字周本作是難是難仲景雖云不避晨夜即宜便治然醫者亦須顧其表裡虛實待其時日若不循次第即暫時得安虧損五臟以促壽限何足貴也南史記範云初為梁武帝屬官武帝有九錫之命在旦夕矣云忽感傷寒之疾恐不得預慶事召徐文伯診視以實懇之曰可得便愈乎文伯曰便瘥甚易只恐二年後不復起耳云曰朝聞道夕死猶可況二年乎文伯以火燒地布桃葉按周本作桃柏葉設席置云於上頃刻汗解裹以溫粉按周本裹作貙坊本作撲翌日遂愈云甚喜文伯曰不足喜也後二年果卒夫取汗先期尚促壽限況不顧表裡不待時日但欲速效乎每見病家不耐病未及三四日晝夜促汗醫者隨情順意鮮不敗事故予書此為醫者之戒蜜兌法必用方中制度甚詳釋義蜂蜜氣味甘平入手少陰厥陰陽明傷寒自汗大便不通小便利津液少口乾燥其脈大而虛未可湯藥盪滌而用此法效驗尤速何者以發熱大汗之後恐更傷津液耳有一士人家病者二人皆旬日矣一則身熱無汗按周本無作發大便不通小便如澀按周本澀作經坊本作金神昏如睡診其脈長大而實按周本實作虛予用小承氣湯下之而愈按小承氣之小諸本俱無一則陽明自汗大便不通小便利津少口燥其脈亦大而虛予作蜜兌三易之下燥屎得溏利而解其家問曰皆陽明大便不通何治之異予曰二症雖相似然自汗小便利者不可盪滌五臟為無津液也然則傷寒大證相似兩證稍有不同者按周本兩作與要在變通仔細斟酌正如格局看命雖年月日時皆同而貴賤窮通不相侔者於一時之中又有淺深故治法不可不謹治陰中伏陽破陰丹硫黃水銀各一兩陳皮青皮去白各半兩為末上先將硫黃置銚子內熔化次下水銀用鐵杖子打勻令無星傾入黑茶盞內研細入下二味勻研用厚麵糊圓按周本面作麩如桐子大每服三十圓如煩躁冷鹽湯下如陰證冷艾湯下釋義硫黃氣味辛大熱入命門水銀氣味辛寒能行九竅伏五金為泥陳皮氣味苦辛微溫入手足太陰青皮氣味辛酸平入足少陽厥陰厚麵糊圓緩其藥性也此陰中伏陽之證冷熱皆在難投故以冷湯送藥排闥直入則所伏之陽得透自必汗出而解矣今之司是術者宜潛心體察焉頃年鄉人李信道得疾六脈沉不見深按至骨則若有力按周本若字作弦緊頭疼身溫煩躁指末皆冷中滿噁心兩更醫矣醫皆不識止供調氣藥予因診視曰此陰中伏陽也仲景法中無此證世人患此者多若用熱藥以助之則為陰邪隔絕不能導引真陽反生客熱若用冷藥則所伏真火俞見消灼須用破散陰氣導達真火之藥使火升水降然後得汗而解予授此藥二百粒作一服冷鹽湯下不半時煩躁狂熱手足躁擾按周本躁作燥其家大驚予曰此俗所謂換陽也無恐須臾稍定略睡已是汗矣自昏達旦方止身涼而病除治婦人室女傷寒發熱或發寒熱經水適來或適斷晝則明瞭夜則譫語按周本譫多作嚴如見鬼狀亦治產後惡露方來忽爾斷絕小柴胡加地黃湯柴胡一兩一分人參半夏湯洗七次黃芩甘草生乾地黃各半兩按周本無干字上為粗末每服五錢水二盞生薑五片棗二枚擘去核同煎至八分去滓溫服釋義柴胡氣味辛甘平入足少陽人參氣味甘溫入足陽明半夏氣味辛溫入足陽明黃芩氣味苦寒入手太陰少陽甘草氣味甘平入足太陰能緩諸藥之性生乾地黃氣味甘苦微寒入手足少陰厥陰薑棗之辛甘入榮衛婦人病傷寒或發寒熱經水適來適斷晝則明瞭夜則譫語如見鬼狀謂之熱入血室外邪已入血分更恐其深入至陰之處故用小柴胡湯加生地以涼其血分則熱緩而神安矣辛亥間寓居毗陵學官王仲禮其妹病傷寒發寒熱遇夜則如有鬼物所憑六七日忽昏塞涎響如引鋸牙關緊急瞑目不知人疾勢極危召予視之予曰得病之初曾值月經來否其家云月經方來病作而經遂止得一二日即發寒熱晝雖靜夜則有鬼祟從昨日來涎生不省人事予曰此熱入血室之症也仲景云婦人中風發熱惡寒經水適來晝則明瞭暮則譫語如見鬼狀發作有時此各熱入血室醫者不曉以剛劑與之遂致胸膈不利涎潮上脘按周本脘作管喘急息高昏冒不知人當先化其涎後除其熱予急以一呷散投之兩時頃涎下得睡即省人事次以小柴胡加地黃湯三服而熱除不汗而自解矣又記一婦人患熱入血室症醫者不識用補血調氣藥遷延數日按周本遷延作涵養遂成血結胸或勸用前藥予曰小柴胡用已遲不可行也無已則有一焉刺期門穴斯可矣但予不能針請善針者治之如言而愈或問曰熱入血室何為而成結胸也予曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷時邪氣乘虛而入血室血為邪迫上入肝經肝受邪則譫語而見鬼後入膻中則血結於胸也何以言之婦人平居水當養於木血當養於肝也方未受孕則下行之以為月水既妊娠則中畜之以養胎及已產則上壅之以為乳皆血也今邪氣逐血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故當刺期門也活人書海蛤散治結胸證今具於後婦人傷寒血結胸膈揉而痛不可撫近海蛤散海蛤滑石甘草各一兩芒消半兩按周本消作硝上為細末每服二錢雞子清調下釋義海蛤氣味鹹平入足厥陰滑石氣味甘涼淡滲入手太陰太陽陽明甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性芒消氣味鹹寒入手足太陽陽明厥陰能引藥直達下焦凡婦人傷寒邪氣併入血分血結在裡胸膈痛不可按者由乎小腸不通膻中血聚氣機不得流行故藥用鹹味以雞子清調送亦取咸能潤下之意以咸能入血咸能軟堅也小腸通利則胸膈血散膻中血聚則小腸壅小腸壅則膻中血不流行宜此方若小便血數行更宜桂枝紅花湯發其汗則愈活人書云此方疑非仲景方然其言頗有理姑存之治太陽病汗過不解頭眩筋惕肉瞤真武湯茯苓芍藥各三分按周本作各三兩熟附子一枚生白朮半兩加減法從本方上為粗末每服五錢按四字周本作抄五錢生薑五片水一盞半煎至八分去滓溫服日三服釋義茯苓氣味甘平淡滲入足陽明能引藥入於至陰之地白芍藥氣味酸微寒入足厥陰能和陽益陰附子氣味辛鹹大熱入手足少陰能換回陽氣白朮氣味甘溫微苦入足太陰能止汗固表生薑氣味辛溫入手足太陰能引藥達表此因傷寒太陽病身熱微汗脈弱惡風誤投表汗之藥致汗不止變見諸症者非此不能救若得陽回表固神識漸安再商善後之計耳鄉里有姓京者以鬻繩為業子年三十初得病身微汗脈弱惡風醫以麻黃湯與之汗遂不止發熱心多驚悸夜不得眠譫語不識人筋惕肉瞤振振動搖醫者進驚風藥予曰此強汗之過也仲景云脈微弱汗出惡風者不可服青龍湯服之則筋惕肉瞤此為逆也惟真武湯可救連進三服繼以清心圓竹葉湯送下按二字周本無數日遂愈白虎加人參湯方見活人書第六十五證有一人病初嘔吐俄為醫者下之已七八日而內蒸發熱予診之曰當用白虎加人參湯或曰既吐復下且重虛矣白虎可用乎予曰仲景云若吐下後七八日不解熱結在裡表裡俱熱者白虎加人參湯此正相當也蓋始吐者熱在胃脘而脈至今虛且大按周本虛且作虛虛遂三投白虎湯而愈仲景既稱傷寒若吐下後七八日不解熱結在裡表裡俱熱者白虎加人參湯主之又云傷寒脈浮發熱無汗其表不解不可與白虎湯又云傷寒脈浮滑此以表有熱里有寒白虎湯主之國朝林億校正謂仲景於此表裡自差矣予謂不然大抵白虎湯能治傷寒中暍表裡發熱故前後二證或云表裡俱熱或云表熱裡寒皆可服之中一證脈浮無汗其表不解全是麻黃與葛根證安可行白虎湯也林億但見所稱表裡不同便謂之差誤是亦不思之過也釋義石膏氣味辛寒入手太陰足陽明知母氣味苦寒入足陽明甘草氣味甘平入足太陰能緩諸藥之性白粳米氣味甘平入手足太陰人參氣味甘溫入足陽明此方治傷寒中暍表裡皆熱煩渴欲飲脈象反虛者惟恐日久津傷故必用此藥以救胃陰只要審病察脈用之的當耳治傷寒汗後吃噫肉豆蔻湯肉豆蔻一個石蓮肉炒茴香各一分丁香半分人參半兩枇杷葉五片刷去毛炙按諸本炙俱作尖上藥銼為細末用水四盞生薑十片煎至二盞去滓空心溫分二服釋義肉豆蔻氣味辛溫入足太陰陽明石蓮肉氣味甘平微澀入足太陰少陰茴香氣味辛溫入足厥陰丁香氣味辛溫入足陽明枇杷葉氣味苦平入手太陰足陽明最能下氣生薑氣味辛溫而散入手足太陰傷寒汗出太過致胃氣不下降吃噫不止者此陽傷於外濁逆於內也以辛溫兼澀兼通之藥佐以甘溫守中苦平下氣之品使升降和平則用藥之能事畢矣良薑湯橘皮良薑桂枝當歸各一分麻黃半分按周本注半兩杏仁二十個甘草一分檳榔三個另為末上為粗末用水四盞姜十片棗三枚擘去核同煎至二盞去滓後下檳榔末更煎三四沸通口服一盞未已再作一劑釋義橘皮氣味苦辛微溫入手足太陰良薑氣味辛溫入足厥陰桂枝氣味辛甘溫入足太陽當歸氣味辛微溫入足厥陰麻黃氣味辛微溫發散入足太陽杏仁氣味苦溫入手太陰能下氣甘草氣味甘平入足太陰檳榔氣味辛溫下氣入足太陰太陽薑棗之甘平入榮衛因傷寒汗後吃噫不止升降不和胃氣上逆者此方主之效驗極多不過和平其升降也龐老云傷寒吃噫不止是陰陽二氣升降按周本無二字欲作汗升之不止故胃氣上逆為吃噫無休止宜用此方又方枳殼半兩木香一錢上為細末每服一錢白湯調下未知覺再與服釋義枳殼氣味苦寒入足太陰木香氣味辛溫入足大陰此二味乃苦辛泄降之藥也發汗後而致胃氣逆而不下今治在脾所謂臟病治其腑臟病治其臟也治傷寒衄血滑石圓周本圓作湯飛滑石飛淨為末不拘多少米飯糊圓如桐子大每服二十圓按周本作十圓微嚼破新汲水嚥下立止只用末一大錢飯少許同嚼下亦得老幼皆可服釋義滑石氣味甘涼淡滲入手太陰太陽陽明米飯糊圓按本文米飯此作米飲疑可從欲藥性之在上也此傷寒當汗不汗以致鼻衄不止若再表汗恐犯衄家不發汗之例故以平淡之藥治之得衄緩再斟酌耳湯晦叔云鼻衄者當汗不汗所致其血紫黑按周本紫作青不以多少不可止之按八字周本作多時不已少乃得止宜服溫和藥以調其榮衛才見鮮血急以此藥止之桂枝湯方在前有人病發熱惡寒自汗脈浮而微弱三服此湯而愈此方在仲景一百一十三方內獨冠其首今人全不用何哉按周本何作苦仲景云太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱宜桂枝湯此脈與證仲景說得甚分明止是人看不透所以不敢用仲景又云假令寸口脈弱名曰陽不足陰氣上入陽中則灑淅惡寒也尺脈弱名曰陰不足陽氣下陷入陰中則發熱也此謂元受病而然也又曰陽微則惡寒陰弱則發熱醫發其汗使陽氣微又大下之令陰氣弱此謂醫所病而然也大抵陰不足陽往從之故內陷而發熱陽不足陰往乘之故陰上入陽中則惡寒舉此二端甚是明白人何憚而不行桂枝哉治胃中有熱有濕有宿谷相搏發黃茵陳蒿湯茵陳蒿嫩者一兩半大黃三分梔子小者十枚上為粗末每服一錢水一盞半煎至八分去滓調五苓散二錢服以知為度釋義茵陳蒿氣味苦平微寒入足太陽太陰大黃氣味苦寒入足陽明梔子氣味苦寒入手少陽足厥陰煎湯調五苓散取其利濕也此傷寒病胃中有濕熱有宿谷相搏發黃者必以苦寒清熱佐以滲濕之品奏功自捷矣治頭中寒濕發黃疸瓜蒂散瓜蒂二十七個赤小豆秫米各二十七粒上為細末水法捏成圓如豆大枚許納鼻中縮鼻令入當出黃水慎不可吹深入按諸本無深字釋義瓜蒂氣味苦寒入手陽明赤小豆氣味甘酸平入手太陽性能利水秫米氣味甘微寒入手太陰陽明頭中寒濕不能去因發黃疸大宜此藥然病在頭中藥力所不能到妙在納藥鼻中使藥性直入於腦黃水出盡頭中之病自去矣庚戌年避地維揚界有一人病傷寒七八日身體洞黃鼻目皆痛兩髀及項頸腰脊強急按周本項頸作頭項大便澀小便如金予曰脈緊且數脾元受濕暑熱蘊蓄於太陽之經宿谷相搏鬱蒸而不得散故使頭面有汗至頸以下無之若鼻中氣冷寸口近掌無脈則不療急用茵陳湯調五苓散與之數服而瘥又記一人病身體痛面黃喘滿頭痛自能飲食大小便如金予診之脈大而虛鼻塞且煩予曰非濕熱宿谷相搏此乃頭中寒濕茵陳蒿五苓不可行也仲景云濕家病身疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食中和無病病在頭中寒濕故鼻塞納藥鼻中則愈仲景無藥方此方見外臺刪繁證云治天行熱毒通貫臟腑沉鼓骨髓之間成為黃疸按諸本成作或宜瓜蒂散蓋此方也又記一舟稍病傷寒發黃鼻內痠痛身與目如金按周本金作常坊本作徑小便赤而數大便如金或者欲行茵陳五苓予曰非其治也小便和大便如常則知病不在臟腑今眼睛疼鼻頞痛是病在清道中清道者華蓋肺之經也若下大黃則必腹脹為逆亦瓜蒂散先飲水次搐之鼻中黃水盡乃愈
