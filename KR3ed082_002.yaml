body:
  text: 卷第二治心小腸脾胃病治因驚言語顛錯不能服溫藥宜遠志圓遠志硃砂入麝香少許同研南星白附子白茯苓酸棗仁人參各半兩金箔五片上為細末煉蜜圓如梧子大硃砂為衣每服三十圓薄荷湯下食後臨臥服釋義遠志氣味辛溫入手足少陰硃砂氣味苦溫入手少陰南星氣味苦溫入手足太陰白附子氣味辛甘大溫入足陽明茯苓氣味甘平淡滲入足陽明棗仁氣味苦平入心人參氣味甘溫入脾胃金箔氣味辛平入手太陰少陰能鎮驚安神此因驚致病言語堵亂安心神之品佐以豁痰開祕焉有不神安而心靜耶茯神散茯神熟乾地黃白芍藥川芎當歸桔梗白茯苓遠志人參以上各等分上為細末每服二錢水一盞燈心十莖棗一枚按宋本無十莖一枚四字同煎至七分不拘時候宋明遠教授之母七十四歲因戎馬驚疾如上證服此二方得力釋義茯神氣味甘平入手少陰茯苓氣味同而淡滲入足陽明桔梗氣味苦辛平入手太陰遠志氣味辛溫入手足少陰人參氣味甘溫入脾胃芎歸芍地乃四物湯養血藥也此因驚致病心主血肝藏血血既得養神魂安而驚自定再佐以燈心之微苦以清心棗之和緩以和榮則高年戎馬之驚自然精神復而病卻矣寧志膏人參酸棗仁各一兩辰砂半兩水飛按宋本無水飛二字乳香一分上為細末煉蜜和杵圓如彈子大每服一粒薄荷湯化下豫族弟婦緣兵火失心制此方與之服二十粒愈親識多傳去服之皆驗釋義人參氣味甘溫入脾胃棗仁氣味苦平入心辰砂氣味苦溫入心乳香氣味辛微溫入手足少陰兵火失心亦是因驚致病以薄荷湯送藥乃手太陰手少陰之引經藥也甘溫護持中土佐以苦味入心辛香開竅使以輕揚為引表裡皆得安妥矣治驚憂積氣心受風邪發則牙關緊急涎潮昏塞醒則精神若癡驚氣圓紫蘇子一兩附子南木香白殭蠶花蛇橘紅天麻麻黃天南星洗浸一日薄切片薑汁浸一夕各半兩乾蠍硃砂各一分留少許作衣上為末研入腦麝少許同研極勻煉蜜杵圓如龍眼大每服一粒金銀薄荷湯化下溫酒亦得釋義蘇子氣味辛溫入手太陰足厥陰能降逆下氣附子氣味辛鹹大熱入手足少陰南木香氣味辛溫入足厥陰白殭蠶氣味鹹辛平入手足陽明引經之藥白花蛇氣味甘鹹溫能截驚定搐搜風透骨橘紅氣味苦辛溫入手足太陰天麻氣味辛平入足陽明厥陰能熄風止頭暈麻黃氣味辛溫入手太陰足太陽表散藥中之峻利者也天南星氣味苦辛溫入手足太陰乾蠍氣味甘平入足厥陰因驚致病必用硃砂之苦微溫入心再佐以麝香之辛香走竅薄荷或酒之上升作引則降氣溫經疏風搜逐而疾去矣此余家祕方也戊申年軍中一人犯法褫衣將受刃得釋神失如凝豫與一粒服訖而寐及覺病已失矣山東提轄張載揚按宋本山作江其妻因避寇失心已數年豫授此方不終劑而愈又黃山沃巡檢彥其妻狂厥者逾年更十餘醫而不驗豫授此方去附子加鐵粉亦不終劑而愈鐵粉非但化涎鎮心至如摧抑肝邪特異若多志怒肝邪太盛鐵粉能制伏之素問云陽厥狂怒治以鐵落飲按宋本落作烙金制木之意也此亦前人未嘗論及安神鎮心治驚悸消風痰止眩暈按宋本作止頭眩辰砂遠志圓石菖蒲遠志人參茯神川芎山芋鐵粉麥門冬天麻半夏曲天南星銼如骰子大麩炒黃白附子生各一兩細辛辰砂各半兩上為細末生薑五兩搗取汁和水煮糊圓如緑豆大以硃砂為衣陰乾每服二十粒按宋本作每服三五十粒夜臥生薑湯送下小兒減半服按宋本半作圓釋義石菖蒲氣味辛溫入手少陰足厥陰遠志氣味辛微溫入心腎人參氣味甘溫入脾胃茯神氣味甘平入心川芎氣味辛溫入肝膽山芋氣味辛平入足陽明鐵粉氣味鹹平入足厥陰能安神強志麥冬氣味甘涼微苦入手太陰少陰天麻氣味辛平入足陽明厥陰半夏曲氣味辛微溫入胃天南星氣味辛溫入手足太陰白附子氣味辛甘溫入胃細辛氣味辛溫入腎辰砂氣味苦溫入心因驚悸致病故必鎮心安神兼以扶持正氣以薑為引雖有微毒之味只能搜病並不有傷正氣也茯苓圓辰砂石菖蒲人參遠志茯神白茯苓真鐵粉半夏曲南星牛膽制各等分上為細末生薑四兩搗取汁和水煮糊圓如梧子大別用硃砂為衣陰乾每服十粒加至二十粒按宋本二作三夜臥生薑湯下上二方醫官都君子嘗用以療心疾良驗釋義辰砂氣味苦溫入手少陰石菖蒲氣味辛溫入手少陰足厥陰人參氣味甘溫入脾胃遠志氣味辛微溫入心腎茯神氣味甘平入心茯苓氣味同而淡滲入脾胃真鐵粉氣味鹹平入肝半夏曲氣味辛微溫入胃陳膽星氣味苦寒入手少陰足厥陰生薑為引即同治上心疾不用辛溫峻利之品者欲其專行手少陰足厥陰二經使得安神定心不使藥性之勝脾胃也治心驚熱小便澀及治五淋火府丹按驚字與釋義合坊本作經合本事生乾地黃二兩木通黃芩各一兩上為細末煉蜜杵和圓如梧子大每服三十粒木通煎湯下此藥治淋澀臍下滿痛釋義生地黃氣味苦微甘微寒入手足少陰木通氣味苦平入手太陽能泄丙丁之火黃芩氣味苦平入手足少陽陽明此因火邪內伏致神識如驚小史短澀心輿小腸相為表裡小腸為火府非苦不通泄其府則臟自安矣壬戌年一卒病渴日飲斛水不食者三月心中煩悶時已十月余謂必心經有伏熱與此藥數服每服五十粒溫水下越二日不覺來謝云當日三服渴止又次日三服飲食如故此本治淋用以治渴信知用藥要在變通也開胃養氣進食七珍散人參白朮黃耆蜜水塗炙山芋白茯苓粟米微炒甘草各一兩上為細末每服二錢水一盞薑棗同煎至七分食前服按三字宋本無如故不思飲食按如故宋本作如大故加白扁豆一兩蒸用名八珍散釋義人參氣味甘溫入脾胃白朮氣味甘溫入足太陰黃耆氣味甘微溫入手足太陰山芋氣味辛平入足陽明茯苓氣味甘平淡滲入脾胃粟米氣味甘鹹微寒入足太陰陽明甘草氣味甘平能行十二經絡佐以薑棗之和榮衛此方因病後未復胃口未開故以和胃健脾為主純用王道之品而不用攻病藥石者乃瘡痍未起調養元元之意余制此方溫平不熱每有傷寒瘧疾中暑得瘥之後用此以調脾胃日三四服十日外飲食倍常治脾氣久虛按宋本氣作元不進飲食停飲肋痛曲術圓神麯十兩微炒白朮五兩乾薑官桂各三兩吳茱萸川椒各二兩上為細末煮稀糊圓按四字宋本作薄糊圓如梧子大每服三五十圓生薑湯下食前稍空心服有飲加半夏曲二兩癸亥中余作數劑自服飲食倍進釋義神麯氣味甘辛微溫入足太陰陽明白朮氣味甘溫入足太陰乾薑氣味辛溫入足太陰官桂氣味辛溫入足厥陰吳茱萸氣味辛熱入足陽明厥陰川椒氣味辛熱入足厥陰此乃久病不復脾家失健運之司水飲停於肋下作痛健脾藥中佐以泄厥陰之品者猶慮肝木之乘虛剋土也和氣調中進食白朮湯白朮厚朴桂心桔梗乾薑人參當歸茯苓甘草以上各等分上為粗末每服四錢水一盞半棗二枚同煎至八分去滓不拘時候龐老方釋義白朮氣味甘溫微苦入足太陰厚朴氣味辛溫入足太陰桂心氣味辛熱入肝制木桔梗氣味苦辛平入手太陰為諸藥之舟楫乾薑氣味辛溫入足太陰人參氣味甘溫入脾胃當歸氣味辛微溫入手少陰足厥陰茯苓氣味甘平淡滲入胃甘草氣味甘平調和諸經絡再佐以棗之和榮蓋病雖去而正未復非調和中氣穀食漸加精神何由復乎治脾腎虛弱全不進食二神圓破故紙四兩炒肉豆蔻二兩生上為細末用大肥棗四十九個生薑四兩切片同煎棗爛去薑取棗刮去皮核用肉研為膏入藥和杵圓如梧子大每服三十圓鹽湯下有人全不進食服補脾藥皆不效豫授此方服之頓然能食此病不可全作脾虛蓋腎氣怯弱真元衰劣自是不能消化飲食譬如鼎釜之中置諸米穀下無火力雖終日米不熟其何能化黃魯直嘗記服菟絲子淘淨酒浸曝乾為末日抄數匙以溫酒下十日外飲啖如湯沃雪亦知此理也釋義破故紙氣味辛大溫入足太陰兼入命門肉豆蔻氣味辛溫入足太陰陽明兼固腸胃此因久瀉不復脾腎陽衰不能納食健運故昔賢有云補腎不如補脾猶藉薑棗之辛甘和榮衛使中宮陽氣稍蘇則下焦之元真亦因之而漸蘇矣溫脾散舶上茴香炒陳艾縮砂仁桔梗香白芷厚朴各一兩木香白朮香附子各半兩甘草一兩半紅豆良薑麥芽按宋本作麥糵乾葛各三分上為細末每服一錢水一盞棗一枚同煎至七分食前溫服釋義舶上茴香氣味辛平微溫入手足少陰厥陰足太陽青皮氣味辛溫入足少陽厥陰陳艾氣味苦微溫入足太陰少陰厥陰砂仁氣味辛溫澀入足少陰太陰桔梗氣味苦辛平入手太陰為諸藥之舟楫香白芷氣味辛溫入手太陰手足陽明引經之藥厚朴氣味苦辛溫入手足太陰陽明木香氣味辛溫入手足太陰陽明白朮氣味甘溫入足太陰香附子氣味辛微溫入手足厥陰甘草氣味甘平能行諸經絡緩諸藥之性紅豆氣味甘酸平入手足太陽能祛濕逐水良薑氣味辛溫入足厥陰麥芽氣味甘平入手少陰太陽乾葛氣味甘辛平入足陽明引經之藥此因病後脾家受困脾喜熱飲故方名溫脾脾胃藥中多加肝經藥者惟恐乘土之虛肝木侵犯所以欲補脾必先泄木一定之理也治肺腎經病肺之積名曰息賁在右脅下大如杯令人灑淅寒熱喘嗽發癰疽棗膏圓葶藶陳橘皮桔梗各等分上先以下二味為末入葶藶研勻煮肥棗肉和圓如梧子大每服五七圓米飲下豫嘗患停飲久積肺經按宋本積作漬食已必嗽按宋本嗽作猰漸喘覺肺系急服此良驗釋義甜葶藶氣味苦寒入手太陰性能行水下氣陳橘皮氣味苦辛溫入手足太陰桔梗氣味苦辛平入手太陰息賁令人灑淅寒熱喘逆而咳者此肺家欲發癰疽之象以瀉肺之藥佐以棗之甘緩不使藥之下行他經欲其專走入肺也平肺氣補虛消飲五味子圓五味子二兩桂心大杏仁北來者青皮細辛人參檳榔煨各一兩乾薑附子各半兩上為細末煉蜜圓如梧子大每服三四十圓溫酒或白湯下空心食前日三服釋義五味子氣味酸微溫入足少陰桂心氣味甘辛熱入肝杏仁氣味苦辛微溫入手太陰青皮氣味辛溫入肝膽細辛氣味辛溫入足少陰人參氣味甘溫入脾胃檳榔氣味苦辛溫入足太陰太陽能下氣消積炮乾薑氣味辛溫入脾附子氣味辛鹹大熱入手足少陰此因正氣虛弱不振致積飲停留必辛甘溫之守護中宮而平肺消飲之品各得展其技矣喘急肺積葶藶圓苦葶藶一兩一分當歸肉桂白蒺藜乾薑川烏頭吳茱萸鱉甲大杏仁茯苓人參各半兩檳榔一兩上為細末煮棗肉和杵圓如梧子大每服二三十圓薑棗湯下日三四服不拘時候釋義苦葶藶氣味苦辛寒入手太陰當歸氣味辛溫入手少陰足厥陰肉桂氣味甘辛大熱入足厥陰白蒺藜氣味甘辛溫入足厥陰能明目乾薑氣味辛熱入足太陰川烏頭氣味辛熱入足太陽吳茱萸氣味辛熱入足厥陰鱉甲氣味鹹平入足厥陰杏仁氣味苦辛微溫入手太陰茯苓氣味甘平淡滲入足陽明能引諸藥達於至陰之處人參氣味甘溫入脾胃檳榔氣味苦辛溫入足太陰太陽能消積下氣肺有積飲咳逆欲喘由乎中土氣怯不能養金制木得中土有權飲濁不致泛溢肺金職司不廢烏有不安者乎多年肺氣喘急哮嗽終夕不得臥者按七字宋本作詬嗽晨夕不得紫金丹信砒水飛如面半錢按宋本注一錢半研飛如粉淡豆豉好者二錢用水略潤少頃時以紙挹干研成膏按宋本二錢作一兩半挹作浥上用豆豉膏子和砒同杵極勻圓如麻子大每服十五圓或十圓按三字宋本無小兒量大小與之並用臘茶澄清極冷吞下臨臥以知為度服藥半月之內忌進熱物按十字宋本無有一親表婦人患此病十年遍求醫皆不效忽有一道人貨此藥漫贖一服服之是夜減半數服頓愈遂多金丐得此方余屢用以救人特為神異釋義信砒氣味苦辛酸大熱有大毒能直入十二經絡淡豆氣味苦寒入手足太陰陽明必冷臘茶送者因多年冷哮咳嗽喘不得臥非辛熱有毒之藥不能直透重關非陳痛之物不能引藥入里再佐以苦寒極冷之茶引入病深之所亦物以類聚之意也厥功豈不捷耶治肺虛實不調鼻塞多涕咽中有痰而喘按宋本痰作涎項強筋急或痛細辛湯細辛半夏曲茯苓桔梗各四錢桂枝三錢甘草二錢上為粗末每服四錢水二盞生薑四片蜜半匙同煎至七分溫服日三服釋義細辛氣味辛溫入足少陰半夏曲氣味辛微溫入足陽明茯苓氣味甘平淡滲入足陽明能引藥達下桔梗氣味苦辛平入手太陰為諸藥之舟楫桂枝氣味辛甘溫入足太陽能引藥達表甘草氣味甘平通行十二經絡緩諸藥之性此因肺家冷熱虛實不調辛溫淡滲苦辛甘緩中再佐以薑之辛溫和衛蜜之甘緩和榮則傾欹得以和平矣治肺癰吐膿血作臭氣胸乳間皆痛升麻湯按宋本無間字川升麻桔梗薏苡仁地榆子芩牡丹皮白芍藥各半兩甘草三分上銼粗末每服一兩水一升半煎至五合去滓日二三服釋義川升麻氣味苦辛微溫入足太陰陽明之表藥桔梗氣味苦辛平入手太陰薏苡仁氣味甘微寒入手足太陰手少陰地榆氣味苦鹹微寒入手足陽明子芩氣味苦平入手足少陽陽明丹皮氣味辛平入足少陽厥陰白芍氣味酸微寒入肝甘草氣味甘平入足太陰陽明此肺癰已成膿血臭氣上升胸乳作痛以表藥提其清陽以泄肺清熱之藥瀉濁陰戊巳二味和中清既得升濁亦得降焉有不奏功耶治肺喘久不止成息賁者按六字宋本作而息賁三字五靈脂圓五靈脂二兩半木香半兩葶藶一分馬兜鈴去殼炒一分上為細末棗肉和圓如梧子大每服二十圓生薑湯下日三服釋義五靈脂氣味甘溫入手太陰足厥陰木香氣味辛溫入手足太陰葶藶氣味苦辛寒入肺馬兜鈴氣味苦辛微寒入手太陰肺家壅痹氣機不宣咳喘不止欲成息賁故以入血之藥佐以辛溫及輕揚泄肺之品又以棗之甘薑之辛調其榮衛則病自去無庸他圖矣脾惡濕腎惡燥如硫黃附子鍾乳煉丹之類皆剛劑用之以助陽補接真氣則可按宋本用之下有人字若云補腎則正腎所惡者古人制方益腎皆滋潤之藥故仲景八味圓本謂之腎氣圓以地黃為主又如腎瀝湯之類皆正補腎經也近世盛行香茸圓可補腎經亦有數方具後蔡太師所服香茸圓鹿茸熟乾地黃各二兩附子蓯蓉破故紙當歸各一兩沉香半兩麝香一錢上為細末入麝香研勻煉蜜杵圓如梧子大每服三五十圓空心用鹽湯下釋義此通補督脈之方也鹿茸氣味甘溫入足太陽少陰熟地黃氣味甘寒微苦入足少陰附子氣味鹹溫入手足少陰肉蓯蓉氣味鹹溫入足少陰破故紙氣味辛溫入脾腎當歸氣味辛甘微溫入手少陰足厥陰沉香氣味辛溫入腎麝香氣味辛溫入手足少陰能引諸藥入經絡送藥用鹽湯者引藥入下也乃蔡元長所服之藥因高年下焦陽氣衰弱投以溫暖必藉血氣有情辛香走竅之藥庶幾效驗之速耳又方鹿茸二兩沉香人參白芍藥熟乾地黃生乾地黃蓯蓉牛膝澤瀉大附子當歸各一兩麝香一錢上為細末酒和圓如梧子大每服五十圓鹽酒或鹽湯下釋義鹿茸氣味甘溫專補督脈沉香氣味辛溫入腎人參氣味甘溫入脾胃白芍氣味酸微寒入肝熟地黃氣味甘苦微寒入腎生地黃氣味苦寒入心肉蓯蓉氣味鹹溫入腎牛膝氣味辛鹹平入肝澤瀉氣味鹹平入足太陽附子氣味鹹溫入腎當歸氣味辛甘微溫入肝麝香氣味辛溫入手足少陰能引藥入經絡此藥輿前方功效相同而以酒圓送以鹽酒鹽湯使其入脈絡也又方熟乾地黃五兩鹿茸三兩菟絲子四兩別末附子二兩沉香一兩上為細末入麝香半錢研勺煉蜜杵圓如梧子大每服三十圓至五十鹽酒或鹽湯下釋義此方專補脾腎熟地黃氣味甘寒微苦入腎鹿茸氣味甘溫入足少陰太陽菟絲子氣味甘平入足少陰太陰附子氣味鹹溫入手足少陰沉香氣味辛溫入腎能徒乍焦再佐以麝香之走竅鹽酒之送藥蓋高年中下兩虧者非此不能效也治腎氣上攻頃背不能轉側椒附散大附子一枚八錢以上者勿皮臍切片炮末之按宋本八錢作六錢上每末二大錢好川椒二十粒用白麵填滿水一盞半生薑七片同煎至七分去椒入鹽少許通口空心服釋義附子氣味鹹辛大熱入手足少陰川椒氣味辛熱入足厥陰病因下焦空虛腎氣不安其位反上攻項背不能轉移微佐以鹽使其引歸經絡大凡治病未可以一例看當隨機應變耳一親患項筋痛連及背胛不可轉側服諸風藥皆不效豫嘗憶千金方按宋本方作髓有腎氣攻背強痛等症按四字宋本作項強一症豫處此方與之兩服頓瘥自後與人皆有驗蓋腎氣自腰夾脊上至曹溪穴然後入泥丸宮曹溪一穴非精於般運者不能透今逆行至此不得通用椒以引經歸則安矣腎氣上達按宋本作蕭氣上達椒下達詩云椒聊且貽我握椒皆是此意也治腎經虛腰痛不能轉側麋茸圓麋茸一兩治如鹿茸無麋茸以鹿茸代菟絲子取末一兩舶上茴香半兩上為末以羊內腎二對法酒煮爛去膜研如泥同上藥圓如梧子大陰乾如腎膏少入酒糊佐之每服三五十圓空心溫酒鹽湯下按宋本無空心二子釋義麋乃澤獸也氣味甘溫入足少陰菟絲子氣味甘平入脾腎舶上茴香氣味辛溫入肝腎羊內腎氣味辛甘溫入足少陰此雖腎虛腰痛必有水氣陰濕之邪相感而起故補腎藥中必兼補脾之藥觀先生之治驗可見一斑矣戊戌年八月淮南大水城下浸灌者連月豫忽臟腑不調腹中如水吼者數日調治得愈自此腰痛不可屈折雖頰面亦相妨服遍藥不效如是凡三月餘後思之此必水氣陰盛腎經感此而得乃灸腎俞三七壯服此藥瘥治腎虛或時腳腫兼治脾元地黃圓熟地黃二兩半肉蓯蓉白茯苓澤瀉五味子各三兩桂枝附子各半兩黃耆獨莖者一兩上為細末煉蜜杵和圓如梧子大每服四五十圓空心溫酒下食前再服釋義熟地黃氣味甘苦微寒入足少陰肉蓯蓉氣味鹹溫入腎茯苓氣味甘平淡滲入胃澤瀉氣味鹹微寒入足太陽五味子氣味酸鹹溫入腎桂枝氣味辛溫入足太陽附子氣味辛鹹熱入手足少陰黃耆氣味甘微溫入手足太陰此腎虛而兼脾弱則濕留不去或時腳腫故補腎藥中必佐以辛熱之品淡滲下行之味兼理脾肺之藥以酒送之斯氣化流行脾腎不致失司病有焉不去耶治腎虛及足膝無力青鹽圓茴香三兩菟絲子末四兩乾山藥二兩青鹽一兩上先將菟絲子淘洗淨用無灰酒浸七日取出曝乾冬天近火煨之曝乾另為末餘藥磨細末和勻酒糊圓如梧子大每服三五十圓空心鹽酒鹽湯下豫頃常服數年壯力進食有一婦人足嚲曳因令服此藥久之履地行步如故釋義大茴香氣味辛溫入腎菟絲子氣味甘平入脾乾山藥氣味甘平入脾青鹽氣味鹹微寒入足少陰下焦腎虛致足膝行走無力其始必因腎家氣弱不能運水故必補脾之藥佐以酒漫引藥入腎以祛濕邪而本臟自安也補益虛勞方治肝腎俱虛收斂精氣補真戢陽充悅肌膚進美飲食宜五味子圓五味子川巴戟肉蓯蓉人參菟絲子熟地黃覆盆子白朮益智仁茴香按宋本作土茴香骨碎補洗去毛白龍骨牡蠣以上各等分上為細末煉蜜杵和圓如梧子大焙乾每服三十圓空心食前米飲下日二三服此藥補精氣能止汗釋義五味子氣味酸鹹微溫入足少陰川巴戟氣味甘溫入足少陰厥陰肉蓯蓉氣味鹹溫入腎人參氣味甘溫入脾胃菟絲子氣味甘平入脾腎熟地黃氣味甘苦微寒入腎覆盆子氣味辛甘微溫入肝腎白朮氣味甘溫入脾益智仁氣味辛溫入足太陰茴香氣味辛溫入肝腎骨碎補氣味苦溫入足少陰白龍骨氣味涼澀入足少陰能收斂浮越之氣牡蠣氣味鹹澀微寒入足少陰此方主治肝腎皆虛精氣不能收斂肌膚不能潤澤補下藥中必兼補中焦之品者以精氣必生於五穀也平補五臟虛羸六府怯弱充肌膚進飲食人參圓人參山芋白朮白茯苓石斛黃耆取頭末五味子以上各一兩上為細末煉蜜和圓如梧子大每服三十圓空心食前米飲下久服不熱尤宜少年釋義人參氣味甘溫入脾胃山芋氣味辛平入胃白朮氣味甘溫入手足太陰茯苓氣味甘平淡滲入胃石斛氣味苦鹹微寒入足陽明厥陰黃耆氣味甘平入手足太陰五味氣味酸鹹微溫入腎此平補五臟六腑之方藥品純正氣味平和乃調和元氣效偃武修文之治也補血益氣治虛勞少力雙和散黃耆熟地黃當歸川芎各一兩白芍藥二兩半官桂甘草各三分上為粗末每服四大錢水一盞半生薑二片肥棗一枚煎至八分去滓熱服豫制此方止是建中四物二方而已每傷寒瘧疾中暑大病之後虛勞氣乏者以此調治皆驗不熱不冷溫而有補釋義黃耆氣味甘平入手足太陰熟地黃氣味甘寒微苦入腎當歸氣味辛微溫入手少陰足厥陰川芎氣味辛溫入肝膽白芍氣味酸微寒入足厥陰官桂氣味辛溫入肝甘草氣味甘平入脾能行十二經絡佐以薑棗之和榮衛因病後身體虛弱四肢少力欲成勞怯者非益氣補血不能復元有類養榮之意焉黑錫圓此丹陽慈濟真方黑鉛硫黃各三兩二味溶化結砂子按宋本無二味熔化四字舶上茴香附子胡蘆巴破故紙川楝子肉肉豆蔻各一兩川巴戟木香沉香各半兩上將砂子研極細餘藥為末研勻入碾自朝至暮以黑光色為度酒糊圓如梧子大陰乾貯布袋內擦令光瑩按宋本擦作揬如丈夫元臟虛冷真陽不固三焦不和上熱下冷夜夢鬼交覺來盜汗面無精光肌體燥澀耳內虛鳴腰脊疼痛心氣虛乏精神不寧飲食無味日漸憔悴按宋本憔作瘦膀胱久冷夜多小便婦人月事愆期血海久冷惡露不止赤白帶下及陰毒傷寒面青舌卷陰縮難言四肢厥冷不省人事急用棗湯吞下一二百圓即便回陽命無不活但是一切冷疾鹽酒或鹽湯空心吞下三四十圓婦人艾醋湯下此藥大能調治榮衛升降陰陽安和五臟灑陳六腑補損益虛回陽返陰功驗神聖釋義黑鉛氣味甘寒入足少陰硫黃氣味辛熱入右腎命門舶上茴香氣味辛溫入肝腎附子氣味辛鹹大熱入心腎胡蘆巴氣味辛溫入腎破故紙氣味辛溫入脾腎川楝子氣味苦微寒入手足厥陰肉豆蔻氣味辛溫入脾巴戟氣味甘溫入肝腎木香氣味辛溫入手足太陰沉香氣味辛溫入腎此方主治元陽衰脫痰逆厥冷非重鎮之藥佐以辛熱之劑不能直達下焦挽回真陽於無何有之鄉乃水火既濟神妙之方也治虛勞羸瘦乏力少食倦怠多驚畏石斛散石斛白茯苓各四錢柏子仁牛膝遠志木香五味子杏仁肉蓯蓉訶子陳橘皮按宋本作青橘皮柴胡按宋本注炒字人參熟地黃各三錢甘草二錢乾薑一錢半神麯麥芽各六錢按宋本作麥糵上為細末每服二錢米飲調下食前日二三服釋義石斛氣味甘平微苦鹹入足厥陰少陰茯苓氣味甘平淡滲入胃能引諸藥達於至陰之處柏子仁氣味苦辛微溫入足厥陰牛膝氣味酸鹹平入肝遠志氣味辛溫入手足少陰木香氣味辛溫入手足太陰五味子氣味酸鹹微溫入腎杏仁氣味苦辛微溫入肺肉蓯蓉氣味鹹溫入腎訶子氣味苦溫微澀入手陽明手足太陰陳橘皮氣味辛溫微苦入手足太陰柴胡氣味辛平入足少陽人參氣味甘溫入脾胃熟地黃氣味甘寒微苦入腎甘草氣味甘平入脾能行十二經絡乾薑氣味辛溫入手足太陰神麯氣味甘溫入脾胃麥芽氣味甘平入脾胃此因虛勞不復神倦多驚以補足三陰之藥固其本佐以清肺平肝祛除陳腐之藥則病去而元自復矣治虛損補精髓壯筋骨益心智安魂魄令人悅澤駐顏輕身延年益壽閉固天癸八仙丹伏火硃砂真磁石赤石脂代赭石石中黃禹餘糧五味併火煅醋淬乳香沒藥各一兩上為細末勻研極細糯米濃飲圓如梧子大或如豆大每服一粒空心鹽湯下有人年幾七旬夢漏羸弱氣惙惙然虛損得此方服之頓爾強壯精氣閉固飲食如舊豫嘗制以自服良驗釋義硃砂氣味苦溫入心伏火者如丹之煉過乃殺其悍烈之性欲其專益心志也磁石氣味辛溫入足少陰赤石脂氣味辛甘酸微溫入手足陽明代赭石氣味甘平入手少陰足厥陰石中黃氣味甘平入足太陰禹餘糧氣味甘平入手足陽明乳香氣味辛微溫入手足少陰沒藥氣味苦平入足陽明以鹽湯送藥者取其下行也只服一粒者亦畏石性之剛戾也此方雖是補精髓壯筋骨安魂定魄益智延年功效難以盡述然頗多金石之品近世不明此理者實不易輕用也治頭痛頭暈方治風眩頭暈川芎散小川芎半兩山茱萸一兩山藥人參甘菊花茯神各半兩上細末每服二錢溫酒調下不拘時候日三服不可誤用野菊龐先生方釋義川芎氣味辛溫入肝膽山茱萸氣味酸甘平微溫入肝山氣味甘平入脾人參氣味甘溫入脾胃甘菊花氣味辛涼入肝膽茯神氣味甘平入心以酒送藥亦取其升也風眩頭暈以辛溫辛涼之藥升散其風以酸甘甘溫之藥調和中宮正氣則厥功奏捷矣按方名川芎散則藥之次序疑當從釋義治肝厥頭暈清頭目釣藤散按釣藤宋本俱作釣藤與本草綱目合今從之釣藤陳皮半夏麥門冬茯苓茯神人參甘菊花防風各半兩甘草一分石膏一兩上為粗末每服四錢水一盞半生薑七片煎至八分去滓食遠時溫服釋義釣藤氣味甘微寒入手足厥陰陳皮氣味辛溫入手足太陰半夏氣味辛溫入胃麥冬氣味甘寒微苦入手太陰少陰茯苓氣味甘平淡滲入胃茯神氣味甘平入心人參氣味甘溫入脾胃甘菊花氣味辛涼入肝膽防風氣味甘辛溫入手足太陽甘草氣味甘平入脾石膏氣味辛寒入手足陽明又兼生薑之達表此肝厥頭暈致眼目昏花治以疏肝泄風涼劑必佐以參苓等補藥之護中斯邪不勝正病必去也治腎氣不足氣逆上行頭痛不可忍謂之腎厥其脈舉之則弦按之石堅宜玉真圓硫黃二兩石膏煅通赤研半夏湯洗七次各一兩消石一分研按宋本消作硝上為細末研勻生薑汁糊圓如梧子大陰乾每服二十圓按宋本二作三薑湯或米飲下更灸關元穴百壯釋義硫黃氣味辛大熱入右腎命門石膏氣味辛寒入足陽明半夏氣味辛溫入足陽明消石氣味鹹寒入足少陰此因腎厥頭痛以辛熱鹹寒入腎和其陰陽再以辛寒辛溫入胃佐以薑汁欲其速入胃也且胃為腎之關其關下行則上逆之氣不致竊踞清虛之府而上下各得其宜矣良方中黃圓子亦佳素問云頭痛顛疾下虛上實過在足少陰巨陽甚則入腎徇蒙招搖目瞑耳聾下實上虛過在足少陽厥陰甚則在肝按素問作入肝下虛者腎虛也故腎厥則頭痛上虛者肝虛也故肝厥則頭暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀也故肝厥頭暈腎厥顛痛不同如此治肝厥釣藤散在前治氣虛頭疼方大附子一個剜去心全蠍二個入在內以取出之附子心為末同鍾乳一分面少許水和裹炮熟都碾為細末以焦黃色為度蔥茶煎調下一錢或半錢釋義大附子氣味鹹辛熱入手足少陰全蠍氣味甘平入足厥陰能引藥升降鍾乳氣味鹹溫入肝腎蔥茶苦辛泄降此氣虛乃陽氣虛也得陽氣大旺佐以苦辛則氣有恃而下行其疼自緩耳又方大川芎二個銼作四片大附子一個和皮生為末上以水和附子末如面劑裹川芎作四處如附子末少入面少許裹畢以針穿數孔用真腦麝薰有穴處內香再捻合穴子如未覺內有香即再薰一炷時候用細爐灰於銚子內炒熱灰炮附子取出研細末每服半錢蔥茶煎調送下不拘時候服上泗醫楊吉老二方神良釋義大川芎氣味辛溫入肝膽大附子氣味鹹辛熱入心腎麝香辛溫香能走竅蔥茶苦辛泄降亦陽虛頭疼之病也與上方功效倣佛相同又方好川芎半兩為末每服二錢煎臘茶澄清調下甚捷曾有婦人産後頭痛一服愈釋義川芎氣味辛溫入足少陽厥陰臘茶氣味苦寒直降是升降之法也此非氣虛頭疼之疴乃血虛頭疼之疴也以川芎為血藥中之氣分藥耳治氣虛頭暈白芷圓白芷石斛乾薑各一兩半細辛五味子厚朴肉桂防風茯苓甘草陳皮各一兩白朮一兩一分上為細末煉蜜圓如梧子大每服三十圓清米飲下不飢不飽服鄉人邵致遠年八十有三有此疾得此方數服即愈渠云楊吉老傳釋義白芷氣味辛溫入手足陽明引經之藥石斛氣味甘平微咸入肝脾腎三經乾薑氣味辛溫入手足太陰細辛氣味辛溫入足少陰五味子氣味酸鹹溫入腎厚朴氣味辛溫入足太陰陽明肉桂氣味辛甘熱入肝防風氣味辛甘平入手足太陽茯苓氣味甘平淡滲入胃能引諸藥入於至陰之處甘草氣味甘平入脾通行十二經絡能緩諸藥之性陳皮氣味辛平微溫入脾胃白朮氣味甘溫入手足太陰此治氣虛頭暈之方也諸經絡皆有賴於中土故守中之藥居多中宮氣旺則辛熱之品得各行其志而病情中矣治風寒客於頭中偏痛無時疼痛牽引兩目按疼痛宋本作久之遂致失明宜白附子散白附子一兩麻黃不去節川烏南星各半兩全蠍五個乾薑硃砂麝香各一分上為細末酒調一字匕服之按宋本無匕字去枕臥少時按宋本無臥字此方見必用方庚寅年一族人患頭痛不可忍一服即瘥釋義白附子氣味辛甘大熱入足陽明麻黃氣味辛溫入足太陽川烏氣味苦辛大熱入足太陽少陰南星氣味苦辛溫直入手足太陰全蠍氣味甘平入足厥陰最能行走入絡乾薑氣味辛溫入手足太陰硃砂氣味苦溫入心麝香氣味辛香溫入手足少陰能引藥入絡此因客邪入於頭中偏痛無時以致失明非辛香溫熱能行之藥不能搜逐其邪非溫散之藥不能送邪達外外內清平其病焉有不去者乎治一切頭旋本體因風邪乘於陽經按本體因宋本作本因體虛上注於頭面遂入腦亦因痰水在於胸膈之上犯大寒使陽氣不行痰水結聚上衝於頭目故令頭旋按宋本無故字羚羊角散羚羊角茯神各一兩芎藭防風半夏湯洗七次白芷甘草各半兩枳殼附子各一分按宋本作各三分上為粗末每服四錢水一盞半生薑三片按三片宋本作半分慢火煎至七分去滓不拘時候服按宋本服字上有溫字釋義羚羊角氣味辛鹹微寒入足厥陰茯神氣味甘平入心芎藭氣味辛溫入肝膽防風氣味辛甘平入足太陽半夏氣味辛溫入胃白芷氣味辛溫入手足陽明甘草氣味甘平入足太陰枳殼氣味苦寒入脾附子氣味辛鹹大熱入手足少陰佐以生薑之達表此因風邪乘於陽位竊踞清虛之府使陽氣不能流行陰寒之氣結聚而不化故辛散之藥少佐以辛熱溫通之品則結聚者開而陽氣得行病無不去矣治虛風頭旋吐涎不已養正丹黑鉛水銀硫黃硃砂各一兩上用建盆一隻按宋本盆作盞火上熔鉛成汁次下水銀用柳杖子打勻按宋本杖作枝取下放少時下二味末打勻令冷取下研為粉用米飲圓或用棗肉圓如梧子大每服三十粒鹽湯下此藥升降陰陽補接真氣非止頭旋吐涎而已按宋本無吐涎二字釋義黑鉛氣味甘寒入足少陰水銀氣味辛寒能伏五金為泥能行九竅硫黃氣味辛大熱入右腎命門硃砂氣味苦溫入心虛風頭旋吐涎不止陰陽二氣不能交接者諸藥不能效驗萬不得已故用金石之品惟恐藥性悍戾以棗肉和圓以緩其性鹽湯送藥以達於下欲藥性之不即發於上也治一切中風頭疼黑龍圓天南星泡洗川烏黑豆蒸三次各半斤石膏半斤麻黃干薄荷各四兩藁本白芷各二兩京墨一兩半上為細末煉蜜杵圓如彈子大每服一圓煎薄荷茶湯嚼化下按宋本無煎字釋義天南星氣味苦辛溫入手足太陰川烏氣味苦辛大熱入足太陽少陰石膏氣味辛寒入手足陽明麻黃氣味辛溫入足太陽薄荷氣味辛涼入手太陰少陰藁本氣味辛溫入足太陽陽明白芷氣味辛溫入手足陽明京墨氣味辛溫能解諸藥之毒大凡中風頭疼而用圓劑攻病者必非暴病也辛熱寒涼表散之藥恐傷正氣而病仍不去故作圓藥攻之性緩而至病所矣
