body:
  text: 卷第五治腸風瀉血痔漏臟毒治腸風瀉血久不止玉屑圓槐根白皮去粗皮苦楝根去皮各三兩椿根白皮四兩三味於九月後二月前取軟者日乾天南星半夏各半兩並生威靈仙一兩寒食麵三兩上為細末滴水圓如梧子大干之每服三十圓水八分一盞煎沸下圓子煮令浮以匙抄取溫溫送下不嚼空心食前服釋義槐根白皮氣味苦寒入手足陽明苦楝根氣味苦寒入足厥陰椿根白皮氣味苦寒入手足陽明天南星氣味苦辛溫入手足太陰半夏氣味苦辛溫入足陽明威靈仙氣味微辛鹹平通利諸經絡寒食麵氣味甘溫入足陽明此治腸風下血久不能止者以味苦者堅其陰以味辛者通其陽則陰陽既得和平而病自瘥矣頃年有一人下血幾盈盆頓爾疲苶諸藥皆不效豫曰此正腸風令服玉屑圓三服止豫苦疾三十年蓄下血藥方近五十餘品其間或驗或否或始驗而久不應或初不驗棄之再服有驗者未易歷談按宋本立作談大抵此疾品類不同對病則多愈如下清血色鮮者腸風也血濁而色黯者臟毒也肛門直射如血線者蟲痔也亦有一種下部虛陽氣不升血隨氣而降者仲景云脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精此下部虛而下血者也若得革脈卻宜服溫補藥蟲痔宜熏千金方用蝟皮艾者甚佳豫嘗作此法頗得力治臟毒蒜連圓鷹爪黃連末用獨頭蒜一顆煨香爛熟研勻入臼治熟圓如梧子大每服三四十圓陳米飲下釋義黃連氣味苦寒入手少陰手足陽明獨頭蒜氣味辛溫入手足陽明足少陰厥陰因腸胃中鬱熱蘊蓄成臟毒者非苦寒不能泄熱非辛溫不能引入病所陳米飲送者欲藥之緩行於腸胃間也此亦丹方之流治腸風臟毒槐花散槐花炒柏葉爛杵焙荊芥穗枳殼上修事了方稱等分細末用清米飲調下二錢空心食前服釋義槐花氣味苦寒入手足陽明厥陰柏葉氣味苦辛微寒入足太陰荊芥穗氣味辛溫入足太陽少陽枳殼氣味苦寒入足太陰此臟毒腸風下血不止純用辛涼苦寒之藥以泄腸胃之熱血得涼而寧靜則病自然減耳巢氏病源論腸癖為痔皆因飽食過度按宋本皆因作久困房室勞損血氣流溢滲入大腸沖發於下時便清血腹中刺痛病名脈痔又論臟毒腸風按臟宋本作脾與病源異疑誤本緣榮衛虛弱風氣進襲因熱乘之使血氣流散積熱壅遏血滲腸間故大便下血椿皮圓臭椿根皮刮去粗皮焙乾四兩按宋本作臭椿花蒼朮枳殼各二兩上細末醋糊圓如梧子大空心食前米飲下三四十圓釋義臭椿根皮氣味苦辛寒入足少陽足厥陰蒼朮氣味辛溫入足太陰陽明枳殼氣味苦寒入足太陰此因飽食房勞血滲大腸腹中刺痛下血謂之脈痔熱氣蘊積不能流暢故投以苦寒燥劑每多效驗也治腸痔在腹內有鼠乳下血方白臭蕪荑按宋本無臭字貫衆狼牙根蝟皮炙焦按此味宋本在二引根下注各一分椿東引根白皮槐東引白皮各一兩按宋本無注雄黃半兩白鱔頭一個炙焦上細末用臘月豬脂糊圓每一圓彈子大棉裹納下部日三易釋義白臭蕪荑氣味辛平入足太陰手足陽明能消積殺蟲貫衆氣味苦寒入手足陽明足厥陰狼牙根氣味辛寒入足厥陰蝟皮氣味甘平入足厥陰手陽明椿東引根白皮氣味苦寒入手足陽明厥陰槐東引根白皮氣味苦平入手足陽明厥陰皆取東方生氣雄黃氣味辛溫入足太陰能殺蟲白鱔頭氣味甘平入手足陽明厥陰善能引入經絡臘月豬脂取其潤也為圓綿裹納於下部因腸痔久而不愈腹內有鼠奶下血其中濕熱久郁必有蟲生故一日三易使久郁之熱易去而引出所生之蟲也治痔有鼠乳結核作渴疼痛方皂角醋炙黃耆荊芥槐子穿山甲木香露蜂房炒焦蝟皮炙鱉甲醋炙桔梗芍藥各一分大黃半兩生按宋本無生字上細末煉蜜圓如梧子大每服二三十圓溫湯下食前日三服未知加至四五十圓釋義皂角氣味辛溫入手太陰黃耆氣味甘平入手足太陰荊芥氣味辛溫入足太陽少陽槐子氣味苦寒入手足陽明穿山甲氣味鹹寒入足厥陰陽明能引藥入經絡木香氣味辛溫入足太陰露蜂房氣味辛鹹入手足太陰陽明蝟皮氣味鹹溫入足少陽厥陰鱉甲氣味鹹寒入足少陽厥陰桔梗氣味苦辛平入手太陰為諸藥之舟楫芍藥氣味酸寒入足厥陰大黃氣味苦寒入足陽明此內托下毒方也內蘊之毒已成鼠乳桔核致煩渴腹痛以辛溫有毒之藥引入病處以調和氣血及辛香鹹寒之藥排其膿佐以舟楫之品再以苦寒之味下奪則久郁之毒得宣用圓藥者緩攻之法也治遠年腸風痔漏黃耆圓黃耆枳殼威靈仙各二兩續斷炒槐角子北礬枯當歸炒乾薑附子生熟地黃連翹炒各半兩上細末蜜圓如梧子大米飲下三十圓空心食前服按五字宋本無朝推官方釋義黃耆氣味甘平入手足太陰枳殼氣味苦寒入足太陰威靈仙氣味苦辛鹹平去風利水能通十二經絡續斷氣味苦辛微溫入足厥陰槐角子氣味苦寒入足太陰北礬氣味涼澀入手太陰手足陽明當歸氣味辛甘微溫入手少陰足厥陰乾薑氣味辛溫入手足太陰附子氣味辛鹹大熱入手足少陰生乾地黃氣味甘微苦寒入手足少陰連翹氣味辛涼入手太陰此遠年腸風及痔成漏故投藥必冷熱氣血相間雜方能引藥入絡否則不能直至患處治以圓劑非急攻之病可知矣治腸痔鱉甲圓鱉甲蝟皮炙焦黑穿山甲炙焦白礬枯附子豬牙皂角各半兩炙焦存二分性麝香一分研上細末研勻蒸餅圓如梧子大米飲下三十圓食前日三服釋義鱉甲氣味鹹平入足厥陰蝟皮氣味甘平入足厥陰手陽明穿山甲氣味鹹寒入足厥陰陽明白礬氣味涼澀入手足太陰陽明附子氣味辛鹹大熱入手足少陰豬牙皂角氣味辛溫開竅入手足太陰陽明麝香氣味辛溫入手足少陰蒸餅糊圓引入下也治腸風而有痔者以鹹平之藥直入患處以涼澀辛鹹溫之品佐之又恐藥性之不能即至病所復使以辛香之品引入經絡焉有不中病者哉又方槐花炒白礬枯各一兩附子半兩上細末蒸餅圓如梧子大每服二十圓米飲下食前日三服以上二方龐老者釋義槐花氣味苦寒入足陽明厥陰白礬氣味涼澀入手足太陰陽明附子氣味辛鹹大熱入手足少陰腸風腸痔乃腸中濕熱所致苦寒涼澀之品不能直下故佐以辛鹹大熱之品引入病所再以蒸餅糊圓米飲送藥又欲其緩行於腸胃間也衄血吐血咯血方治衄血無時茜梅圓茜草根艾葉各一兩烏梅肉焙乾半兩上細末煉蜜圓如梧子大空心食前按四字宋本無烏梅湯下三十圓釋義茜草根氣味苦寒平微澀入手足厥陰艾葉氣味苦微溫入足太陰少陰厥陰烏梅肉氣味酸平入足厥陰血熱妄行而衄血無時乃陽勝陰也厥陽上逆無制以苦辛酸泄之則陽氣下行而病自緩矣經云天暑地熱經水沸溢蓋血妄行陽勝陰也鞠運副茂之按宋本副作苦坊本作黃嘗苦此疾豫授此方令服而愈三黃散亦可用三黃散大黃一兩黃連黃芩各半兩上細末每服二錢新汲水調下蜜水亦得釋義大黃氣味苦寒入足陽明太陰黃連氣味苦寒入手少陰太陽黃芩氣味苦寒入手太陰陽明此陽氣上逆血熱妄行非大苦寒之藥不能使腸氣下行乃正治之方也又方山梔子不拘多少燒存性末之搐入鼻中立愈釋義山梔子氣味苦寒入足厥陰能泄三焦之火能解丹石之毒熱毒壅蔽者非此不能開其鬱也蔡子渥傳云同官無錫監酒趙無疵其兄衄血甚已死入殮血尚未止偶一道人過門聞其家哭詢問其由道人曰是曾服丹或燒煉藥豫有藥用之即活囊間出此藥半錢匕吹入鼻中立止良久得活並傳此方治鼻衄過多昏冒欲死梅師方上用陳香墨濃研點入鼻中釋義香墨氣味甘平入足少陰厥陰陽氣上升鼻衄過多以致昏冒欲死者以甘平之味和之則上升之陽得降矣潤肺安血止嗽治吐血咯血天門冬圓天門冬一兩甘草杏仁炒貝母白茯苓阿膠各半兩上細末煉蜜圓如彈子大咽津含化一圓日夜可十圓不拘時候釋義天門氣味苦寒入手足少陰厥陰甘草氣味甘平入足太陰杏仁氣味苦微溫入手太陰貝母氣味苦微寒入手太陰少陰白茯苓氣味甘平淡滲入足陽明能引諸藥入於至陰之處阿膠氣味鹹寒入足厥陰少陰此治吐血咯血之方也肺家不潤虛火上炎血不安寧咳嗆不止者以甘寒潤肺之品調和陰陽則上炎之火下行潛伏嗽烏有不止耶因嗽咯血成勞眼睛疼四肢倦腳無力黃耆散黃耆麥門冬熟地黃桔梗白芍藥各半兩甘草一分上粗末每服四錢水一盞半薑三片煎七分去滓溫服日三服釋義黃耆氣味甘平入手足太陰麥門冬氣味甘寒微苦入手太陰少陰熟地黃氣味甘寒微苦入足少陰桔梗氣味苦平入手太陰白芍藥氣味酸微寒入足厥陰甘草氣味甘平入足太陰能行十二經絡能緩諸藥之性加生薑以泄衛此咳嗽咯血成勞眼睛疼痛四肢無力者非補氣補血之藥不能挽回也治久嗽咯血成肺痿多吐白涎胸膈滿悶不食扁豆散白扁豆生薑各半兩枇杷葉去毛半夏人參白朮各一兩按宋本作各一分白茅根三分上細銼水三升煎至一升去滓下檳榔末一錢和勻分四服不拘時候釋義白扁豆氣味甘平入手足太陰陽明生薑氣味辛溫而散入手足太陰枇杷葉氣味苦平入手太陰足陽明半夏氣味辛溫入足陽明人參氣味甘溫入脾胃白朮氣味甘溫微苦入足太陰白茅根氣味甘寒入手太陰足陽明能除伏郁之熱微使以檳榔末取其辛溫降而能開也此久嗽咯血成肺痿多吐白沫胸膈滿悶不能納食者非甘平不能養胃非辛溫甘溫不能醒脾脾胃有權而肺痿自愈矣治勞瘵吐血損肺及血妄行神傳膏剪草一斤婺台州皆有惟婺州者可用狀如茜草按宋本狀作根又如細辛每用一斤洗淨為末入生蜜一斤和為膏以瓷器盛之按宋本無瓷字不得犯鐵九蒸九曝日一蒸曝病人五更起面東坐不得語用匙抄藥如粥服每服四匙良久用稀粟米飲壓之藥須冷服粥飲亦不可太熱或吐或下皆不妨如久病損肺咯血只一服愈尋常咳嗽血溢妄行按宋本無溢字下同每服一匙可也有一貴人其國封病瘵其尊人嘗以此方畀之九日而藥成前一夕病者夢人戒令翌日勿亂服藥次日將服之為屋土墜入器中不可服再合成又將服為貓覆器又不得服按二字宋本作可食又再作未就而是人卒矣此藥之異如此若小小血溢妄行一啜而愈或云是陸農師夫人鄉人艾孚先嘗親説此事渠後作人觀本草亦收入集中但人未識不苦信爾釋義剪草氣味苦寒入手太陰手足厥陰勞瘵而致久咳吐血不止損傷及肺血溢妄行此方雖近似丹方亦是培土生金之法若認得真大有益也眼目頭面口齒鼻舌唇耳諸疾鎮肝明目羊肝圓羯羊肝一具新瓦盆中煿干更焙之肝若大止用一半甘菊花羌活柏子仁細辛官桂白朮五味子各半兩黃連三分上細末煉蜜圓如梧子大空心食前溫水下三四十圓釋義羯羊肝氣味苦寒入足厥陰甘菊花氣味辛涼入手太陰足厥陰少陽羌活氣味辛甘平入足太陽柏子仁氣味辛微溫入手少陰細辛氣味辛溫入足少陰官桂氣味辛甘溫入足厥陰白朮氣味甘溫入足太陰五味子氣味酸甘辛苦微溫入足少陰兼入五臟黃連氣味苦寒入手少陰肝陽上逆致目不明以辛涼辛平辛溫苦寒之品泄其邪而以甘溫收攝之味扶其正則肝氣得鎮而安目疾自然向愈矣又方白羯羊肝只用子肝一片薄切新瓦上煿干熟地黃一兩半菟絲子車前子麥門冬蕤仁決明子澤瀉地膚子去殼防風黃芩白茯苓五味子枸杞子茺蔚子杏仁大者炒細辛華陰者苦葶藶桂心青葙子以上各一兩按宋本作麥葙子上細末煉蜜圓如梧子大每服三四十圓溫水下日三服不拘時候釋義白羯羊肝氣味苦寒入足厥陰熟地黃氣味甘苦微寒入足少陰菟絲子氣味甘平入肝腎車前子氣味甘寒入足太陽陽明能利小便麥門冬氣味甘寒微苦入手太陰少陰蕤仁氣味甘溫入足厥陰草決明子氣味鹹苦平入足厥陰澤瀉氣味鹹平入足太陽地膚子氣味苦寒入足太陽能引藥入皮膚防風氣味辛甘微溫入足太陽黃芩氣味苦寒入手足少陽陽明白茯苓氣味甘平淡滲入足陽明五味子氣味酸甘鹹苦辛入足少陰兼能入五臟枸杞子氣味甘溫入足厥陰茺蔚子氣味辛甘微溫入手足厥陰杏仁氣味苦辛微溫入手太陰陽明華陰細辛氣味辛溫入足少陰苦葶藶氣味苦辛寒入手太陰桂心氣味辛甘大熱入足厥陰青葙子氣味苦寒入足厥陰此治眼目內障視物不明者大凡目疾都因肝陽上升致病故方中苦寒之味居多辛溫不過十之一二以之為引經其意欲陽氣之下行也張臺卿嘗苦目暗京師醫者令灸肝俞遂轉不見物因得此方服之遂明有一男子內障醫治無效因以余劑遺之一夕燈下語其家曰適偶有所見如隔門縫見火者及旦視之眼中翳膜俱裂如線按宋本俱作且張云此藥靈勿妄與人忽之則無驗豫隘之且欲廣其傳也又方羌活川芎旋覆花防風各半兩甘草蒼朮米泔浸一夕去皮日乾不見火楮葉桑葉並八月採陰乾稱準以上各一兩甘菊花楮實蟬退木賊草各一兩按宋本作各一分上木臼中治為末清茶調下二錢早晚食後臨臥各一服暴赤眼亦治赤眼忌濕面及酒楮葉須真實者余不堪用不爾諸藥悉無效合時不得焙及犯鐵器豫觀此方取楮葉者必無實者蓋陰陽二物相匹配爾有實者陽也無實取葉者陰也所以不得真諸藥悉無效釋義羌活氣味辛甘平入足太陽川芎氣味辛溫入肝膽旋覆花氣味鹹溫入手太陰陽明防風氣味辛甘微溫入足太陽甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性蒼朮氣味辛溫入足太陰楮葉氣味甘涼入足厥陰桑葉氣味辛甘涼入手太陰足厥陰甘菊花氣味辛涼入手太陰楮實氣味甘溫入足少陰厥陰蟬退氣味鹹甘寒入足少陽厥陰木賊草氣味甘苦微溫入足少陽厥陰此亦因肝陽上逆頭目疼痛將欲降之必先升之故雖有鹹苦之品而辛散之藥居多且以清茶送藥也治肝腎風毒熱氣上衝眼痛菊花散甘菊花牛蒡子炒熟各八兩防風三兩白蒺藜去刺一兩甘草一兩按宋本作一兩半上細末每服二錢熟水調下食後臨臥服釋義甘菊花氣味辛涼入手太陰牛蒡子氣味苦辛平微寒入手太陰手足陽明防風氣味辛甘微溫入足太陽白蒺藜氣味辛甘微溫入足厥陰甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性此肝腎風毒熱氣上衝頭目疼痛欲損目者以辛涼甘溫者各二味散其毒熱再以甘平之味和之緩之使上衝之氣漸得和平則用藥之能事畢矣素問云久視傷血血主肝故勤書則傷肝主目昏肝傷則自生風按宋本自作目熱氣上湊於目其昏亦甚不可專服補藥須服益血鎮肝明目藥地黃圓熟乾地黃一兩半黃連決明子各一兩沒藥甘菊花防風羌活桂心光明硃砂各半兩上細末煉蜜圓如梧子大每服三十圓熟水下食後日三服釋義熟乾地黃氣味甘苦微寒入足少陰黃連氣味苦寒入手少陰草決明子氣味鹹苦平入足厥陰沒藥氣味苦平入足陽明能通瘀入絡甘菊花氣味辛涼入手太陰足厥陰少陽防風氣味辛甘微溫羌活氣味辛甘平皆入足太陽乃引經之風藥桂心氣味辛甘大熱入足厥陰光明硃砂氣味苦溫入手少陰此肝虛風動熱氣上升致目不明攻補皆在難投故用一味壯水之藥佐以苦辛諸品則升降得宜而奏功矣讀書之苦傷肝損目誠然晉範寧嘗苦目痛就張湛求方湛戲之曰古方宋陽子少得其術以授魯東門伯次授左丘明遂世世相傳以及漢杜子夏晉左太衝凡此諸賢並有目疾俱得此方云用損讀書一減思慮二專內視三簡外觀四旦起晚五夜早眠六凡此六物熬以神火下以氣篩蘊於胸中七日然後納諸方寸修之一時近能數其目睫遠視尺捶之餘長服不已動見牆壁之外非但明目乃亦延年審如是而行之非可謂之嘲戲亦奇方也治頭風冷淚龐安常方二方甘菊花決明子各三分白朮羌活川芎細辛白芷荊芥穗各半兩上細末每服一錢溫湯調下食後日三服釋義甘菊花氣味辛涼入手太陰足厥陰少陽草決明子氣味鹹平入足厥陰白朮氣味甘溫微苦入足太陰羌活氣味辛甘平入足太陽川芎氣味辛溫入足少陽厥陰細辛氣味辛溫入足少陽香白芷氣味辛溫入足太陽荊芥穗氣味辛溫入足太陽少陽因頭風疼久致目淚冷清空之府風邪久郁不去非群劑辛溫之品不能搜逐微用甘溫護中鹹苦平下降而邪自散矣又方川芎甘菊細辛白朮香白芷以上各一分上細末蠟圓如黍米大夜臥納二圓目中一辰換一圓釋義川芎氣味辛溫入足少陽厥陰甘菊花氣味辛涼入手太陰足厥陰少陽細辛氣味辛溫入足少陰白朮氣味甘溫微苦入足太陰香白芷氣味辛溫入足太陽以蠟糊圓取其淡滲也納藥目中欲其急至病所也此亦治頭風冷淚惟恐藥性不能上行頭目及腦故也苟牧仲項年嘗謂豫曰有一人視一物為兩醫者作肝氣有餘故見一為二教服補肝藥皆不驗此何疾也豫曰孫真人云目之繫上屬於腦後出於腦中邪中於頸按考千金方腦頸二字俱作項與靈樞合因逢身之虛其入深則隨目系入於腦入於腦則轉轉則目系急急則目眩以轉邪中其睛所中者不相比則睛散睛散則歧故見兩物也令服祛風入腦藥得愈按荀牧仲之荀宋本作荀王檢正希皋昔患鼻額間痛或麻痹不仁如是者數年忽一日連口唇頰車髮際皆痛不可開口雖言語飲食亦相妨左額與頰上常如繃急按宋本繃作糊手觸之則痛豫作足陽明經絡受風毒傳入經絡血凝滯而不行故有此證或者以排風小續合從水丹之類與之皆不效豫制此犀角升麻湯贈之服數日而愈上等犀角一兩一分真川升麻一兩防風羌活各三兩按宋本作各三分川芎白附子白芷黃芩各半兩甘草一分上粗末每服四大錢水一盞半煎至八分去滓通口服食後臨臥日三四服釋義犀角氣味苦酸鹹微寒入手足厥陰升麻氣味辛溫入足陽明防風氣味辛甘溫入足太陽羌活氣味辛甘平入足太陽川芎氣味辛溫入足少陰厥陰白附子氣味大溫入足陽明白芷氣味辛溫入足太陽黃芩氣味苦寒入手太陰兼入足陽明甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性此足陽明經絡受風毒傳入他經絡致氣血凝滯而不行酸鹹辛溫之為君再佐以辛溫之品使以苦寒甘緩得氣血流行病當減矣足陽明胃也經云腸胃為市又云陽明多血多氣胃之中腥膻五味無所不納如市𠪨無所不有也六經之中血氣俱多腐熟飲食故飲食之毒聚於胃此方以犀角為主解飲食之毒也陽明經絡環唇挾口起於鼻交頞中循頰車上耳前過客主人循髮際至額顱故王公所患皆此一經絡也故以升麻佐之余藥皆滌除風熱升麻黃芩專入胃經稍通醫者自能曉治鼻塞清涕出腦冷所致通草辛夷各半兩細辛甘遂桂心芎藭附子各一兩上為細末煉蜜和圓如麻子大綿裹納鼻中蜜封塞勿令氣泄稍加圓數微覺小痛搗薑汁為圓納入即愈按宋本作右細末蜜圓綿裹內鼻中蜜封塞勿令氣泄圓如大麻子稍加微覺小痛搗薑為圓即愈考與千金方合釋義通草氣味辛平淡降入手太陰太陽辛荑氣味辛溫入手太陰足陽明細辛氣味辛溫入足少陰甘遂氣味苦寒入足太陽善能泄水桂心氣味辛甘大熱入足厥陰芎藭氣味辛溫入足少陰厥陰附子氣味鹹辛大熱入手足少陰此孫真人治鼻淵之方風寒客於膽久郁化熱移熱於腦故納藥鼻中以諸辛溫之品少佐以苦寒之藥搜逐蘊伏之邪使之下趨自然安耳此千金方也治腦冷所致此疾亦有腦熱者亦有肺寒者素問云膽移熱於腦則辛頞鼻淵又曰泣涕者腦也腦滲為涕又曰肺之液為涕其來各有由矣當詳之鼻淵者濁涕下不止清濁亦自異治肺風鼻赤酒齇方老山梔為末溶黃蠟等分和為圓如彈子大每服一圓按四字宋本無空心嚼服清茶過下按八字宋本作空心茶酒嚼下四字半月效忌酒及炙煿釋義老山梔氣味苦寒入足厥陰手少陽黃臘和圓以其淡而滲使之下行清茶送亦以其苦能下降此肺風久郁成熱非苦寒不能泄其熱也又方用枇杷葉去毛筋焙乾末之茶調下一二錢日三服按宋本無筋字釋義枇杷氣味苦平入手太陰足陽明冬夏不凋得於天地四時之氣又能下氣清茶調送亦取其苦降也此亦治肺風鼻齇專泄熱耳治心脾壅熱生木舌腫脹元參升麻大黃犀角各三分甘草半兩上細末每服三錢水一盞煎至五分溫服不拘時候釋義元參氣味鹹苦入手足少陰升麻氣味辛溫入足陽明大黃氣味苦寒入足陽明犀角氣味苦酸鹹微寒入手足厥陰甘草氣味甘平入足太陰能緩諸藥之性因心脾熱氣壅痹不宣非下行不能殺其勢速下猶恐熱不盡故以甘平之品緩其下行之勢則壅熱去而無不盡矣治口生瘡方升麻一兩一分黃連三分上細末綿裹含汁咽釋義升麻氣味辛溫入足陽明黃連氣味苦寒入手少陰以綿裹含咽欲熱氣之下降此升降之方也治口舌生瘡以辛升之以苦降之則升降得和瘡自痊矣治食諸魚骨鯁久不出方上以皂角末少許吹鼻中得鯁出多祕此方釋義此丹方也皂角氣味辛溫入手太陰最能通竅以肺主一身之氣氣化流行則骨鯁自出矣治懸癰腫痛不下食元參散元參一兩升麻射干大黃各半兩甘草一分上細末每服三錢水一盞煎至七分放溫時時含咽良驗釋義元參氣味鹹苦入手足少陰升麻氣味辛溫入足陽明射干氣味苦平入手足厥陰大黃氣味苦寒入足陽明甘草氣味甘平入足太陰治懸癰痛咽阻不能下食者以苦降之品少佐辛溫再少使以甘平則上逆之熱緩緩下行病自減矣治聤耳出膿紅綿散白礬煅成白灰每用一錢入胭脂一字匕按宋本無匕字研勻用綿杖子纏去耳中膿及黃水盡即用別綿杖子引藥入耳中令到底摻之即干如壯盛之人積熱上攻耳出膿水不瘥用無憂散雄黃瀉三五行即瘥釋義白礬氣味涼澀入手太陰手足陽明胭脂氣味辛溫入足少陽厥陰蓋耳中出膿水由乎濕熱所致以涼澀兼燥之品佐以辛溫引入耳內則濕熱者得燥而干矣治腎虛耳鳴夜間睡著如打戰鼓覺耳內風吹更四肢抽掣痛黃耆圓黃耆獨莖者去蘆一兩白蒺藜炒瓦擦揚去細碎刺羌活去蘆各半兩黑附子大者一個羯羊內腎一對焙乾按宋本無內字上細末酒糊圓如梧子大每服三四十圓空心晚食前煨蔥鹽湯下釋義黃耆氣味甘平入手足太陰白蒺藜氣味辛甘溫入足厥陰羌活氣味苦辛甘平入足太陽黑附子氣味辛鹹大熱入手足少陰羯羊內腎氣味甘鹹溫入足少陰厥陰以酒糊圓蔥鹽湯送取其先升後降也夜睡耳鳴如聞打戰鼓四肢掣痛由乎腎虛下不收攝以上升之藥引虛陽下降再以鹹辛溫血肉之味補其下則虛陽不致再升古人有云精不足者補之以味也治男子二十歲因瘡毒後腎經熱右耳聽事不真每心中不快意按宋本無快字則轉覺重虛耳鳴疼痛按宋本無耳字地黃湯生乾地黃一兩半按宋本作二兩半桑白皮一兩磁石搗碎研細水淘二三十次去盡赤汁為度二兩枳殼羌活防風黃芩木通甘草各半兩上粗末每服四錢水一盞半煎七分去滓日二三服不拘時候釋義生乾地黃氣味甘寒微苦入手足少陰桑白皮氣味苦辛平入手太陰磁石氣味辛溫入足少陰枳殼氣味苦寒入足太陰羌活氣味苦辛甘平入足太陽防風氣味辛甘微溫入足太陽黃芩氣味苦寒入足少陽陽明木通氣味苦平入手太陽能泄丙丁之火甘草氣味甘平入足太陰此因男子少壯發瘡毒後腎經留熱右耳聽事不真心中常怏怏不快轉覺重虛耳鳴或疼痛故以重鎮之藥苦降之品佐以辛散升騰則升降和平病自減矣治口乾煩躁按宋本躁作燥生津液思食黃耆湯黃耆熟乾地黃白芍藥五味子麥門冬各三分白茯苓一分甘草半兩上粗末每服三錢水一盞半薑棗烏梅同煎去滓空心食前服按宋本無空心食前四字釋義黃耆氣味甘平入手足太陰熟乾地黃氣味甘苦微寒入足少陰白芍藥氣味酸微寒入足厥陰五味子氣味酸苦微溫入足少陰麥門冬氣味甘苦微寒入手太陰少陰白茯苓氣味甘平淡滲入足陽明甘草氣味甘平入足太陰薑棗和榮衛烏梅肉泄肝生津此治口苦咽乾煩躁不思食津少者諸藥專補五臟之陰津液既生則諸患自除矣
