body:
  text: 卷第六諸嗽虛汗消渴治嗽杏酥散杏仁款冬花前胡半夏制五味子麻黃柴胡桑白皮人參桔梗以上各等分上細末每服三錢水一盞半生薑五片同煎七分通口服釋義杏仁氣味苦辛微溫入手太陰款冬花氣味辛甘溫入手太陰前胡氣味苦辛微寒入手足太陰陽明其功長於下氣半夏氣味苦辛溫入足陽明能除痰降逆五味子氣味酸苦微溫入足少陰麻黃氣味辛溫發散入手太陰足太陽柴胡氣味辛甘微溫入足少陽桑白皮氣味苦辛平入手太陰人參氣味甘溫入足陽明桔梗氣味苦辛平入手太陰為諸藥之舟楫再以生薑之辛溫達表此方主治咳嗽久不止者肺為嬌臟冷熱皆能致病故辛溫辛涼之藥必佐以甘溫護中培土生金之意也戢陽氣止盜汗進飲食退經絡熱柏子仁圓新柏子仁研半夏曲各二兩牡蠣銀罐子內火煅用醋淬七次焙乾按銀罐子宋本作甘鍋子人參於白朮按宋本作吳白朮麻黃根慢火炙拭去汗五味子各一兩淨曲半兩慢火炒按宋本作淨麩上八味為末棗圓如梧子大空心米飲下三五十圓日二服得效減一服如愈即住按宋本如作好作散調亦可釋義新柏子仁氣味苦辛微溫入足厥陰半夏曲氣味辛溫入足陽明牡蠣氣味鹹澀微寒入足少陰人參氣味甘溫入足陽明於白朮氣味甘溫微苦入足陽明麻黃根氣味辛溫入足太陽五味子氣味酸苦辛微溫入足少陰淨曲氣味辛甘微溫入足太陰陽明棗肉糊圓欲其留中緩行也此因陽浮盜汗經絡中熱飲食少納故以甘溫之品守中辛溫咸澀之品固表焉有不奏功者哉治虛勞盜汗不止牡蠣散牡蠣煅麻黃根黃耆各等分上細末每服二錢水一盞煎至七分食前溫服按宋本無食前二字釋義牡蠣氣味鹹澀微寒入足少陰麻黃根氣味辛溫入足太陽黃耆氣味甘平入手足太陰因勞損之病盜汗不止若表不固則難以復元故藥雖三味而能固表止汗功莫大焉治虛風多汗惡風按虛風宋本作風虛防風湯防風五分澤瀉牡蠣煅桂枝各三分上細末每服二錢食後溫酒調下釋義防風氣味苦辛甘微溫入足太陽澤瀉氣味甘苦微咸入足太陽少陰牡蠣氣味鹹澀微寒入足太陰桂枝氣味辛甘溫入足太陽送藥以酒欲其達表也此表虛冒風多汗惡風以鹹苦固其里以辛甘溫護其表則表裡和平矣又方白朮防風各一兩牡蠣三分煅研如粉按煅研宋本作炒上細末酒調二錢服惡風加防風一倍少氣加白朮按宋本無少字面腫加牡蠣釋義此玉屏風散之變法也白朮氣味甘溫微苦入足太陰防風氣味苦辛甘微溫入足太陽牡蠣氣味鹹澀微寒入足少陰以酒為引取其送藥達表此亦虛風多汗惡風者以甘溫而兼辛溫之藥佐以咸澀之藥則表固而汗止矣治消渴方白浮石舶上青黛各等分麝香少許上細末每服一錢溫湯調下釋義浮石氣味鹹平入手太陰舶上青黛氣味苦辛微寒入足厥陰麝香氣味辛溫入手足少陰能引藥入經絡凡消渴之病必因陽盛陰虧津液內涸所致故以鹹平微苦寒之味助其陰猶恐不能直入病所又以辛香走竄之品引其入里無不效驗矣治渴疾飲水不止神效散白浮石蛤粉蟬殼各等分上細末用鯽魚膽七個調三錢服不拘時候神效釋義白浮石氣味鹹平入手太陰蛤粉氣味鹹平入足少陰蟬殼氣味鹹甘寒入足少陰厥陰鯽魚膽為引子取其鹹苦能引藥入里也病因消渴飲水不止以鹹平微寒之藥制之則陽氣潛伏陰氣自然稍蘇矣古方驗錄論消渴有三種一者渴而飲水多小便數脂似麩片甜者消渴病也二者吃食多不甚渴小便少似有油而數者消中病也按消中宋本作中消三者渴飲水不能多便腿腫按宋本便作但腳先瘦小陰痿弱小便數此腎消病也特忌房勞千金方云消渴病所忌者有三一飲酒二房室三鹹食及面能忌此便不服藥亦自可消渴之人愈與未愈常須慮患大癰必於骨節間忽發癰疽而卒予親見友人邵任道患渴數年果以癰疽而死唐祠部李郎中論消渴者腎虛所致每發則小便甜醫者多不知其疾故古今亦闕而不言洪範言稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣精氣則下入骨髓按第二精字宋本所無其次以為脂膏其次以為血肉也其餘則為小便故小便色黃血之餘也臊氣者五臟之氣咸潤者則下味也腰腎既虛冷則不能蒸於穀氣則盡下為小便故味甘不變其色清冷則肌膚枯槁也由如乳母穀氣上泄皆為乳汁消渴病者下泄為小便皆精氣不實於內則小便數瘦弱也又肺為五臟華蓋若下有暖氣蒸則肺潤若下冷極則陽氣不能升故肺干則渴易於否卦乾上坤下陽無陰而不降陰無陽而不升上下不交故成否也譬如釜中有水以火暖之其釜若以板覆之則暖氣上騰故板能潤也若無火力水氣不能上此板則終不得潤也火力者則是腰腎強盛也常須暖補腎氣飲食得火力則潤上而易消亦免乾渴也故張仲景云宜服腎氣八味圓此疾與腳氣雖同為腎虛所致其腳氣始發於二三月盛於五六月衰於七八月凡消渴始終發於七八月盛於十一月十二月衰於二三月其故何也夫腳氣壅疾也消渴宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈也審此二者疾可理也猶如善為政者寬以濟猛猛以濟寬隨事制度爾仲景云足太陽者是膀胱之經也膀胱者腎之腑小便數此為氣盛氣盛則消穀大便硬衰則為消渴也男子消渴飲一斗小便亦得一斗宜八味腎氣圓按宋本古方驗錄一節千金方一節唐祠郎中論一節共分三節乾地黃制半斤按宋本無制字山藥四兩茯苓牡丹皮製附子按宋本無制字潯桂心各三兩按宋本無潯字澤瀉四兩山萸肉五兩上細末煉蜜圓如梧子大每服二三十圓空心溫酒下按宋本無空心二字忌豬肉冷水蕪荑胡荽千金地黃圓亦佳在卷四虛熱部心熱中按九字宋本作在中部心熱中六字釋義熟地黃氣味甘苦微寒入足少陰山藥氣味甘平入足太陰陽明茯苓氣味甘平淡滲入足陽明牡丹皮氣味辛平入足少陽厥陰附子氣味鹹辛大熱入手足少陰潯桂心氣味辛甘大熱入足厥陰澤瀉氣味苦鹹平入足太陽山萸肉氣味酸微溫入足厥陰此即古方八味圓方也消渴之病由乎命門火衰下焦無火不能蒸動腎陰上供故必辛鹹大熱之品助其真陽津液上騰而消渴緩矣治消渴三痟圓好川黃連去須細末不計多少銼冬瓜肉研裂自然汁和成餅子陰乾再為末再為汁浸和成餅陰乾如是七次即用冬瓜汁為圓梧子大每服三四十圓以冬瓜汁煎大麥仁湯送下尋常消渴按宋本無消字止一服愈釋義川黃連氣味苦寒入手少陰冬瓜氣味甘微寒入手太陽手足陽明此治三消之證致消渴不止者皆由火氣上炎津液被劫以苦寒甘寒之味制其上炎之火而津液自振矣金瘡癰疽打撲諸瘡破傷風治金瘡止血除疼痛闢風續筋骨生肌肉地黃散地黃苗地崧按崧字諸本皆從山考本草當從草青蒿蒼耳苗赤芍藥各五兩入水浸取汁石灰三升生艾汁三合上五月五日七月七日午時修合以前藥汁拌石灰陰乾再入黃丹三兩更杵羅細凡有金瘡傷析出血用藥封裹勿令動著十日差不腫不膿釋義地黃苗氣味甘寒入足少陰厥陰能療瘡惡瘡及金瘡地崧即天名精也氣味辛甘寒入足厥陰陽明能養血熄風青蒿氣味苦寒入足少陰厥陰能殺蟲辟邪治骨蒸發熱及金瘡疼痛蒼耳苗氣味苦辛微寒入足厥陰能殺疳蟲潤肌膚赤芍藥氣味苦平入足厥陰能行血中之滯石灰氣味辛溫入足厥陰能療金瘡止血殺蟲生艾氣味苦溫入足太陰少陰厥陰黃丹氣味辛微寒入足厥陰能療金瘡止疼痛瘍科必用之藥此因金瘡疼痛筋骨損傷俱用涼血表血行血生肌止痛之品藥既中病病豈有不減者乎斂金瘡口止疼痛劉寄奴散劉寄奴一味為末摻金瘡口裡釋義劉寄奴氣味苦溫入足厥陰能行血止疼去癥瘕治金瘡極有效驗並治湯火瘡尤妙此雖一味草藥性能行走使氣血不致凝滯則所傷之處自然止痛生肌耳宋高祖劉裕微時伐荻見大蛇長數丈射之傷明日復至聞有杵臼聲往視之見青衣童子數人於榛中搗藥問其故答曰我王為劉寄奴所射合藥敷之帝曰五神何不殺之按坊本五作王與南史合答曰劉寄奴王者不死不可殺帝叱之皆散遂收藥而返每遇金瘡敷之良驗寄奴高祖小字也此藥非止治金瘡治湯火瘡至妙經驗方云劉寄奴為末先以糯米漿用雞羽掃傷著處後摻藥末在上並不痛亦無痕大凡湯火燙著按宋本無火燙二字急用鹽末摻之護肉不壞然後藥敷之治從高墮下墜損惡血骨節間疼痛蕓薹散荊芥藕節各二兩陰乾蕓薹子陰乾川芒消馬齒莧各一兩陰乾上細末用蘇枋木半兩酒一大盞煎至七分調下二錢服不拘時候釋義荊芥氣味辛溫入足厥陰藕節氣味甘平澀入足太陰能消瘀血解熱毒蕓薹子氣味辛溫入足厥陰性能行走消瘀川芒消氣味辛鹹寒入足厥陰能升能降能行血破瘀馬齒莧氣味酸寒入足厥陰能散血消腫蘇枋木氣味甘鹹辛平入足厥陰能和血通瘀再加酒煎總欲其行血也從高墜下跌撲損傷氣血凝滯以群劑消瘀行血之藥再佐以酒之升降鮮有不效驗者矣治腕折傷筋損骨疼痛不可忍宜名夢龜散按注五字宋本無生地黃一斤切藏瓜姜糟一斤按宋本此下有生薑一味注四兩切上都炒令勻熱以布裹罨傷折處冷則易之釋義生地黃氣味甘苦微寒入手足少陰厥陰藏瓜姜糟氣味辛溫入足少陰厥陰必欲藏過瓜姜者取性之純粹兼能引入筋骨也因打撲而致腕折筋傷骨損疼痛難忍者其氣血必凝滯此方取其行氣和血而已曾有人傷折宜用生龜尋捕一龜將殺之患人忽夢見龜告言曰勿相害吾有奇方可療於夢中遂授此方用之果驗按四字宋本無治打撲墜損惡血攻心悶亂疼痛水仙散未展荷葉一味陰乾為末食前以童子熱小便一小盞調下三錢以利下惡物為度一方用大幹荷葉五片燒令煙盡細研作一服如上服之釋義荷葉氣味苦辛平入足少陽厥陰未展者卷而未開取其升而輕揚也童便調送取其咸能下降也此藥先升後降使惡血下行悶亂欲昏者得以心定神安矣長肉止痛生肌檳榔散檳榔木香各等分上為細末薄貼瘡上神效釋義檳榔氣味辛溫入足太陰陽明黃連氣味苦寒入手少陰木香氣味辛溫入足太陰傷損而疼痛不能長肉生肌由乎氣味不能和暢故以辛溫苦寒貼之則氣血流行肌肉自然生矣治打撲傷損及一切癰腫未破令內消方生地黃研如泥成膏木香細末上以地黃膏隨腫大小攤於紙上摻木香末一層又再攤地黃膏一層貼腫上不過三五度即愈釋義生地黃氣味甘苦微寒入手足少陰厥陰能涼血木香氣味辛溫入足太陰能疏滯打傷撲損癰腫未破者皆能內消大凡損傷癰腫必因氣血不宣暢今氣既得疏血亦流行腫豈有不消者哉元祐中宗人許元公赴省試卷過興國寺橋值微雨地滑墜馬右臂臼脫路中一人云急與挼入臼中血漬臼中即難治也僕者如其說神已昏亦不覺痛也遂僦臥轎畀至景德須臾親舊集議所醫者或云非錄事巷田馬騎不能了此疾急鞭馬召至則已日暮矣田秉燭視其面色云尚可治此疾料理費力先議所酬方敢用藥此公去省試止旬日又是右臂正妨作字今須作兩等商量如旬日內安痊如舊不妨就試作一等價如至期未能就試即減數別作一等價悉如其說遂用藥封其腫黯處至中夜方省達旦已痛止矣翌日至悉去其封藥損處已白其瘀血青黯已移在臂臼之上如是數日易之其腫黯直至肩背於是用藥下之初下黑血一二升三五日如舊臂亦不痛遂得赴試可謂妙醫矣元公云若在外方遭此厄微田生吾終作折臂鬼矣故知墮損手足臼脫急須挼入不爾終成蘆節也宣和中有一國醫忽承快行宣押就一佛剎醫內人限目今便行鞭馬至則寂未有人須臾臥轎中扶下一內人又一快行送至奉旨取軍令狀限日下安痊醫診視之已昏死矣問其從人皆不知病之由惶恐無地良久有二三老內人至下轎環而泣之方得其實云因蹴鞦韆自空而下墜死醫者云打撲傷損自屬外科欲申明又恐後時參差不測再視之微覺有氣忽憶藥篋中有蘇合香圓急取半兩於火上焙去腦麝用酒半升研化灌之至三更方呻吟五更下惡血數升調理數日得痊予謂正當下蘇合香圓蓋從高處墜下必挾驚悸血氣錯亂此藥非特逐瘀血而又醒氣醫偶用之遂見功此藥居家不可缺如氣厥鬼邪殗殜傳屍心痛時疾之類皆治良方載甚詳須自合為佳爾王蘧發背方序云元祐三年夏四月官京師疽發於背召國醫治之逾月勢益甚徐州蕭縣人張生以艾火加瘡上灸之自旦及暮凡一百五十壯知痛乃已明日鑷去黑痂膿血盡潰膚理皆紅亦不復痛始別以藥敷之日一易焉易時旋剪去黑爛惡肉月許瘡乃平是歲秋夏間京師士大夫病疽者七人余獨生此雖司命事然固有料理不知其方遂至不幸者以人意論之可為慨然於是撰次前後所得方摸版以施庶幾古人濟眾之意紹聖三年三月日題治諸般癰疽發背按宋本癰疽作癰腫柞木散柞木葉四兩干乾荷葉金櫻根萱草也甘草節地榆各一兩上同銼搗為煮散每服半兩水二碗煎至一碗分兩服早晚各一並滓再煎一服膿血者自干未成者自消忌飲食毒釋義柞木葉氣味苦平入足厥陰乾荷葉氣味苦辛平入足少陽厥陰金櫻根氣味甘涼入足厥陰能利濕解毒甘草節氣味甘平入足太陰最能解毒通行十二經絡地榆氣味鹹苦微寒入手足陽明此治癰疽發背之方也大凡諸毒之發皆由濕熱壅痹致氣血凝滯而成涼血之藥必兼分利濕熱則源頭既清病自消散矣斂瘡內消方黃明膠一兩水半升煮化按宋本作消了入黃丹一兩再煮三五沸又放溫冷以雞毛掃在瘡口上如未成即塗腫處自消釋義黃膠氣味甘平微咸入足太陰黃丹氣味辛微寒入足厥陰諸瘡俱因壅遏不宣致氣血凝滯以辛涼微咸之藥使壅痹流行則有膿者自干腫者自消亦一定一之理也治癰疽止痛撥毒七寶散乾荷葉心當中如錢片大不計多少為粗末每用三匙水二碗慢火煎至一碗半放溫淋洗揩乾以太白膏敷釋義乾荷葉心當中如錢者氣味辛苦平入足少陽厥陰得震卦仰孟之象癰疽之毒凝滯不宣本屬陰晦之象故必以初生陽氣之味升之則窒晦之邪亦因是而卻矣沈遇明一方乾荷葉一兩按宋本無干字藁本半兩為末如前用釋義乾荷葉氣味苦辛平入足少陽厥陰藁本氣味辛溫入足太陽亦治癰疽疼痛以此撥之則毒氣得泄也太白膏寒水石水飛過用臘月豬脂油調成膏隨瘡大小用薄紙攤貼之釋義寒水石氣味甘寒入手足太陽能清暑熱消腫解毒臘月豬脂油氣味甘寒入足少陰厥陰此撥毒後敷貼之方也毒雖撥出氣血猶未流暢以甘寒利濕之品佐以滋潤之味則毒去而肌生矣國老膏橫紋甘草一斤擘開槌碎用水一斗浸兩宿夏浸一宿挼細夾絹濾去滓入銀石器內慢火熬成膏分作三服每發以溫酒半升調下更量年齒老少分作數服釋義甘草氣味甘平入足太陰通行十二經絡寒藥得之緩其寒熱藥得之緩其熱乃君子之藥也雖不能解毒於頃刻然以之熬膏治瘍毒者毒去之後元氣未蘇峻補難投故用以緩復其元謂之國老真功同調燮也令發背自潰黃耆散綿黃耆細者洗焙一兩甘草半兩皂角針擇紅紫者銼麩炒黃一兩上細末每服一錢匕按宋本無匕字酒一盞乳香一塊煎七分去滓食遠時溫服按宋本無食遠時三字釋義黃耆氣味甘平入手足太陰甘草氣味甘平入足太陰皂角針氣味辛鹹溫入手太陰陽明足厥陰此方欲令發背自潰故方中加酒使其升至患處也再佐乳香者欲其引入經絡也托裡排膿生犀散皂角針不計多少粗大紫色者上藏瓶中鹽泥固濟炭火燒過存性放冷出碾為細末每服一錢薄酒微溫調下暑月用陳米飲下釋義皂角針氣味辛鹹溫入手太陰陽明足厥陰此方因發背未能有膿用之託里排膿薄酒調送欲藥性之直入患處也暑月不用酒者恐犯古所云瘡家不可強發汗之意清心內固黃耆圓綿黃耆人參各半兩按宋本作各一兩上細末入真生龍腦一錢研細用生藕汁和圓綠豆大每服三十圓溫熟水下加至四十圓日三服釋義黃耆氣味甘平入手足太陰人參氣味甘溫入足陽明又佐以生真龍腦之辛涼入手太陰生藕汁之甘平而潤入足太陰此瘍疾潰膿之後本虛心熱非峻補不能固內清心乃調元益氣之方也治一切瘡毒內托散綠豆粉一兩細研通明乳香一分慢火於銀石器中炒手指攪使干可捻急傾出在紙上用扇扇冷便研令極細用上同研勻凡一切惡瘡並系難名癰腫按宋本並作應每用二錢至三錢食後臨臥濃煎甘草湯調下如打撲及諸般內損用溫酒調下食後空心服些少即內消大損則血從大便出矣釋義綠豆粉氣味甘寒入足厥陰乳香氣味辛微溫入手足少陰能通瘀活血瘍毒用甘草湯送內傷用溫酒送一取其涼血解毒一取其引入經絡因無名腫毒之發惟恐毒氣內攻乘心故以甘寒之品護之再言治病庶幾於理不悖矣治發背癰疽方本名六味車螯散按注七字宋本無車螯殼一兩個泥固濟火煅存性為末另以瓜蔞一枚燈心五十莖再加甘草節二錢按另以瓜蔞以下十八字宋本作瓜蔞一枚燈心五十莖蜜一大匙十三字用酒一升先煎下三味微熟濾去滓用白蜜一大匙按六字宋本無調車螯末二大錢匕不過二服止痛去毒釋義車螯氣味甘鹹寒入足厥陰瓜蔞氣味苦寒入足陽明燈心氣味甘微涼入手太陰少陰甘草節氣味甘平解毒入足太陰以酒煮三味欲藥性之升也再佐以蜜者取其甘潤而能引毒下行也此發背癰疽疼痛便難者使大便下行毒氣少殺則疼痛之勢自然緩矣治癰疽已有瘡眼未出膿痛不可忍用此藥紝即膿出按三字宋本小注巴豆一個去皮膜不去心油鹽豉十四個口中含去皮令軟同研爛入真麝香少許如難圓入少稀糊捏作餅子或如鼠糞尖或圓子臨時看瘡口紝之只以紙捻子送入藥便不用紙捻子須臾必痛忍之良久膿出釋義巴豆氣味辛大溫入足太陰陽明鹽豉氣味苦鹹寒入手足太陰陽明少佐以麝香者欲其香入里也癰疽已有瘡眼不能出膿痛不可忍是毒不能化所以無膿以藥為紝而即納於患處俾得溫熱之性則氣血流暢毒自化矣治發背方草決明生用一升搗碎生甘草一兩亦銼碎水三升煮取一升溫分二服大抵血滯則生瘡肝為宿血之臟而決明和肝氣而不損元氣也釋義草決明氣味鹹苦平入足厥陰生甘草氣味甘平生用則涼入手足太陰背瘡之發由乎熱毒壅滯致氣血不能流行今治以和肝涼血之品則正氣不致受傷而壅遏之毒亦自稍衰其勢耳治破傷風及打撲傷損玉真散天南星滾湯泡洗七次按滾泡二字宋本無防風各等分上細末如破傷風按宋本無風字以藥敷貼瘡口然後以溫水調下一錢如牙關緊急角弓反張用藥二錢童子熱小便調下或因鬥毆打撲內有傷損之人以藥二錢溫酒調下即打傷至死但心頭微溫以童子小便調下二錢並三服可救二人性命釋義天南星氣味辛溫入手足太陰防風氣味辛甘微溫入足太陽此治破傷風及打撲傷損之恙以酒調送欲藥性之上行也此真救急備用之方不可不未雨綢繆
