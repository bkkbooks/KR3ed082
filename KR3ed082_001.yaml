body:
  text: 卷第一治中風肝膽筋骨諸風治肝經因虛內受風邪臥則魂散而不守狀若驚悸真珠圓真珠母三分研細同碾熟乾地黃當歸各一兩半人參柏子仁酸棗仁各一兩云茯神暹邏犀角龍齒海南沉香忌火各半錢上為細末煉蜜為圓如梧子大辰砂為衣每服四五十圓金銀薄荷湯送下日午夜臥服釋義此安神熄風之方也真珠母氣味鹹寒入足厥陰以之為君熟地黃氣味甘寒微苦入足少陰當歸氣味苦辛甘微溫入手少陰二味為臣人參氣味甘微溫入足陽明柏子仁氣味苦辛微溫入足厥陰棗仁氣味苦平入手少陰茯神氣味甘平入手少陰犀角氣味苦酸鹹寒入足厥陰龍齒氣味涼澀入足厥陰沉香氣味辛微溫入足少陰以之為佐使者因肝虛受邪內風鼓動致神魂不守藉水之滋養肝風得熄飛揚者得以鎮靜使坎離交合神旺氣和自然安適矣獨活湯獨活黑者防風華陰細辛酸棗仁前胡半夏曲五味子沙參羌活甘草白茯苓人參各一兩上為粗末每服四大錢水一盞半生薑三片烏梅肉半個同煎至八分去滓不拘時候釋義此祛風養正之方也獨活氣味苦辛甘平氣味俱薄浮而升陽也入足厥陰少陰引經之風藥故以之為君防風氣味辛甘溫入手足太陽之風藥細辛氣味辛溫氣厚於味陽也入足厥陰少陰引經之藥棗仁氣味苦平入手少陰前胡氣味苦辛微寒陽中之陰降也入手足太陰陽明之風藥其功長於下氣半夏氣味苦辛微溫沉而降陰中陽也入足陽明除痰散逆五味子氣味酸苦鹹微溫收斂散逆之氣入足少陰沙參氣味甘苦微寒能補五臟之陰入足厥陰羌活之氣味與獨活同入足太陽兼能利水甘草氣味甘平兼通入十二經絡諸味得之皆能緩其性乃君子之品也茯苓氣味甘平淡滲入足陽明引諸藥達於至陰之處人參氣味甘微溫入足陽明能補五臟之陽使身中正氣大旺外邪不能侵犯矣紹興癸丑豫待次四明有董生者患神氣不寧每臥則魂飛揚覺身在床而神魂離體驚悸多魘通夕無寐更數醫而不效豫為診視詢之曰醫作何病治董曰衆皆以為心病豫曰以脈言之肝經受邪非心病也肝經因虛邪氣襲之肝藏魂者也遊魂為變平人肝不受邪故臥則魂歸於肝神靜而得寐今肝有邪魂不得歸是以臥則魂飛揚若離體也肝主怒故小怒則劇董欣然曰前此未之聞雖未服藥已覺沉疴去體矣願求藥法豫曰公且持此説與衆醫議所治之方而徐質之閲旬日復至云醫遍議古今方書無與病相對者故豫處此二方以贈服一月而病悉除此方大抵以真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝同類故也龍齒虎睛今人例作鎮心藥殊不知龍齒安魂虎睛定魄各言類也東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專靜故魄止而有守豫謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物有成理而不説亦在夫人達之而已治中風雖能言口不喎斜而手足嚲曳脈虛浮而數風中腑也蓋風中血脈按宋本無血字則口眼喎斜風中腑則肢體廢風中臟則性命危凡風中腑宜汗而解星附散天南星半夏二味薄切薑汁浸透川烏白附子黑附子白茯苓人參白殭蠶沒藥以上各等分上為粗末每服二錢水酒各一盞同煎至八分去滓熱服二三服汗出瘥頃在桐廬有人患此症三投此藥得汗手足能舉釋義天南星氣味苦辛溫食之令人麻入手足太陰脾肺之藥半夏氣味苦辛溫入足陽明除痰散逆川烏氣味辛大熱入足太陽少陰外邪透骨者非此不能入白附子氣味辛甘大溫入足陽明神迷痰塞者非此不能醒黑附子氣味辛大熱微咸入手足少陰茯苓氣味淡滲甘平入足陽明人參氣味甘溫入足陽明守定中宮正氣群藥得以流行白殭蠶氣味鹹辛入手足陽明引藥入絡沒藥氣味苦平辛香入足陽明能散血而引藥入絡蓋中風原系急病經絡諸竅閉塞非守護中宮正氣則群劑辛熱攻邪之藥何由奏效此真祛邪扶正之方也治體虛有風外受寒濕身如在空中二生散生附子去皮臍生天南星各等分上二味㕮咀每服四大錢水一盞半生薑十片慢火煎至八分去滓服戊午年豫在新安有此疾張醫博子發授此方三服愈釋義此攻邪祛病之方也外有風邪內有濕邢身如在空中補藥難投取生附子氣味辛熱直入手足少陰天南星氣味苦辛溫直入手足太陰再佐以生薑之味辛達表使內外之邪不得停留病既去則正氣自然漸復矣治中風忽然昏若醉形體昏悶四肢不收風涎潮於上膈氣閉不通宜用救急稀涎散豬牙皂角四挺肥實不蛀者去黑皮晉礬光明者一兩上細末研勻輕者半錢重者三字匕溫水調灌下不大嘔吐但微微冷涎出一二升便得醒醒後緩而調治按宋本醒作惺後作次不可使大便按宋本作便大段疑誤當從坊本作便大服亦恐過傷人孫兆方釋義豬牙皂角氣味辛溫開竅晉礬氣味涼澀俱入手太陰足陽明能開竅通經絡祛風降痰涎暴病救急之方也得神清氣爽再當審藥療治治中風同前證勝金圓生薄荷按宋本注半斤硃砂研各半兩按宋本無各字瓜蒂末藜蘆末各一兩豬牙皂角二兩槌碎水一升同薄荷一處搗取汁慢火熬成膏上將硃砂末一分與二味末研勻用膏子搜和圓如龍眼大以餘硃砂為衣溫酒化服一圓甚者二圓以吐為度得吐即省不省者不可治必用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關緊急氣門閉不行湯藥不能入命在須臾執以無吐法可乎但不當用銀粉藥恐損脾壞人四肢爾豫每用此二方每每有驗釋義薄荷氣味辛涼入手太陰足厥陰硃砂氣味苦溫入手少陰瓜蒂氣味苦寒入手陽明藜蘆氣味辛溫入手陽明豬牙皂角氣味辛溫開竅入手太陰中風而致神昏肢痿氣閉不宣卒暴生涎聲如引鋸非宣通不能效驗即吐法亦宣通之意也治一切風拒風丹川芎四兩天麻甘草各一兩防風一兩半蓽茇半兩細辛三錢半上細末煉蜜和杵分作三十圓按宋本作每兩作三十圓每服一粒細嚼荊芥湯或溫酒下尋常些小傷風頭痛鼻塞項強筋急皆可服豫家常合老幼所須之藥按此下應照坊本增入蘇合香圓則後方貫今將坊本所增備録附後釋義川芎氣味辛溫上行頭目入足少陽厥陰引經之風藥天麻氣味辛平入足陽明厥陰能熄肝風此頭暈甘草氣味甘平通和諸經絡防風氣味辛甘溫入手足太陽之風藥畢撥氣味辛溫入足太陰能通中宮之陽細辛氣味辛溫入足少陰此乃偶因氣鬱傷風頭痛項強鼻塞痰逆如厥辛散諸品佐以甘緩則外邪去而正不傷以之為丹丸者亦緩治之法也世言氣中者雖不見於方書然暴喜傷陽暴怒傷陰憂愁失意按宋本作不意氣多厥逆往往多得此疾便覺涎潮昏塞牙關緊急若概作中風侯用藥非止不相當多致殺人堯祐庚午母氏親遭此禍至今飲恨母氏平時食素氣血羸弱因先子捐館憂惱忽一日氣厥牙禁涎潮有一里醫便作中風以大通圓三粒下之大下數次一夕而去豫常痛恨每見此症急化蘇合香圓四五粒灌之便醒然後隨其虛實寒熱而調治之無不愈者經云無故而喑脈不至不治自己謂氣暴逆也氣復則已審如是雖不服藥亦可範子默記崇寧中凡兩中風始則口眼喎斜次則涎潮閉塞左右共灸十二穴得氣通十二穴者謂聽會頰車地倉百會肩髃曲池風市足三里絶骨髮際大椎風池也依而用之無不立效元符中一宗人得疾逾年不瘥謁醫於王思和繹思和具脈狀云病因驚恐肝臟為邪邪來乘陽明之經即胃是也邪盛不畏勝我者又來乘肺肺緣久病氣弱全無復受肝凌侮其病時復頭眩瘛瘲抽掣心胞伏涎久之則害脾氣要當平肝氣使歸經則脾不受克脾為中州土主四肢一體之事脾氣旺則土生金金旺則肺安矣按宋本上旺字作正今疾欲作時覺氣上衝者是肝侮肺肺不受侮故有此上衝肼勝則復受金克故搐搦也以熱藥治之則風愈甚以冷藥治之則氣已虛肺屬金金為清化便覺臟腑不調今用中和溫藥抑肝補脾漸可安愈今心忪非心忪也胃之大絡名曰虛里絡胸膈及兩乳間虛而有痰則動須臾時發一陳熱者按宋本臾作更須是其候也服下三方一月而愈思和名醫寓儀真時人少知者後至都下聲名籍甚為醫官政和中度為黃冠終蕊珠侍宸續斷湯續斷杜仲肉桂防風牛膝白茯苓細辛人參甘草當歸白芍藥各一兩川芎秦艽川獨活熟乾地黃各三兩上為細末每服二錢水一盞生薑三片棗一個同煎至七分空心食前稍熱服釋義續斷氣味苦辛微溫入足厥陰能續筋骨杜仲氣味辛甘溫入足厥陰益精氣壯筋骨肉桂氣味辛甘大熱入足厥陰少陰防風氣味辛甘溫乃足太陽引經之風藥牛膝氣味酸鹹平入足厥陰茯苓氣味甘平淡滲入足明陽細辛氣味辛溫入足少陰人參氣味甘溫入足陽明甘草氣味甘平入足太陰當歸氣味辛溫白芍氣味酸微寒皆入足厥陰川芎氣味辛溫入足少陽厥陰秦艽氣味苦平入手足陽明兼入肝膽獨活氣味苦辛入足少陰熟地黃氣味甘寒微苦入足少陰因驚恐致病脾受肝侮土為金母母病則金不勝木用抑肝補脾甸安中下漸可向愈矣薯蕷圓薯蕷人參沙參遠志防風真珠母紫石英研水飛茯神虎骨各一兩虎睛一對二味須真者龍齒華陰細辛石菖蒲五味子丹參各一兩按宋本作各一分上細末煉蜜為圓梧子大每服三十圓至五十圓金銀薄荷湯下食後臨臥服釋義薯蕷即山藥也氣味甘平入足太陰陽明人參氣味甘溫能補五臟之陽沙參氣味甘苦微寒能補五臟之陰遠志氣味辛溫入手足少陰防風氣味辛甘溫入足太陽真珠母氣味鹹苦寒入足厥陰紫石英氣味辛溫入足厥陰茯神氣味甘平入手少陰虎骨氣味鹹辛入足厥陰虎睛氣味鹹平入手太陰能定魄龍齒氣味涼澀入足厥陰能安魂細辛氣味辛溫入腎石菖蒲氣味辛平入手少陰五味子氣味酸苦鹹微溫入腎收斂散逆之氣丹參氣味苦微寒入手少陰驚恐所致之病久不愈致神不內守魂魄飛揚填補五臟之陰陽使心腎交合外邪烏能侵入耶獨活散川獨活白朮白茯苓威蕤秦艽柏子仁甘草各一兩犀角川椒去目炒黑出汗熟乾地黃枳實白芷官桂各半兩人參一兩按宋本作一分上細末每服二錢水一盞生薑三片棗一個同煎至七分不拘時候服釋義獨活氣味苦辛甘平入足厥陰少陰白朮氣味甘溫微苦入足太陰陽明茯苓氣味甘平淡滲入足陽明葳蕤氣味甘平入手足太陰秦艽氣味苦平入手足陽明兼入肝膽柏子仁氣味苦辛微溫入足厥陰甘草氣味甘平入足太陽犀角氣味苦酸鹹寒入足厥陰手少陰川椒氣味辛溫入手足太陰及命門熟地黃氣味甘寒微苦入足少陰枳實氣味苦寒入足太陰白芷氣味辛溫入手足陽明引經之藥官桂氣味辛溫入足厥陰人參氣味甘溫入足陽明即驚恐亦七情所傷之病致臟腑偏勝不平故用補五臟之藥護持正氣雖用獨活為主再佐以辛溫苦寒之品使偏勝者得以和平客病何由得入哉治風在肝脾語蹇腳弱大便多祕地黃酒熟乾地黃四兩附子茵芋羌活防風芎藭各一兩石斛二兩丹參牛蒡根各二兩半牛膝杜仲桂枝各一兩半大麻子一升上細銼入絹袋盛寬貯之用無灰酒一斗五升封漬七日逐日空心食前飲一盞微醺勿令吐按宋本微作常釋義熟地黃氣味甘寒微苦入足少陰附子氣味鹹辛大熱入手足少陰茵芋氣味苦溫微辛入足少陽厥陰羌活氣味苦辛入足太陽厥陰少陽防風氣味苦辛甘微溫入手足太陽芎藭氣味辛溫入足少陽厥陰上行頭目石斛氣味苦甘平微咸入足太陰少陰丹參氣味苦微寒入手少陰牛蒡根氣味辛涼微苦入手太陰