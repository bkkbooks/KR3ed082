足太陰能引藥入經絡茯苓氣味甘平淡滲入胃防風氣味苦辛甘平入手足太陽當歸氣味辛甘微苦溫入心肝獨活氣味辛甘平入肝腎此因三氣留著於脈絡四肢拘攣不得屈伸痛癢無知非辛熱有毒之藥佐以引經風藥不能中病然猶藉歸芍之養血甘草之緩中病去而正不傷矣凡中風用續命排風風引竹瀝諸湯及神精丹茵芋酒之類更加以灸無不愈者然此疾積習之久非一日所能攻按宋本攻作致皆大劑久服而取效唐書載王太后中風喑默不語醫者蒸黃耆數斛以薰之得瘥蓋此類也今人服三五盞便求效責醫也亦速矣孟子曰七年之病三年之艾久而後知爾治一切癱瘓風鐵彈圓乳香沒藥各一兩五靈脂四兩川烏一兩半上先將乳香沒藥於陰涼處當風研細極更加上麝香一錢研細再將下二味為極細末然後同前藥碾和再研滴水為圓如彈子大陰乾磁盒收貯每服一粒薄荷酒磨下日三服按宋本酒作湯釋義乳香氣味辛微溫入手足少陰沒藥氣味苦平入足陽明皆能通瘀血伸縮經絡五靈脂氣味甘溫能通瘀行血入足厥陰川烏氣味辛熱入足太陽少陰風邪入骨者非此不能達再佐麝香之走竄入竅蓋癱瘓之症五臟無病病在脈絡四肢麻痹不仁表裡之藥俱不能卻非有毒通瘀辛香入絡之品不能直入病處峻利之藥而用丸劑者亦緩攻之意也黑神圓草烏頭生不去皮五靈脂各等分上為細末六月六日滴水為圓如彈子大四十歲以下一圓分六服病甚者服一圓按宋本作病甚一圓分二服薄荷酒磨下覺微麻為度釋義草烏頭氣味苦辛大熱入足太陽少陰五靈脂氣味甘溫入足厥陰此因中風癱瘓年久不愈五臟雖無傷而經絡四肢為邪痹阻伸縮不能自如者非辛熱有毒之藥及通瘀行血之品不能直走病所故服藥後欲其微知麻者取其藥性到也與上方症同治風客陽經邪傷腠理背脊強直按宋本脊作膂口眼喎斜體熱惡寒痰厥頭痛肉瞤筋惕若墜深淵按宋本作辛頞鼻淵及酒飲過多嘔吐涎沫頭目眩暈如坐車船常服解五邪傷寒闢霧露瘴氣爽神志諸風不生定風餅子天麻川烏天南星半夏川薑川芎白茯苓甘草各等分並生者上細末生薑汁為圓如龍眼大即捏作餅子生硃砂為衣每服一餅細嚼熱生薑湯下不拘時候熙豐間王丞相常服預防風疾神驗釋義天麻氣味辛平入足陽明厥陰能熄肝風止頭暈川烏氣味辛熱入足太陽天南星氣味苦辛溫入手足太陰半夏氣味辛溫入足陽明川薑氣味辛熱入足陽明厥陰川芎氣味辛溫入肝膽茯苓氣味甘平淡滲入足陽明甘草氣味甘平通行十二經絡能緩諸藥之性此備用預防之藥也風邪客於三陽經及寒邪瘴癘之邪侵犯所現諸症不安之狀諸藥辛溫皆能上升獨取甘草之緩茯苓之下行硃砂之味苦微溫入心以安神則諸風自然不生矣治膽虛冷目眩頭疼心神恐畏不能獨處胸中滿悶補膽茯神散按宋本無補膽二字茯神一兩遠志防風細辛白朮前胡人參桂心熟乾地黃甘菊花各三分枳殼半兩上為細末每服三錢水一盞生薑三片同煎至六分溫服不拘老幼皆宜服釋義茯神氣味甘平入心遠志氣味辛溫入心腎防風氣味苦辛甘入手足太陽細辛氣味辛溫入腎白朮氣味甘溫入脾前胡氣味辛微寒入手足太陰陽明人參氣味甘溫入胃桂心氣味辛甘大熱入肝腎熟地黃氣味甘寒微苦入腎甘菊花氣味苦辛涼入肝膽枳殼氣味苦寒入脾此因膽虛神怯致病有不安諸恙故以補心脾肝腎之藥守正佐以辛溫辛涼之品正氣既旺外侮焉能入哉治膽虛不得眠四肢無力鱉甲圓鱉甲酸棗仁羌活黃耆牛膝人參五味子各等分上為細末煉蜜杵圓如梧子大每服三四十圓溫酒下空心服按三字宋本無釋義鱉甲氣味鹹平入足厥陰棗仁氣味苦平入心羌活氣味苦辛平入足太陽黃耆氣味甘微溫入手足太陰牛膝氣味酸鹹入肝腎人參氣味甘溫入脾胃五味子氣味酸微苦鹹入腎此因膽虛為病培養中宮使中土有恃肝家氣旺則少陽膽有所憑依故六腑以通為補必藉五臟之內守也治膽虛目暗喉痛唾數眼目眩冒五色所障夢見被人訟恐懼面色變青補膽防風湯防風十分人參六分細辛五分芎藭甘草茯神獨活前胡各八分上為粗末每服四大錢水一盞半棗二枚同煎至八分去滓食前服釋義防風氣味苦辛甘平入手足太陽引經之風藥人參氣味甘溫入脾胃細辛氣味辛溫入腎芎藭氣味辛溫入肝膽甘草氣味甘平入脾胃茯神氣味甘平入心獨活氣味苦辛甘平肝腎引經之風藥前胡氣味辛微寒手足太陰陽明之風藥此膽虛挾邪諸症不安以人參之扶正甘草之緩中茯神之安神再佐以棗之入榮則諸風藥得施其技焉有不中病情哉治膽虛常多畏恐不能獨臥如人捕狀頭目不利人參散人參枳殼五味子桂心枸杞子山茱萸甘菊花茯神各三分柏子仁熟乾地黃各一兩上為細末每服二錢空心溫酒調服按宋本無空心二字釋義人參氣味甘溫微苦寒入脾胃枳殼氣味苦寒入脾五味子氣味微苦鹹入腎桂心氣味辛甘大熱入肝腎枸杞子氣味甘溫入足厥陰少陰山茱萸氣味酸微溫入足厥陰甘菊花氣味苦辛涼入肝膽茯神氣味甘平入心柏子仁氣味苦微溫入心肝熟乾地黃氣味甘寒微苦入腎藥必酒送乃入膽也亦因膽虛致病肝膽屬木方中補腎之品居多取古人所云虛則補其母也治肝厥狀如癇疾不醒嘔吐醒後頭虛暈發熱方麻黃釣藤取皮石膏乾薑半夏曲柴胡甘草枳殼甘菊各等分上為粗末每服四錢水一盞半生薑三片棗一枚同煎至八分去滓溫服釋義麻黃氣味辛溫入足太陽手太陰表散藥中之峻者也釣藤氣味甘微寒入手足厥陰石膏氣味辛大寒入足陽明葛根氣味甘平入足陽明半夏曲氣味辛微溫入足陽明柴胡氣味苦平微辛入手足少陽甘草氣味甘平能緩諸藥之性枳殼氣味苦寒皆入脾甘菊花氣味苦辛涼入肝此治肝厥狀如癇疾以諸風藥驅邪得甘草石膏之甘寒熄風薑棗之和榮衛則正既不傷外邪自然解矣
