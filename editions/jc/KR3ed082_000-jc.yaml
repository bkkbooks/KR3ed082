body:
  text: 後序上本事方釋義十卷先曾祖香岩府君所著也府君精於醫於醫家書多所發明單辭只義門弟子互相傳錄而是書成於乾隆十年方謀付梓遽以明春謝世遂不果書亦散佚迨嘉慶八年已五十餘年矣從弟鈞偶檢遺書獲見殘帙則序文及補傳裒然存焉顧以不見全書為憾因念吳中必有藏弆其副本者既聞城南顧西疇先生家有其書先生亦淑府君之教而以醫著名者會從弟亡而先生亦卒因循至今侄潮暨從侄滋始因先生及門劉子景黃從先生之孫大田假歸鈔錄焉但其所據本與坊刻迥異因復從黃蕘圃孝廉假得宋槧殘本及他本參較同異於是決然知是書之善而坊刻為不足據也昔歸愚沈宗伯為府君作傳稱其於醫不執成見而是書獨墨守古人陳言為之句比字櫛比於唐人疏經不參異議則豈非欲變化於成法之外必神明於成法之中哉恭閱欽定四庫全書簡明目錄稱是書屬詞簡雅多入微之論俗醫不能甚解故罕傳習然則今之操是術者不深微之是究而徒沿習夫淺近之言宜其師心自用以性命為嘗試而不自知其誤也令得是書而朝夕尋覽即所釋之義以求古人配合之妙損益之精將見數十年中必有名世之醫與學士並驅者是則小子刊書之意蓋不獨表揚先德為一傢俬也嘉慶十有八年歲次癸酉夏五月曾孫鍾謹識
