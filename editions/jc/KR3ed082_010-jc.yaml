body:
  text: 卷第十治婦人諸疾治婦人榮衛氣虛挾風冷胸脅膨脹腹中病痛經水愆期或多或少崩中漏下按諸本俱作傷腰腿痛重面色青黃嗜臥無力安胎止痛補虛益血四物湯當歸熟地黃白芍藥芎藭各等分上為粗末每服四錢水一盞煎至八分去滓溫服不拘時候釋義當歸氣味辛甘微溫入手少陰足厥陰熟地黃氣味甘苦微寒入足少陰白芍藥氣味酸微寒入足厥陰芎藭氣味辛溫入足少陽厥陰此四物湯乃女科之聖藥也凡婦女榮衛氣血虛月經愆期懷胎不安腹痛腰疼皆宜加減斟酌用之勿以藥味平淡而忽之也滑胎枳殼散商州枳殼二兩甘草一兩上為細末每服二錢百沸湯點服空心食前日三服凡懷孕六七月以上即服令兒易生初生時胎小微黑百日以後肉漸變白此雖孫真人滑胎易產方然抑陽降氣為眾方之冠釋義枳殼氣味苦寒入足太陰甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性凡婦人肥胖者懷娠六月以後常宜服之庶不致於難產也治妊娠衝任脈虛補血安胎內補圓熟乾地黃二兩按諸本俱無干字當歸一兩微炒上為細末煉蜜圓如桐子大每服三四十圓溫酒下以上三方諸集皆載之在人用之如何爾大率婦人妊娠惟在抑陽助陰素問云陰搏陽別謂之有子蓋關前為陽關後為陰尺中之脈按之搏手而不絕者妊子也婦人平居陽氣微盛無害及其妊子則方且閉經隧以養胎若陽盛搏之則經脈妄行胎乃不固素問所謂陰虛陽搏謂之崩也抑陽助陰之方甚多然胎前藥惟惡群隊按坊本惟作性若陰陽交雜別生他病唯是枳殼散所以抑陽四物湯所以助陰故爾但枳殼散差寒若音服之恐有胎寒腹痛之疾當以內補圓佐之則陽不至強陰不至弱陰陽調勻有益胎嗣此前人未嘗論及釋義熟地黃氣味甘苦微寒入足少陰當歸氣味辛甘微溫入手少陰足厥陰婦人懷妊皆衝任脈用事衝任脈虛不能受胎即使有娠亦不能安固故婦人補血安胎在所必用治婦人有孕傷食木香圓木香二錢匕按周本作二錢七分京三稜白茯苓人參各三錢匕按周本作各三錢七分上為細末麵糊圓如綠豆大每服三十圓熟水下釋義木香氣味辛溫入足太陰京三稜氣味苦平入足厥陰白茯苓氣味甘平淡滲入足陽明人參氣味甘溫入足陽明麵糊和圓欲藥性之緩行也治婦人懷孕飲食不調以致停滯不消者以辛溫疏其滯苦平消其積惟恐傷及胎氣以參苓扶其正則食滯去而胎仍無礙也治妊娠氣不和調飲食易傷按四字周本作飲食少白朮散白朮炒乾紫蘇各一兩白芷微炒三錢人參三錢川芎訶子皮青皮各半兩甘草一錢上為細末每服二錢水一盞姜三片煎七分不拘時候溫服釋義白朮氣味甘溫微苦入足太陰干蘇葉氣味辛溫入足太陽白芷氣味辛溫入足太陽人參氣味甘溫入足陽明川芎氣味辛溫入足少陽厥陰訶子氣味溫澀入手陽明足太陽青皮氣味辛酸微溫入足少陽厥陰甘草氣味甘平入足太陰通行十二經絡緩諸藥之性生薑辛溫入衛凡婦人妊娠氣不調和飲食不節以致脾胃不和必鼓動脾陽使其健運亦必以扶持胎氣為要耳經云飲食自倍脾胃乃傷又云陰之所生本在五味按周本本作過陰之五宮傷在五味若妊子飲食不節生冷毒物恣性食啖必致脾胃之疾故妊娠傷食難得妥藥惟此二方最穩捷治妊娠胎氣不和懷胎近上脹滿疼痛謂之子懸兼治臨產驚恐氣結連日不下紫蘇散紫蘇莖葉一兩按周本無注大腹皮泡按周本無注人參川芎陳橘皮白芍藥各半兩當歸三錢甘草八分按周本作一分上藥細銼分作三服每服用水一盞半生薑四片蔥白七寸煎至七分去渣空心服釋義紫蘇莖葉氣味辛溫入足太陽大腹皮氣味辛溫入足太陰太陽人參氣味甘溫入足陽明川芎氣味辛溫入中少陽厥陰陳皮氣味苦平微溫入手足太陰白芍藥氣味酸微寒入足厥陰當歸氣味辛甘微溫入手少陰足厥陰甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性佐以生薑蔥白之辛通溫散此因胎氣不和腹中疼痛上逆脹滿非調氣養血扶正疏滯不能效也曾有婦人累日產不下服遍催生藥不驗予曰此必坐草太早心下懷懼氣結而然非順與不順也素問云恐則氣下蓋恐則精卻卻則上焦閉閉則氣還還則下焦脹氣乃不行矣得此藥一服便產及婦人六七月子懸者按及字周本作後有二字予用此數數有驗不十服胎便近下按四字周本作胎便安下死胎方桂末二錢麝香當門子一個同研暖酒服須臾如手推下比之用水銀等此藥不損血氣趙和叔傳釋義桂末氣味辛甘大熱入足厥陰麝香當門子氣味辛溫入手足少陰酒性辛溫能行血中之滯故能下死胎也治婦人病多是月經乍多乍少或前或後時發疼痛醫者一例呼為經病不曾說是陰勝陽是陽勝陰所以服藥少得有效蓋陰氣乘陽則胞寒氣冷血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽氣乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前當和其陰陽調其血氣使不相乘以平和為福宜紫石英圓紫石英禹餘糧燒醋淬人參龍骨川烏頭桂心桑寄生杜仲五味子遠志澤瀉當歸石斛蓯蓉乾薑各一兩川椒五錢按周本無注牡蠣甘草各半兩上為細末煉蜜圓如桐子大米飲下三十至五十圓空心食前服釋義紫石英氣味辛溫入足厥陰禹餘糧氣味甘平入手足陽明人參氣味甘溫入足陽明龍骨氣味涼澀入足厥陰川烏頭氣味辛大熱入足太陽少陰桂心氣味辛甘大熱入足厥陰桑寄生氣味甘平入足厥陰養血安胎杜仲氣味辛甘微溫入足少陰厥陰五味子氣味辛酸鹹苦甘微溫入足少陰遠志氣味辛微溫入手足少陰澤瀉氣味鹹微寒入足太陽當歸氣味辛甘微溫入手少陰足厥陰石斛氣味甘平微咸入足太陰少陰厥陰肉蓯蓉氣味鹹溫入足少陰乾薑氣味辛溫入手足太陰川椒氣味辛大溫入足太陰厥陰牡蠣氣味鹹微寒入足少陰甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性大凡用藥務使經絡臟腑陰陽氣血各得其平一有偏勝則諸病蜂起故孫真人即禹餘糧圓增損之著此方不使其陰陽相乘氣血偏陂也治婦人室女月候不通疼痛或成血瘕通經圓桂心青皮去白按周本無注大黃酒炒按周本無酒字乾薑川椒蓬莪朮川烏乾漆當歸桃仁各等分上為細末先將四錢用米醋熬成膏糊餘六錢末成劑臼中杵之圓如桐子大曬乾每服工十圓淡醋湯送下加至三十圓溫酒亦得空心食前日二服釋義桂心氣味辛甘大熱入足厥陰青皮氣味辛酸微溫入足少陽厥陰大黃氣味苦寒入足陽明乾薑氣味辛溫入手足太陰川椒氣味辛溫入足厥陰太陰蓬莪朮氣味辛溫入足厥陰川烏氣味辛大熱入足太陽少陰乾漆氣味苦辛溫入足厥陰當歸氣味辛甘微溫入手少陰足厥陰桃仁氣味辛甘平入足厥陰米醋熬成膏糊圓醋湯送下以醋能泄肝也此婦人及室女經閉腹疼或成血瘕之疾者純用辛溫活血行血之藥使其去故生新而經自通矣徽州靈巫張擴頃年錄事在推勘院有王醫者以醫職直宿日夜與之稔熟口傳此方渠甚秘之予後得此方以治婦人疾不可勝數且欲廣行不敢自秘尋常氣血凝滯疼痛數服便效有一師尼患惡風體倦乍寒乍熱面赤心煩或時自汗是時疫氣大行醫見其寒熱作傷寒治之以大小柴胡湯雜進數日病劇予診視曰三部無寒邪脈但厥陰脈弦長而上出魚際宜服抑陰等藥予制此地黃圓又名抑陰地黃圓按注七字周本無生乾地黃二兩柴胡秦艽黃芩各半兩赤芍藥一兩上為細末煉蜜圓如桐子大每服三十圓烏梅湯吞下不拘時候日三服釋義生乾地黃氣味甘苦微寒入手足少陰厥陰柴胡氣味辛甘平入足少陽秦艽氣味苦平入手足陽明兼入肝膽黃芩氣味苦寒入手太陰少陽赤芍藥氣味苦平入足厥陰能行血中滯烏梅湯送藥亦取其泄肝也師尼寡婦獨陰無陽情欲未遂以致陰陽交爭乍寒乍熱將欲成勞者非此不能治當今之世每多此病惟在審病察脈耳昔齊褚澄按諸本齊俱作宋考褚澄傳見南齊書療尼師寡婦別制方蓋有謂也此二種鰥居獨陰無陽欲心萌而多不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞嘗讀史記倉公傳載濟北王侍人韓女病腰背痛寒熱眾醫皆以為寒熱也倉公曰病得之欲男子不可得也何以知其欲男子不可得而病診其脈肝脈弦出寸口是以知之蓋男子以精為主婦人以血為主男子精盛則思室婦人血盛則懷胎夫肝攝血者也厥陰弦出寸口又上魚際則陰血盛可知故知褚澄之言信有謂矣治婦人月經不調每行數日不止兼有白帶漸漸瘦悴按周本悴作瘁飲食少味累年無子地黃圓干熟地黃一兩一分山茱萸白蕪荑乾薑炒白芍藥銼微炒代赭石醋淬各一兩厚朴白殭蠶炒各一兩按周本缺注上為細末煉蜜圓如桐子大每服四五十圓空心溫酒下日三服釋義熟地黃氣味甘苦微寒入足少陰山茱萸氣味酸微溫入足厥陰白蕪荑氣味辛平入手足陽明足太陰乾薑氣味辛溫入手足太陰白芍藥氣味酸微寒入足厥陰代赭石氣味甘平入手少陰足厥陰厚朴氣味辛溫入足陽明太陰白殭蠶氣味辛鹹平入手足陽明能引藥入絡溫酒送藥亦引入經絡也此婦人月經不調兼有白帶漸漸瘦悴飲食無味累年無子者急宜治之使血氣衝和否則終身不孕育也此龐老方凡婦人有白帶是第一等病令人不產育宜速治之昔扁鵲過邯鄲聞貴婦人多有此病按四字周本無所以專為帶下醫也治婦人月經壅滯每發心腹臍間㽲痛不可忍按周本無間字及治產後惡露不快血上搶心按周本搶作愴迷悶不省氣絕欲死琥珀散荊三稜蓬莪朮赤芍藥劉寄奴牡丹皮官桂熟乾地黃菊花真蒲黃當歸干稱以上各一兩銼上前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為末每服二錢溫酒調空心食前服一方不用菊花蒲黃用烏藥延胡索亦佳此予家之秘方也若是尋常血氣痛只一服產後血衝心二服便下常服尤佳予前後救人急切不少此藥易合宜多合以救人釋義荊三稜氣味苦平入足厥陰蓬莪朮氣味辛溫入足厥陰赤芍藥氣味苦平入足厥陰能行血中之滯劉寄奴氣味苦溫入足厥陰能行血止疼去癥瘕牡丹皮氣味辛平入足少陽官桂氣味辛甘溫入足厥陰熟地黃氣味甘苦微寒入足少陰甘菊花氣味辛涼入手太陰足少陽厥陰蒲黃氣味辛溫入足厥陰當歸氣味辛甘微溫入手少陰足厥陰佐以烏豆之潤而下行生薑之辛溫而通米醋之酸而入肝溫酒送藥引入經絡婦人經水壅滯及產後惡露不快腹臍㽲病血上搶心迷悶欲絕者此藥治之雖方中養血藥少行血疏滯藥多要不過欲其去故生新遂大有功於婦人矣治婦人血瘕血積經候不通桃仁煎桃仁去皮尖麩炒黃大黃川樸消各一兩虻蟲半兩炒黑上藥四味為末以醇醋二升半銀石器中慢火煎取一升五合先下大黃桃仁虻蟲三味不住手攪可取圓時然後下川樸消更不住手攪良久出之圓如桐子大前一日不用吃晚食五更初用溫酒吞下五圓日午取下如赤豆汁雞肝蝦䗫衣按周本䗫作蟆未下再服血鮮紅即止續以調氣血藥補之釋義桃仁氣味辛甘平入足厥陰大黃氣味苦寒入足陽明樸消氣味鹹苦寒入手足太陽陽明厥陰虻蟲氣味鹹苦微溫入足厥陰凡婦人血積血瘕經候不通者非此藥不能治蓋經閉而致結聚有形所以行血消滯之藥不得不重耳此出千金方頃年在毗陵有一貴人妻患小便不通臍腹脹不可忍眾醫皆作淋治如八正散之類數種治皆不應痛愈甚予診之曰此血瘕也非瞑眩藥不能去因用此藥更初服至日午痛大作不可忍遂臥少頃下血塊如拳者數枚小便如墨汁者一二升痛止得愈此藥治病的切然猛烈太峻氣血虛弱者更宜斟酌與之治婦人妊孕六七月因事築磕著胎或子死腹中惡露下疼痛不已口噤欲絕用此藥探之若不損則痛止子母俱安若胎損立便逐下此藥催生神效佛手散當歸川芎各等分上為粗末每服三錢水一小盞煎令泣泣欲干投酒一大盞再煎至一二沸按諸本皆作止一沸去渣溫服口噤灌之如人行五七里再進過二三服便生有一方云此藥治傷胎去血多崩中去血多金瘡去血多撥齒去血多昏暈欲倒者去酒水煎服釋義當歸氣味辛甘微溫入手少陰足厥陰川芎氣味辛溫入足少陽厥陰此治血藥也婦人妊娠六七月而致損傷腹痛以此探之則傷者下而不傷者安矣治崩中下血方黃芩為細末每服一錢燒稱錘淬酒調下凡崩中藥多是用止血及補血藥此治陽氣乘陰按諸本無氣字前所謂天暑地熱經水沸溢者釋義黃芩氣味苦寒入手太陰少陽燒稱錘鐵器也入厥陰酒性辛溫而散入足少陽厥陰此崩中下血乃陽乘於陰也故以苦寒之藥為君治下血不止或成五色崩漏方香附子舂去皮毛中斷之略炒為末每服二錢用清米飲調下此方徐朝奉傳其內人有是疾服遍藥不效後獲此方遂愈須久服為佳亦治產後腹痛大是婦人仙藥常服和血調氣按周本和作益釋義香附子氣味辛微溫入足厥陰能和氣調血清米飲送使其緩行也凡婦人崩漏下血而至五色不止者由乎氣血不調用此方則氣得和血自調矣治產後中風口噤牙關緊急手足瘛瘲愈風散荊芥穗輕焙過一兩為細末每服二錢溫酒調下釋義荊芥穗氣味辛溫入足厥陰溫酒送藥引入經絡凡婦人產後或起居不慎汗出太過腠理開泄風邪入之則牙關緊急手足瘛瘲不省人事以此治之辛溫之味能開竅能解表也經驗產寶皆有此方陳選方中用舉卿古拜二味蓋切腳隱語以秘之也此藥委有奇效神聖之功大抵產室但無風為佳不可衣被帳褥太暖太暖即汗出汗出則腠理開易於中風便致昏冒曾記有一婦人產後遮護太密閣內生火睡久及醒則昏昏如醉不省人事其家驚惶醫用此藥佐以交加散囑云服之必睡睡中必左手搔頭覺必醒矣果如其言交加散治婦人榮衛不通經脈不調腹中撮痛氣多血小結聚為瘕及產後中風按周本無及字中作沖生地黃五兩研取汁生薑五兩研取汁上交互用汁浸一夜各炒黃漬汁盡為度末之尋常腹痛溫酒調服三錢產後尤不可闕釋義生地黃氣味甘苦微寒入手足少陰厥陰生薑氣味辛溫入手足太陰各搗汁互相浸漬炒黃欲其氣味之和也此婦人產後中風榮衛不通經脈不調欲結癥瘕者宜服之用此二味只取乎調氣血耳治婦人諸般淋症虎杖散按諸本俱無症虎杖散四字苦杖根俗呼為杜牛膝按周本呼為作所謂均見俗稱之誤多取淨洗碎之以一合用水五盞煎一盞去渣用麝香乳香少許研調下溫服釋義苦杖即虎杖其根氣味苦微溫入足厥陰麝香氣味辛溫入手足少陰能引入經絡乳香氣味辛微溫入手足少陰能逐瘀濁無論男女淋症小溲疼痛此藥神效蓋下焦本屬至陰之處此方取通則不痛之意鄞縣武尉耿夢得其內人患砂石淋者十三年矣每發按諸本發皆作漩痛楚不可忍溺器中小便下砂石剝剝有聲百方不效偶得此方啜之一夕而愈目所見也半夏散治產後暈絕按五字周本無半夏為末如豆大許以竹管吹入鼻中立醒釋義半夏氣味辛溫入足陽明婦人產後瘀濁內閉致神識如絕吹入鼻中而醒以其辛能開竅也治產後出血太多虛煩發渴蒲黃散真蒲黃末二錢米飲調下渴燥甚新汲水調下釋義蒲黃氣味辛微溫入足厥陰產後亡血過多虛煩發渴是孤陽上升米飲調送和其中也新汲水調送欲陽氣之下行也此藥取其能去故生新以和陽耳治妊娠時氣身大熱令子不落護胎方伏龍肝為末水調塗臍下二寸干則易之差即止又方取井泥塗心下干則易釋義伏龍肝氣味辛鹹微溫入足厥陰水調塗臍下二寸以土和水性乃涼也妊娠患傷寒身大熱胎不安以之護胎則血靜而安矣井泥塗心下亦此義也又方浮萍干川樸消蛤粉大黃切碎微炒板藍根各一兩按周本無板字上為末水調封臍上安胎解煩熱極妙釋義浮萍氣味辛寒入手太陰足厥陰能解風熱樸消氣味鹹苦寒入手足太陽陽明厥陰蛤粉氣味鹹寒入足少陰厥陰大黃氣味苦寒入足陽明藍根氣味苦甘寒入足厥陰能解熱毒懷孕而患時熱之病胎動不安者得諸涼藥以解其熱則血寧靜而胎自安矣婦人患頭風者十居其半每發必掉眩如在舟車上蓋因血虛肝有風邪襲之耳素問云徇蒙招搖目眩耳聾上虛下實過在足少陽厥陰甚則歸肝蓋謂此也予嘗處此方以授人比他方藥捷而效速芎羌散川芎一兩當歸三分羌活旋覆花蔓荊子細辛石膏藁本荊芥穗半夏曲炒防風熟地黃甘草各半兩上為末每服一錢水一大盞姜三片同煎至七分去渣溫服不拘時候釋義川芎氣味辛溫入足少陽厥陰當歸氣味辛甘微溫入手少陰足厥陰羌活氣味辛甘平入足太陽旋覆花氣味鹹溫入手太陰陽明蔓荊子氣味辛溫入足太陽細辛氣味辛溫入足少陰太陽石膏氣味辛寒入足陽明藁本氣味辛溫入足太陽荊芥穗氣氣味辛溫入足厥陰半夏曲氣味辛溫入足陽明防風氣味辛甘溫入足太陽熟地黃氣味甘苦微寒入足少陰甘草氣味甘平入足太了陰通行十二經絡能緩諸藥之性婦人患頭風者頗多皆因血虛肝有風邪乘之此方風藥居多辛溫辛涼之味恐升騰太過故以地黃之甘苦微寒甘草之甘平和緩以調之則經絡不致受傷而肝家之風邪自熄耳婦人產後有三種疾鬱冒則多汗多汗則大便秘故難於用藥唯麻子蘇子粥最佳且穩紫蘇子大麻子二味各半合淨洗研極細再用水再研取汁一盞分二次煮粥啜之此粥不唯產後可服大抵老人諸虛人風秘皆得力嘗有一貴人母年八十四忽爾腹滿頭疼噁心不下食召醫者數人議皆供補脾進食治風清利頭目藥數日病愈甚全不入食其家憂懼懇予辨之予謂之曰藥皆誤矣此疾止是老人風秘臟腑按諸本止作正壅滯聚於膈中則腹脹噁心不喜食又上至於巔則頭痛神不清也若得臟腑流暢諸疾悉去矣予令作此粥兩啜而氣泄先下結屎如胡桃者十餘枚後漸得通利不用藥而自愈釋義紫蘇子氣味辛溫入手太陰足厥陰能降逆下氣大麻子氣味辛甘平而潤入手足陽明足太陰能潤腸胃凡產後婦人及老年人血液枯燥風秘便艱皆用之有驗一取其降氣一取其潤腸雖藥味殊常而功效甚捷也治婦人天癸已過期經脈不勻或三四月不行或一月再至腰腹疼痛素問云七損八益謂女子七七數盡而經脈不依時者血有餘也不可止之但令得依時不腰痛為善宜此當歸散當歸川芎白芍藥黃芩各銼炒各一兩白朮半兩山茱萸一兩半上為細末每服二錢溫酒調下空心食前日三服如冷去黃芩加桂一兩釋義當歸氣味辛甘微溫入手少陰足厥陰川芎氣味辛溫入足少陽厥陰白芍藥氣味酸微寒入足厥陰黃芩氣味苦寒入手太陰少陽白朮氣味甘溫微苦入足太陰山茱萸氣味酸微溫入足厥陰溫酒調送欲藥性之入經絡也益女子月經或先期或過期皆由氣血偏勝惟調之使其和平為妥耳治婦人臟躁大棗湯甘草三兩小麥一升大棗十枚上藥㕮咀以水六升煮三升去渣溫分三服亦補脾氣鄉里有一婦人數欠伸按三字周本作數次下同無故悲泣不止或謂之有祟祈禳請禱備至終不應予忽憶金匱有一症云婦人臟躁悲傷欲哭象如神靈所作按四字周本作神虛二字數欠伸者麥甘大棗湯按周本無麥甘二字予急令治此藥盡劑而愈古人識病制方種種妙絕如此試而後知釋義甘草氣味甘平入足太陰小麥氣味甘微寒入手少陰太陽大棗氣味甘平入足太陰婦人臟躁悲傷欲哭狀如遇祟者諸藥無效此方能治之益脾土為萬物之母中土不振則木來乘之藥雖三味甘棗獨補脾小麥獨入心以火為土之母也火土有權中宮有恃病何自而來哉治妊娠熱病胎死腹中鹿屑湯鹿角屑一兩水一碗蔥白五莖豆豉半合同煎至六分去渣溫分二服釋義鹿角屑氣味鹹溫入足少陽太陽通督脈蔥白氣味辛溫通而兼散入足太陽厥陰豆豉氣味苦寒入手足太陰陽明因妊娠患熱病致胎死腹中者此方主之大凡婦人懷孕沖任督脈氣旺方能穩固今因熱病而胎傷欲下之者必通此沖任督脈而後能下也治婦人生產數日不下及胞衣死胎不下者方用蓖麻子七粒去殼研如泥塗足心才下便急洗去此崔元亮海上方人但未知耳政和中一鄉人之妻產二日不下予令漫試之一塗俄頃便下自後常用極驗釋義蓖麻子氣味苦辛溫入手足陽明最能入經絡凡婦人致胞衣不下者及胎死不能下者由乎經絡不開也此方只通陽明以陽明能束筋骨而利機關故效驗之速耳小兒病方凡候小兒脈當以大指按三部一息六七至為平和按周本無七字十至為發熱五至為內寒按諸本寒皆作脹脈緊為風癇沉緩為傷食促急為虛驚弦急為風氣不和沉細為冷浮為風大小不勻為惡候為鬼祟浮大數為風為熱伏結為物聚單細為疳勞腹痛多喘嘔而脈洪者為有蟲沉而遲按諸本沉作浮下歌中同潮熱者胃寒也溫之則愈予嘗作歌以記之歌曰少兒脈緊風癇候沉緩傷食多吐嘔弦急因知氣不和急促虛驚神不守冷則沉細風則浮牢實大便應秘久腹痛之候緊而弦脈亂不治安可救變蒸之時脈必變不治自然無過謬單細疳勞洪有蟲大小不勻為惡候脈沉而遲有潮熱此必胃寒來內寇按周本內作作瀉利浮大不可醫仔細斟量宜審究凡嬰兒未可脈方者按周本無方字俗醫多看虎口中紋顏色與四肢冷熱驗之亦有可取予又以二歌記之虎口色歌曰紫熱紅傷寒按諸本熱皆作色青驚白色疳黑時因中惡黃即困脾端四肢冷熱症歌曰按諸本無四肢二字鼻冷定知是痘症按諸本痘症皆作瘡疹耳冷應知風熱症通身皆熱是傷寒上熱下冷傷食病若能以色脈參伍驗之所得亦過半矣治小兒一切驚肝食積風癇之證按諸本肝皆作疳睡驚圓使君子肉五拾個燒存性按諸本俱無肉字香墨棗大一塊金銀箔各五片按諸本俱作各五分膩粉二分按周本作二錢上藥先將使君子肉墨二味研細次入金銀箔於乳缽內同研次入膩粉並麝香少許研令極細勻稀糊圓如桐子大陰乾每服一圓薄荷湯磨下一歲以下半圓一名青金丹極效鄉里有一士人家貨此藥日得數千錢按周本千作十已百餘年矣釋義使君子肉氣味甘溫入足太陰陽明香墨氣味甘溫入足少陰厥陰金銀箔氣味辛平入手太陰足厥陰膩粉氣味甘寒入足厥陰陽明麝香氣味辛溫入手足少陰厥陰薄荷湯送引藥入經絡也小兒驚肝食積風癇之症皆由中宮氣餒以致肝風內動此藥能安土熄風故用之良驗也治小兒嘔吐脈數有熱麥門冬散麥門冬半夏曲人參茯苓各二錢甘草一錢上為細末每服二錢水一盞姜三片煎五分去渣溫服日二三服釋義麥門冬氣味甘寒微苦入手太陰少陰半夏曲氣味辛微溫入足陽明人參氣味甘溫入足陽明茯苓氣味甘平淡滲入足陽明能引藥達下甘草氣味甘平入足陽明通行十二經絡能緩諸藥之性生薑氣味辛溫入手足太陰凡小兒中虛嘔吐脈數有熱久延惟恐成驚故以甘寒之藥清其熱而以甘溫緩中之藥護其中佐以辛溫之達表表裡既和病自減矣治小兒嘔吐脈遲細有寒白朮散白朮人參各二錢按周本作各二錢五分半夏曲二錢茯苓乾薑甘草各一錢上為細末每服二錢水一盞姜三片棗一枚擘去核煎至七分去渣溫服日二三服一方無半夏曲有木香藿香按注十字諸本俱無釋義白朮氣味甘溫微苦入足太陰人參氣味甘溫入足陽明半夏曲氣味辛微溫入足陽明茯苓氣味甘平淡滲入足陽明乾薑氣味辛溫入手足太陰甘草氣味甘平入足太陰薑棗之辛溫甘和榮衛小兒夾寒嘔吐脈遲細者恐延成慢驚故必溫養中宮通調榮衛則正氣旺而嘔吐除病何由入乎治小兒久傷脾胃腹脹調中圓乾薑橘紅白朮茯苓木香縮砂仁官桂良薑各等分上為細末稀糊圓如麻子大每服二十圓加至三十圓食後溫水送下釋義乾薑氣味辛溫入手足太陰橘紅氣味苦辛微溫入手足太陰白朮氣味甘溫微苦入足太陰茯苓氣味甘平淡滲入足陽明木香氣味辛溫入足太陰砂仁氣味辛溫入足太陰少陰官桂氣味辛甘溫入足厥陰良薑氣味辛溫入足厥陰小兒脾胃久傷肚腹膨脹由乎脾陽之氣失職故調中之藥多佐以辛溫之味則脾陽蘇而病減矣治小兒疳瘦瀉白水腹膨脹芎樸圓按自此至扁銀圓四方周本及舊抄本皆缺芎藭厚朴各一兩白朮半兩上為細末煉蜜圓如小豆子大每服一圓米飲化下小兒三歲以下只可服半圓釋義芎藭氣味辛溫入足少陽厥陰厚朴氣味辛溫入足太陰陽明白朮氣味甘溫微苦入足太陰小兒疳蝕瀉白水腹膨脹因脾傷不主流行滯濁竊踞中焦而為積聚故以辛溫疏其滯以甘溫補其虛並藉辛溫以升舉其下陷之陽則瀉止脹消何疳瘦之足憂治小兒吐瀉大便酸臭消積圓此由小兒啼哭未盡以乳與之傳積不化按注十六字坊本無丁香九粒去油按坊本無去油二字縮砂仁十三粒巴豆二粒去皮膜心油淨烏梅肉二個上為細末麵糊圓如黍米大三歲以上三五圓三歲以下二三圓溫水下不拘時候米飲下亦得釋義丁香氣味辛溫入足陽明太陰砂仁氣味辛溫入足少陰太陰巴豆氣味辛溫入足太陰陽明烏梅肉氣味酸平入足厥陰此小兒吐瀉酸臭由乎脾胃積聚不消乾健之陽失司故以辛溫理陽疏滯又恐肝木犯土而以酸泄佐之則中宮陽氣得蘇自然向安矣治小兒小便不通捻頭散延胡索川苦楝子各等分上為細末每服半錢或一錢捻頭湯調下量兒大小與之食前服捻頭湯即沸湯中點滴油數點是按十三字字坊本無釋義延胡索氣味辛溫入足厥陰川苦楝子氣味甘寒入手足厥陰此苦辛泄降之方也凡小兒小便不通亦是厥陰為病肝不疏泄故必用疏肝之法治小兒急慢驚風積痼扁銀圓青黛三錢水銀一皂角大同黑鉛炒結成砂子按坊本皂角下有大字寒食麵黃明膠各二錢炒焦研細輕粉豆大許一塊炒雄黃粉霜硃砂各一兩腦麝少許巴豆二十一粒去油上藥研細滴水為圓如麻子大捏扁曝乾磁盒盛之小兒一歲一圓隨意加減煎棗子湯送下不得化破釋義青黛氣味苦辛微寒入足厥陰水銀氣味辛寒能行九竅能伏五金為泥寒食麵氣味甘平入足陽明黃明膠氣味鹹溫入足太陰厥陰輕粉氣味辛寒入足厥陰雄黃氣味苦辛甘微溫入足厥陰粉霜氣味酸辛寒入足厥陰硃砂氣味苦溫入手少陰腦麝氣味辛溫入手足少陰巴豆氣味辛溫入足太陰陽明棗子湯送緩藥性也此方治小兒急慢驚風積痼之疴雖然屢有效驗但內多金石之品司是術者宜細心斟酌焉大凡急驚宜涼瀉慢驚宜溫補此一定法人皆知之矣惟慢脾風因吐瀉脾胃受風為難治亦難得合式之藥按七字周本作難得藥近世多用生附子及青洲白圓子金液丹合用之如醒脾圓皆要藥也治小兒慢脾風因吐利後虛困昏睡欲生風癇醒脾圓厚朴白朮舶上硫黃天麻各半兩全蠍防風人參官桂各一分上為細末酒浸蒸餅和圓如雞頭大每服一圓槌研溫米飲送下釋義厚朴氣味辛溫入足太陰陽明白朮氣味甘溫微苦入足太陰舶上硫黃氣味辛大熱入命門天麻氣味辛平入足陽明厥陰能熄肝風全蠍氣味甘平入足厥陰防風氣味辛甘微溫入足太陽人參氣味甘溫入足陽明官桂氣味辛甘溫入足厥陰酒浸蒸餅和丸溫米飲送欲藥性之入里兼以和中也小兒慢脾風症因吐利後神倦如昏睡欲生風癇者皆脾土虛弱中宮受困致肝木乘虛侵克故專以辛甘溫之藥培其土佐以辛散熄其風則中土既旺肝木退位風癇何自而生耶又方全蠍二個青薄荷葉包煨按諸本二俱作一白朮指面大二塊麻黃長五寸十個去節上為細末二歲以下服一字三歲以上服半錢薄荷湯調下量兒大小加減服釋義全蠍氣味甘平入足厥陰白朮氣味甘溫微苦入足太陰麻黃氣味辛溫入足太陽薄荷湯送藥亦是升陽之意慢脾風因吐利後脾陽下陷非風藥不能升其陽非守中不能扶其正故專用甘溫辛溫之品治脾風多困人參散人參冬瓜仁各半兩天南星一兩切片用薑汁漿水制存性按周本製作煮上為細末每服一錢水半盞煎二三分溫服釋義人參氣味甘溫入足陽明冬瓜仁氣味甘微寒入手太陽手足陽明天南星氣味辛溫入手足太陰小兒神識昏倦多困脾虛風動欲成慢驚故以甘溫護其中甘寒辛溫泄其風則正氣旺而神識安矣治小兒胎虛氣弱吐利生風昏困嗜臥或潮熱如驚搐按如驚二字周本作發字蠍稍圓全蠍微炒白附子煨制各半兩通明硫黃一兩半夏一兩切片姜汗制焙乾上為細末薑汁圓如麻子大每服三十粒荊芥湯下更看兒之大小加減服釋義全蠍氣味甘平入足厥陰白附子氣味辛甘大溫入足陽明硫黃氣味辛大熱入命門半夏氣味辛溫入足陽明薑汁和丸取其辛溫能通神明荊芥湯送亦以泄風也小兒胎虛氣弱吐利生風昏困嗜臥微熱如驚搐者用之頗驗然太剛猛亦宜細心斟酌為妥治小兒拗哭龍齒散按周本齒作腦龍齒按周本作龍腦注齒亦可蟬殼釣藤有鉤子者羌活茯苓人參各等分上為細末每服一大錢水一大盞煎至六分去渣溫熱服不拘時候按七字周本作溫服喜熱熱服釋義龍齒氣味涼澀入足厥陰蟬殼氣味甘鹹寒入足少陽厥陰釣藤氣味甘微寒入足厥陰羌活氣味辛甘平入足太陽茯苓氣味甘平淡滲入足陽明人參氣味甘溫入足陽明小兒無故拗哭亦因肝風內動脾胃不和所致故以風藥泄其風而以鎮補之藥護其中也
