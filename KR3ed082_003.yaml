才下血面如蠟不進食蓋酒病也授此方服之終劑而血止面色鮮潤食亦倍常新安有一兵士亦如是與三百粒作十服亦愈釋義膽礬氣味鹹酸微涼入足太陽陽明黃蠟氣味甘平微溫入手足太陰青州棗氣味甘平微溫入手足太陰陽明蠟茶氣味苦寒直降欲其速下也煉藥以醋者約之也送藥以米飲者扶中也此治脫力勞傷飢飽不調宿有痃癖周身發黃欲變成水蠱非滲濕之藥不能引藥入於病所故效驗獨捷耳酒客發黃便血尤宜服此藥治沉積感應圓丁香木香各半兩乾薑一兩百草霜二兩研肉豆蔻二十個巴豆七十個取霜杏仁一百四十個煮酒臘糟四兩麻油一兩如冬月增半兩減臘糟半兩按宋本如作秋上以二香薑蔻為細末並三味研極勻煉油臘糟和成濟油紙裹旋圓如緑豆大熟水下五七圓此藥近年盛行於世有數方惟此方最高豫得之於王景長用之的有準釋義丁香氣味辛溫入手足太陰陽明木香氣味辛溫入足太陰乾薑氣味辛溫入手足太陰百草霜氣味苦辛溫入足太陰厥陰肉豆蔻氣味辛溫入足太陰陽明巴豆氣味辛溫入足太陰陽明杏仁氣味苦辛微溫入手太陰陽明煮酒臘糟氣味辛溫入足少陽厥陰麻油氣味甘平入足厥陰此藥治運年宿積欲達病所必以辛香欲去宿積必投巴豆再佐以糟之辛溫麻油之滑潤焉有不能祛除宿病耶治五種積氣三焦痞塞胸膈滿悶背膂引疼心腹膨脹脅肋刺痛食飲不下噎塞不通嘔吐痰逆口苦吞酸羸瘦少力短氣煩悶常服順氣寬中消痃癖積聚散驚憂恚氣按宋本無散字宜服枳殼散枳殼荊三稜橘皮益智仁蓬莪朮檳榔肉桂各一兩乾薑厚朴甘草青皮木香肉豆蔻各半兩上為細末每服二錢水一盞生薑三片棗一個同煎至七分熱服鹽點亦得不拘時候釋義枳殼氣味苦寒入足太陰荊三稜氣味苦平入足厥陰橘皮氣味苦辛微溫入手足太陰益智仁氣味辛溫入足太陰逢莪朮氣味苦辛溫入足厥陰與三稜同功檳榔氣味辛溫入足太陰太陽肉桂氣味辛熱入足厥陰乾薑氣味辛溫入手足太陰厚朴氣味苦辛微溫入手足太陰甘草氣味甘平入脾青皮氣味苦辛溫微酸入足厥陰木香氣味辛溫入脾肉豆蔻氣味辛溫入足太陰陽明佐以薑棗和榮衛乃寬中順氣之藥能治五種積氣三焦痞塞心疼腹脹痃癖諸症無非令中宮之氣流暢勿使其不宣也治氣食憂勞思慮五噎膈氣圓半夏桔梗各二兩肉桂枳殼各一兩半上為細末薑汁糊圓如梧子大薑湯下三十圓食後臨臥服釋義半夏氣味辛溫入足陽明桔梗氣味苦辛平入手太陰為諸藥之舟楫能引藥達上肉桂氣味辛甘大熱入足厥陰枳殼氣味苦寒入足太陰薑汁圓薑湯送欲令藥之入里也此七情六欲之傷致成五噎膈氣之疴所用之藥乃苦辛以開其鬱使升降無阻自然奏效矣治胸膈悶塞作噎薰膈圓麥門冬甘草各半兩人參桂心細辛川椒運志去心炒按宋本作運志肉附子乾薑各二錢上為細末煉蜜圓如雞頭大綿裹一圓含化食後日夜三服釋義麥門冬氣味甘涼微苦入手太陰少陰甘草氣味甘平入足太陰人參氣味甘溫入足陽明桂心氣味辛甘大熱入足厥陰細辛氣味辛溫入足少陰川椒氣味辛熱入足厥陰運志氣味辛溫入手足少陰附子氣味辛鹹大熱入手足少陰乾薑氣味辛溫入手足太陰因胸膈悶塞作噎致不能納食雖藉辛溫諸藥以通之又惟恐津液被劫必以甘涼滋養之味護其中愈加得力矣治膀胱疝氣小腸精漏諸病治膀胱疝氣外腎腫脹痛不可忍念珠圓乳香硇砂各三錢水飛淨黃蠟一兩上乳香研細硇砂同研勻熔蠟和圓分作一百單八粒按宋本單作丹以線穿之露一夕次日用蛤粉為衣旋取一粒用乳香湯吞下頃年有人貨疝氣藥肩上擔人我二字以為招口日貨數千錢有一國醫多金得之用之良驗即此方也按四字宋本無釋義乳香氣味辛香微溫入手足少陰最能止痛硇砂氣味鹹苦微溫入足太陽陽明厥陰最能軟堅消積黃蠟氣味甘平微溫亦淡而能滲故俗諺有味如嚼蠟之說圓必作一百單八粒為率者以頭痛之極必起善念念佛之時想病勢之必減也故以之為名蛤粉為衣取其咸能潤燥而軟堅也再以乳香湯送藥者欲其速止痛也此治外腎腫脹及疝氣等疾皆有效驗硇砂圓木香沉香巴豆肉全者各一兩青皮一兩不去皮按宋本一作二銅青半兩研硇砂一分上二香青皮三味細銼同巴豆慢火炒令紫色為度去巴豆為末入青砂二味研勻蒸餅和圓如梧子大每服七圓至十圓鹽湯吞下日二三服空心食前服釋義木香氣味辛溫入足太陰沉香氣味苦辛溫入足少陰巴豆肉氣味辛溫入足太陰陽明青皮氣味苦辛酸微溫入足厥陰銅青氣味酸平入足少陽厥陰能殺疳蟲硇砂氣味鹹苦微溫入足太陽陽明厥陰蒸餅和圓鹽湯送藥不欲藥性之發於上也此治同上病而藥比上略峻司是術者宜留心斟酎也治膀胱腫硬牽引疼痛及治小腸氣陰囊腫毛間水出服金鈴圓金鈴子肉五兩茴香炒馬藺花炒菟絲子海蛤破故紙海帶各三兩木香丁香各一兩上為細末蒸餅和圓按宋本無蒸餅二字如梧子大每服二三十圓溫酒送下鹽湯亦可空心食前服釋義金鈴子氣味苦微寒入手足厥陰茴香氣味辛溫入足厥陰馬藺花氣味甘平入足厥陰能治惡瘡去白蟲菟絲子氣味甘平入脾腎海蛤氣味鹹寒入足少陰厥陰破故紙氣味苦辛大溫入足太陰兼入命門海帶氣味鹹寒入足厥陰木香氣味辛溫入足太陰丁香氣味辛溫入足陽明厥陰蒸餅和圓鹽湯送皆欲藥之達下也膀胱腫硬疼痛及小腸疝氣陰囊腫毛間水出者非此藥不能直行病所味苦者為君諸藥之辛而咸者皆從之下行耳治小便難小腸脹不急治殺人上用蔥白三斤細銼炒令熱以帕子裹分作兩處更替尉臍下即通釋義蔥白氣味辛溫通而兼散入足太陽厥陰炒熱尉臍下乃關元穴也得濁氣下行小便通而脹緩矣此備急之要方也治膀胱氣痛茴香散茴香金鈴子肉蓬莪朮荊三稜各一兩甘草半兩炙上為細末每服二錢熱酒調下強幼安云每發痛甚連日只服此藥每日二三服立定頃在徽城日歙尉宋苟甫膀胱氣作疼不可忍醫者以剛劑與之疼愈甚小便不通三日矣臍下虛脹心悶豫因候之見其面赤黑脈洪大豫曰投熱藥太過陰陽痞塞氣不得通一之奈何宋尉尚手持四神丹數粒云醫者謂痛不止更服此豫曰若服此定斃後無悔渠懇求治豫適右五苓散一兩許分三服易其名用連須蔥一莖茴香一撮鹽一錢水一盞半煎七分令接續三服中夜下小便如墨汁者一二升臍下寬得睡翌日診之脈已平矣櫝用硇砂圓與之數日瘥大抵此疾因虛得之不可以虛而驟投補藥經云邪之所湊其氣必虛留而不去其病則實故必先滌所蓄之邪然後補之是以諸方多借巴豆氣者謂此也釋義茴香氣味辛溫入足厥陰金鈴子肉氣味苦微寒入手足厥陰蓬莪朮氣味苦辛溫入足厥陰荊三稜氣味苦平入足厥陰甘草氣味甘平入足太陰能緩諸藥之性熱酒調送欲藥性之入厥陰也此治膀佻氣痛不可忍者剛劑屢投而效故治以攻堅破積之藥雖有緩中之品而苦辛泄肝之藥居多氣既得泄病自緩矣治遺精夢漏關鎖不固金鎖丹亦名茴香圓舶上茴香胡蘆巴破故紙白龍骨以上各一兩木香一兩半胡桃肉三七個研羊石子三對批開鹽半兩擦炙熟研如膏按宋本擦作攃如膏作如法上五味為細末下二味同研成膏和酒浸蒸餅為糊杵熟圓如梧子大每服三五十圓空心溫酒下釋義舶上茴香氣味辛溫入足少陰厥陰胡蘆巴氣味辛溫入足少陰破故紙氣味辛大溫入足太陰兼入命門白龍膏氣味涼澀入手足少陰厥陰木香氣味辛溫入足太陰胡桃肉氣味溫澀入足少陰羊石子氣味辛甘微咸入足少陰酒浸酒送欲其入里也此治遺精夢漏關鎖不固以補腎之品佐以辛香固澀則下焦有恃鮮不中病矣治經絡熱夢漏心忪恍惚膈熱清心圓好黃柏皮一兩上為細末用生腦子一錢同研勻煉蜜圓如梧子大每服十圓至十五圓濃煎麥門冬湯下大智禪師方云按宋本無雲夢遺不可全作虛冷亦有經絡熱而得之也釋義黃柏氣味苦寒入手足少陰生腦子即冰片也氣味辛香大熱通行十二經絡引藥入里走竅之藥送以麥門冬欲令入心也此症非腎虛不固系經絡內熱故取苦寒以堅陰辛香以入絡也豬苓圓上用半夏一兩破如豆大用木豬苓四兩先將一半炒半夏黃色不令焦地上出火毒半日取半夏為末更用前豬苓末二兩同研極勻煉蜜糊圓如梧子大候乾更再用存下豬苓二兩炒微裂同用不泄氣沙瓶養之每服三四十圓空心溫酒或鹽湯下常服於未申之間冷酒任下按取半夏為末以下宋本作糊圓如梧子大候乾更用前豬苓末二兩炒微裂同用不泄沙瓶養之空心溫酒鹽湯下三四十圓常服於申未間冷酒下釋義木豬苓氣味苦微寒入足太陽半夏氣味辛溫入足陽明送藥以酒鹽湯者欲藥性之下行也此治年壯之人情欲萌動精雖未泄已離本位溺管中疼或兼夢遺者未可作下虛治宜以此藥治之大凡看病切勿見病治病耳此藥治夢遺有數種下元虛憊精不禁者宜服茴香圓年壯氣盛久節淫欲經絡壅滯者宜服清心圓有情欲動中經所謂所願不得名曰白淫耳宜良方茯苓散正如瓶中煎湯氣盛盈溢者如瓶中沸湯而溢欲動心邪者如瓶之傾側而出虛憊不禁者如瓶中有罅而漏不可一概用藥也又有一說經曰腎氣閉即精泄素問云腎者作強之官伎巧出焉又曰腎氣藏精蓋腎能攝精氣以生育人倫者也或斂或散皆主於腎今也腎氣閉則一身之精氣無所管攝故妄行而出不時也豬苓圓一方正為此設蓋古方也今盛行於時而人多莫測其用藥之意蓋半夏有利性而豬苓導水蓋導腎氣使通之意也豫藥囊中常貯此藥緩急以與人三五服皆隨手而驗林監丞庇民亦數服而愈
