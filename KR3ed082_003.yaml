body:
  text: 卷第三風寒濕痹白虎歷節走注諸病治風濕四肢浮腫肌肉麻痹甚則手足無力筋脈緩急宜續斷圓川續斷萆薢當歸切微炒附子防風天麻各一兩乳香沒藥各半兩川芎三分上為細末煉蜜圓如梧子大每服三四十圓溫酒或米飲下空心食前釋義川續斷氣味苦辛微溫入足厥陰萆薢氣味苦平入足太陽當歸氣味辛溫入手少陰足厥陰附子氣味辛鹹大熱入手足少陰防風氣味辛甘平入足大陰天麻氣味辛平入足陽明厥陰乳香氣味辛微溫入手足少陰沒藥氣味苦平入足陽明川芎氣味辛溫入肝膽此風濕之邪久伏致肢浮肌腫麻痹不仁諸患先以養血溫經之藥佐以祛風利濕之品使以入絡之味又以酒送藥則三焦臟腑經脈之間皆行藥力鮮不中病矣治榮衛澀少寒濕因而從之痹滯關節不利而痛者增損續斷圓楊吉老方川續斷薏苡仁牡丹皮桂心山芋白茯苓黃耆山茱萸石斛麥門冬各一兩乾地黃三兩人參防風炙白朮炮鹿角膠各七錢上為細末煉蜜圓如梧子大每服三四十圓溫酒下空心食前釋義川續斷氣味苦辛微溫入足厥陰薏苡仁氣味甘平淡滲入手足太陰牡丹皮氣味辛平入足少陽桂心氣味辛甘熱入足厥陰山芋氣味甘平入脾胃茯苓氣味甘平淡滲能引藥達下入足陽明黃耆氣味甘平入手足太陰山茱萸氣味酸微溫入肝腎石斛氣味甘平微苦入足三陰麥門冬氣味甘寒微苦入手太陰少陰乾地黃氣味甘寒微苦入足少陰人參氣味甘溫入足陽明防風氣味辛甘平入足太陽白朮氣味甘溫入脾鹿角膠氣味鹹溫入足太陽少陰此寒濕之邪因榮衛澀少乘虛而入致痹滯關節不利而痛者以補足三陰之藥固本以滲利祛風之品祛病則三焦榮衛皆不致受病矣治風寒濕痹麻木不仁川烏粥法川烏生為末上用香熟白米作粥半碗藥末四錢同米用慢火熬熟稀薄不要稠下薑汁一茶匙按宋本作茶腳蜜三大匙攪勻空腹啜之溫為佳如是中濕更入薏苡仁末二錢增米作一中碗服此粥大治手足四肢不遂按宋本遂作隨痛重不能舉者有此證預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝克故疾在四肢穀氣能引風溫之藥徑入脾經故四肢得安此湯劑有力豫嘗制此方以授人服者良驗釋義川烏氣味苦辛大熱入足太陰少陰能行走經絡風寒濕三氣之邪流入經脈隧道致氣血壅滯麻痹不仁四肢不遂夫邪客於肝肝必侵犯脾土故肝脾相犯之候每多此症非辛熱善行走之藥不能直入病所獨用一味者欲其力量之大而專也治濕傷腎腎不養肝肝自生風遂成風濕流注四肢筋骨或入左肩髃肌肉疼痛漸入左指中薏苡仁散薏苡仁一兩當歸小川芎乾薑甘草官桂川烏一方無此按宋本無注防風茵芋人參羌活白朮麻黃獨活各半兩上為細末每服二錢空心臨臥溫酒調下日三服釋義薏苡仁氣味甘平淡滲入手足太陽當歸氣味辛甘微溫入足厥陰小川芎氣味辛溫入肝膽乾薑氣味辛溫入手足太陰甘草氣味甘平入脾官桂氣味辛溫入足厥陰川烏氣味苦辛大熱入足太陽少陰防風氣味辛甘平入足太陽茵芋氣味苦辛溫入手足陽明太陰人參氣味甘溫入足陽明羌活氣味辛甘平入足太陽善能行水白朮氣味甘溫入手足太陰麻黃氣味辛溫入足太陽之表獨活氣味苦辛甘平入足少陰厥陰引經之藥溫酒調送亦引經也此三氣之邪流注經絡肌肉筋骨皆受邪困是肝脾腎三臟皆病也故以甘緩辛溫之補藥守護中焦而以滲利行經表散之藥驅逐流注之邪則久郁之病可一旦掃除矣治五種痹腿並臂間發作不定此脾胃虛衛氣不溫分肉為風寒濕所著芎附散小川芎附子黃耆白朮防風熟乾地黃當歸桂心柴胡甘草以上各等分上為粗末每服四錢水一盞半生薑三片棗一個同煎至七分去渣食前日三服常服不生壅熱兼消積冷釋義小川芎氣味辛溫入肝膽附子氣味辛鹹大熱入手足少陰黃耆氣味甘平入手足太陰白朮氣味甘溫入手足太陰防風氣味辛甘平入足太陽熟地黃氣味甘寒微苦入腎當歸氣味辛甘溫入肝桂心氣味辛甘熱入肝柴胡氣味辛平入足少陽甘草氣味甘平能行十二經絡緩諸藥之性此衛氣不溫分肉間為三氣所乘致留著不去故發作無定以補血養氣之藥護持正氣以風藥及辛熱之藥搜逐留著之邪則衛氣堅固無隙可乘病亦何從入哉治白虎歷節諸風疼痛遊走無定狀如蟲齧晝靜夜劇及一切手足不測疼痛麝香圓川烏大八角者三個生用全蠍二十一個生用黑豆二十一粒生曬用地龍半兩生用上為細末入麝香半字匕同研勻糯米煮糊為圓如緑豆大每服七圓甚者十圓夜臥令膈空溫酒下微出冷汗一身便瘥釋義此即古方中之蠲痛丹也川烏氣味苦辛大熱入足太陽少陰全蠍氣味甘平入足厥善能走經絡黑豆氣味苦平入足少陰地龍氣味鹹寒入足陽明厥陰能行諸經絡麝香氣味辛香微溫善能入竅白虎歷節諸風痛楚無時流走無定送藥以酒亦是引經非辛香不能走竅非辛熱能行之藥不能入絡非甘平鹹寒及穀味不能調和正氣痛既蠲病鮮不愈矣豫得此方凡是歷節及不測疼痛一二服便瘥在歙州日按宋本州作川有一貴家婦人遍身走注疼痛至夜則發如蟲齧其肌多作鬼邪治豫曰此正歷節病也三服愈歷節宜發汗麻黃散麻黃一兩一分羌活一兩黃芩三分細辛真華陰者黃耆各半兩上為粗末每服五錢水二盞煎至八分去渣溫服接續三四服有汗慎風按宋本作畏風釋義麻黃氣味辛溫達表入足太陽羌活氣味辛甘平入足太陽黃芩氣味苦寒入手太陰手足陽明細辛氣味辛溫入足少陰黃耆氣味甘平入手足太陰此因歷節痹痛當發汗表邪以麻羌之辛溫表散以芩辛之苦幹和內以耆之甘平固表斯發汗而表不傷邪去而正氣愈旺也非深明大道者乎治歷節腫滿疼痛茵芋圓茵芋硃砂薏苡仁各一分牽牛子一兩半郁李仁半兩上為細末煉蜜杵圓如桐子大輕粉滾為衣按宋本滾作袞每服十圓至十五圓至二十圓五更初溫水下到晚未利再一二服快利為度白粥將息釋義茵芋氣味苦辛溫入手足陽明硃砂氣味苦溫入手少陰薏苡仁氣味甘平淡滲入手足太陰牽牛子氣味苦辛微寒入手足陽明郁李仁氣味辛溫而潤入手足太陰陽明輕粉氣味辛鹹微寒為衣者取其能引藥入下也歷節而致腫滿非下利不能殺其勢故滲濕行經必使其下利也治風熱成歷節攻手指作赤腫麻木甚則攻肩背兩膝遇暑熱或大便祕即作牛蒡子散牛蒡子三兩新豆豉炒羌活各一兩生地黃二兩半黃耆一兩半上為細末白湯調二錢服空心食前日三服此病多胸膈生痰久則赤腫附著肢節久而不退遂成厲風此孫真人所預戒也宜早治之釋義牛蒡子氣味苦辛平微寒入手太陰手足陽明引經之藥新豆豉氣味苦寒入手足太陰陽明羌活氣味辛甘平入足太陽善能利水生地黃氣味甘寒微苦入手足少陰黃耆氣味甘平入手足太陰此治歷節久而四肢四末皆病將成厲風疼痛不休者氣血藥中兼以散邪利濕乃古人思患預防之意也術於此者不可不察焉治厲風手指攣曲節間疼不可忍漸至斷落萆麻法萆麻子去皮黃連銼如豆各二兩按宋本二作一上以小瓶子入水一升同浸春夏三日秋冬五日後取萆麻子一粒擘破面東以浸藥水吞下平旦服漸加至四五粒微利不妨水少更添忌動風物纍用得效神良釋義萆麻子氣味苦辛溫入手足陽明黃連氣味苦寒入手少陰此治已成厲風節骨間痛不可忍漸至欲斷落者以苦辛溫之味微利其經絡之壅滯以苦寒之味調和其心榮使風毒不致侵入臟腑則經絡所伏之邪漸次得解矣此方雖述神良丹方之流也治厲風柏葉散柏葉麻黃山梔子枳殼羌活羊肝石白蒺藜升麻子芩防風牛蒡子荊芥茺蔚子大黃各半兩苦參一兩烏蛇一兩上為細末每服二錢溫水調下日七八服龐老方釋義柏葉氣味苦辛微寒入足太陰麻黃氣味辛溫而則散入足太陽山梔子氣味苦寒入手太陰少陰枳殼氣味苦寒入脾羌活氣味辛溫能行水入足太陽羊肝石氣味淡平入足少陽厥陰能解藥毒白蒺藜氣味甘辛溫入足厥陰能明目升麻氣味苦辛微溫而散入足陽明子芩氣味苦寒入手太陰防風氣味辛甘平入足太陽牛蒡子氣味苦辛平微寒入手太陰荊芥氣味辛溫入足厥陰茺蔚子氣味辛甘微溫入手足厥陰大黃氣味苦寒入手足陽明苦參氣味苦寒入手足少陰烏蛇氣味甘平善能治風入足少陽厥陰此治厲風之方也血分中熱氣阻痹脈絡不主流行必成癬疥久則延為厲風故用涼血藥兼以疏風古人有云治風先治血血行風自滅也治風毒瘡按宋本風毒作肺毒如大風疾緑靈散用桑葉洗熟蒸一日曬乾為末每服三錢開水調下不拘時候日三四服出經驗釋義桑葉氣味苦甘辛涼入手足陽明厥陰此藥能明目涼血熄風風疾之始膚癢如瘡久郁化熱成毒將變大風之症故必以涼血為務則鬱久之熱稍減內風得熄矣治走疰歷節按宋本疰作注諸風軟痛卒中倒地跌撲傷損趁痛圓草烏頭三兩生去皮尖按宋本生作不熟地黃南星半夏曲白殭蠶烏藥各半兩並曬乾上為細末酒糊圓如梧子大日乾每服五七粒空心夜臥溫酒下如跌撲痛用薑汁和酒研十數粒搽之如卒中倒地薑汁茶清研五六圓灌下立醒大知禪師方釋義草烏頭氣味苦辛大熱入足太陽少陰熟地黃氣味甘寒微苦入足少陰南星氣味苦辛溫入手足太陰半夏曲氣味辛微溫入足陽明白殭蠶氣味鹹平入手足陽明能引藥入絡烏藥氣味辛溫入足陽明少陰酒和者亦引經也此因走注歷節諸風卒然昏倒損傷者非大熱引經之藥不能走至病所而佐以地黃者取其養血熄風雖諸味之攻病不致傷及他經也治宿患風癬遍身黑色肌體如木皮膚粗澀及四肢麻痹宜服烏頭圓草烏頭一斤入竹籮子內以水浸用碎瓦塊按三字宋本作瓦子於籮內就水中瀧洗如打菱角法直候瀧洗去大皮及尖控起令乾用麻油四兩鹽四兩入銚內炒令深黃色傾出油只留鹽並烏頭再炒令黑色煙出為度取一枚劈破心如米一點白恰好也如白多再炒趁熱杵羅為末用醋糊圓如梧子大干之每服三十圓空心晚食前溫酒下真州資福寺雅白老僧按宋本作真州資福大雅白老元祐間有此疾服數年肌膚黑點須除按宋本點作䵟腳力強健視聽不衰有一宗人遍身紫癜風身如墨服服逾年體悅澤教豫服之亦得一年許諸風疹瘡皆除然性差熱雖制去毒要之五七日作烏頭粥啜之為佳粥法用豫章集中者釋義草烏頭氣味苦辛大熱入足太陽少陰能行走經絡宿患風癬遍身黑色肌體麻木皮膚不仁四肢麻痹久不能愈者非此不能透入諸經絡製藥用油鹽和藥用醋者咸能軟堅酸能約束只用一味而不用他藥者欲其專攻是疾無暇治及他處耳治風痰停飲痰癖嗽治停痰宿飲化痰圓半夏湯洗七次別末人參白茯苓白朮桔梗切作小塊生薑汁浸各一兩枳實香附子前胡甘草各半兩上細末用半夏末生薑汁同煮糊圓如梧子大每服三四十圓食前薑湯下釋義半夏氣味辛溫入足陽明人參氣味甘溫入脾胃茯苓氣味甘平淡滲入足陽明白朮氣味甘溫入手足太陰桔梗氣味苦辛平入手太陰為諸藥之舟楫枳實氣味苦寒入脾香附子氣味辛甘平入足厥陰少陽前胡氣味苦平辛微寒入手太陰甘草氣味甘平入足太陰此主治停痰宿飲之方也古人有云邪之所湊其里必虛參苓朮甘四味乃四君子湯也用以守護中宮而消痰祛飲之藥以姜為引直搗其巢宿飲自除矣治中脘風涎痰飲眩瞑嘔吐酸