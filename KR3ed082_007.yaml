body:
  text: 卷第七諸蟲飛屍鬼疰制諸蟲方宜名蕪檳圓按注五字周本無白蕪荑檳榔各一兩上為細末蒸餅圓如梧子大每服十五圓至二十圓空心溫湯下按周本無空心二字釋義白蕪荑氣味辛平入手足陽明足太陰能消積殺蟲檳榔氣味辛溫入足太陰陽明能消積下氣此蟲積為患致腹痛不能納食惟恐藥性之行太疾故以蒸餅和圓使其緩緩而行則停滯蟲積可以掃除矣制蟲解勞悅澤肌膚去勞熱宜名檳漆圓按注五字周本無檳榔一兩半龍膽草一兩按周本無草字乾漆半兩上為細末煉蜜圓如梧子大每服十圓至十五圓空心熟水吞下按周本無空心二字釋義檳榔氣味辛溫入足太陰陽明龍膽草氣味苦寒入足厥陰乾漆氣味辛溫入足厥陰因蟲積發熱致肌膚不潤容色不澤以上三味最能殺蟲解熱故用之屢效治寸白蟲方黑鉛灰抄四錢一服按諸本抄俱作炒先吃豬肉脯少許一時來卻用砂糖濃水半盞調鉛灰五更服蟲盡下白粥將息一日又良方療寸白用錫沙蕪荑檳榔者極佳按周本錫沙作錫灰釋義黑鉛灰氣味甘寒入足少陰性能殺蟲先食豬肉脯少許者以蟲頭下垂引之朝上也以糖濃水拌鉛灰服使蟲盡下之後須白粥將息一日者不欲其留有餘未盡也此即古人所云樹德務滋去疾務盡之意予宣和中每覺心中多嘈雜意謂飲作又疑是蟲漫依良方所說服之翌日下蟲二條一條長二尺五寸頭扁闊尾尖銳每寸作一節斑斑如綿紋一條皆寸斷矣千金方謂勞則生熱熱則生蟲心蟲曰蛔脾蟲曰寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶五蟲皆能殺人惟肺蟲為最急蓋肺蟲居肺葉之內蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難有人說道藏中載諸蟲皆頭向下行惟是初一至初五以前頭向上行故用藥者多取月胐以前蓋謂此也治飛屍者遊走皮膚穿藏府每發刺痛變作無常遁屍者附骨入肉攻鑿血脈每發不可得近見屍喪聞哀哭便發風屍者淫濯四肢不知痛之所在每發昏沉得風雪便作沉屍者纏骨結藏衝心脅每發絞切遇寒冷便作注屍者舉身沉重精神錯雜常覺昏廢每節氣致變輒成大惡皆宜用此方忍冬藤葉膏按注五字周本無忍冬葉銼數斛煮令濃濾取汁再熬令成膏按五字周本作煎之二字每服如雞子大一塊開水任下日三服太一精神丹及蘇合香圓治此疾第一釋義忍冬葉氣味辛甘微寒入足厥陰性能清熱解毒消腫兼治五屍之疴久服延年益壽世人每忽用之誰知至賤之物乃有殊常之功效乎因死喪驚憂按周本無死字悲哀煩惱感屍氣而成諸變動不已似冷似熱風氣觸則發雄朱散雄黃硃砂桔梗炒羌活當歸升麻川烏龍齒犀角赤芍藥按諸本俱無赤字鬼箭炒白殭蠶炒川芎南星炮山梔子陳皮木香白朮虎頭骨醋炙按諸本作虎頸骨紫蘇子炒莽草枳殼黃芩以上各等分檳榔二個麻黃半兩蜈蚣二條酒炙干全蠍一條炙按周本作炒一分上為細末每服二錢溫酒調下日三服釋義雄黃氣味苦辛甘微溫入足厥陰能解毒殺蟲辟邪崇硃砂氣味苦溫入手少陰桔梗氣味苦平入手太陰羌活氣味苦辛甘平入足太陽當歸氣味苦辛甘溫入手少陰足厥陰升麻氣味苦辛微溫入足陽明川烏氣味辛大熱入足太陰少陰龍齒氣味涼澀入足厥陰能鎮肝安魂犀角氣味酸鹹寒入手少陰足厥陰赤芍藥氣味苦平入足厥陰能行血中滯鬼箭氣味苦寒入足厥陰能殺蟲辟邪魅白殭蠶氣味鹹辛入手足陽明能引藥入經絡川芎氣味辛溫入足少陽厥陰南星氣味苦辛溫入手足太陰山梔子氣味苦寒入手少陽足厥陰陳皮氣味苦辛微溫入手足太陰木香氣味辛溫入足太陰白朮氣味甘溫微苦入足太陰虎頭骨氣味辛微熱入足厥陰能辟邪祟紫蘇子氣味苦辛微溫入手太陰足厥陰能降氣莽草氣味辛溫入足厥陰枳殼氣味苦寒入足太陰黃芩氣味苦寒入手太陰少陽檳榔氣味辛溫入足太陰陽明麻黃氣味辛溫入足太陽蜈蚣氣味辛溫入足厥陰能辟邪祟全蠍氣味甘平入足厥陰以溫酒調送引入經絡也此治屍氣所侵病狀變態百出故用通行十二經絡之藥辟邪鎮肝安魂及苦辛升降開泄之品必使其病卻神安而後已頃在徽城日嘗修合神精丹一料庚申予家一婦人夢中見二蒼頭一在前一在後手中各持一物按諸本無各字前者云到也未後應云到也擊一下爆然有聲遂魘覺後心一點痛不可忍昏悶一時許予忽憶神精丹有此一證取三粒令服之遂至府過片時歸視之已無病矣云服藥竟痛止神醒今如常矣自後凡遇相識稍有邪氣即與一二服無不應驗神精丹方在千金方中治中風之要藥但近世少得曾青磁石為難合耳凡人平居無疾苦忽如死人身不動搖默默不知人目閉不能開口啞不能言或微知人惡聞人聲但如眩冒移時方寤此由自汗過多按周本無自字血少氣並於血陽獨上而不下氣壅塞而不行故身如死氣過血還陰陽復通故移時方寤名曰鬱冒亦名血厥婦人多有之宜白薇湯倉公散白薇湯白薇當歸各一兩人參半兩甘草一分上為粗末每服五錢水二盞煎至一盞濾去滓溫服釋義白薇氣味苦鹹微寒入足陽明當歸氣味辛甘微溫入手少陰足厥陰人參氣味甘溫入足陽明甘草氣味甘平入足太陰通行十二經絡以鹹苦微寒及辛甘微溫之藥和其陰陽以甘溫甘平之藥扶其正氣則病自然瘥也倉公散瓜蒂末藜蘆雄黃礜石煅按周本作礬石上藥各等分為細末用少許吹入鼻中釋義瓜蒂氣味苦寒入手陽明藜蘆氣味苦寒入手陽明雄黃氣味苦辛甘微溫入足厥陰能辟邪祟解毒殺蟲礜石氣味辛大熱入足厥陰此方吹入鼻中乃開竅之藥也如上之神識不清者用苦寒以降之辛溫以升之降升得平則神清氣爽矣腹脅疼痛方治男子兩脅疼痛枳實散枳實一兩白芍藥炒黃雀腦芎人參各半兩上為細末食前用薑棗湯調下二錢酒亦得日三服釋義枳實氣味苦寒入足太陰白芍藥氣味酸微寒入足厥陰雀腦芎氣味辛溫入足少陽厥陰人參氣味甘溫入足陽明薑棗湯調送或酒送俱取其調和榮衛先升後降也男子兩脅疼痛皆由肝氣乘中故以苦寒酸寒辛溫之藥升降其氣而以甘溫之品和其中疼自止矣治脅肋下痛不美食葛根湯葛根半兩桔梗防風枳殼白芍藥甘草訶子去核按周本無注川芎白朮各一兩按諸本俱作各一分上藥為粗末每服四錢水一盞半薑棗同煎至七分濾去滓溫服日三四服釋義葛根氣味辛甘平入足陽明桔梗氣味苦辛平入手太陰防風氣味辛甘微溫入足太陽枳殼氣味苦寒入足太陰白芍藥氣味酸微寒入足厥陰甘草氣味甘平入足太陰訶子氣味溫澀入手陽明足太陰川芎氣味辛溫入足少陽厥陰白朮氣味甘溫微苦入足太陰因脅肋下痛致脾胃受困納食不美故以升散之藥鼓動脾陽兼用和中之品佐薑棗以和榮衛則肝邪不致乘虛犯胃也治悲哀煩惱傷肝氣至兩脅骨疼痛筋脈緊急腰腳重滯兩股筋急兩脅牽痛四肢不能舉漸至脊膂攣急此藥大治脅痛枳殼煮散枳殼細辛桔梗防風川芎各四兩葛根一兩半甘草二兩上藥為粗末每服四錢水一盞半生薑三片煎至七分濾去滓空心食前溫服釋義枳殼氣味苦寒入足太陰細辛氣味辛溫入足少陰桔梗氣味苦辛平入手太陰防風氣味辛甘微溫入足太陽川芎氣味辛溫入足少陽厥陰葛根氣味辛甘平入足陽明甘草氣味甘平入足太陰能緩諸藥之性此由肝氣不舒故用苦降升散之藥再佐以甘緩及姜之和榮衛使升降不致偏勝也治脅痛如前兼去手足枯瘁按周本瘁作悴薏苡仁圓薏苡仁一兩石斛用細者三分附子半兩牛膝生乾地黃各三分細辛人參枳殼柏子仁川芎當歸各半兩甘草川椒仁各一分上藥為細末煉蜜圓如梧子大每服三四十圓溫酒吞下空心食前日三服圓藥可食前服煮散可食後服兩相兼服為佳釋義薏苡仁氣味甘平淡滲入手足太陰石斛氣味甘平微苦鹹入足太陰少陰厥陰附子氣味辛鹹大熱入手足少陰牛膝氣味酸鹹平入足厥陰生乾地黃氣味甘苦微寒入手足少陰細辛氣味辛溫入足少陰人參氣味甘溫入足陽明枳殼氣味苦寒入足太陰柏子仁氣味辛甘微溫入手少陰足厥陰川芎氣味辛溫入足少陽厥陰當歸氣味辛甘溫入手少陰足厥陰甘草氣味甘平入足太陰椒仁氣味辛溫入足太陰厥陰溫酒送藥引入經絡也脅痛而手足枯瘁皆由煩惱悲哀肝氣被郁經絡廢弛故養血調氣溫經之藥治之則氣血和平經絡自然安適也治因驚傷肝脅骨里疼痛不已桂枝散枳殼小者一兩桂枝半兩上為細末每服二錢薑棗湯調下食遠時服按四字周本無釋義枳殼氣味苦寒入足太陰桂枝氣味辛溫入足太陽因驚傷肝致脅骨疼痛不已必延及太陰太陽故以苦寒辛溫二味護持經絡再以薑棗之辛甘和其榮衛則受傷之肝得安而疼痛自然緩矣治脅下疼痛不可忍兼治腳弱芎葛湯川芎葛根桂枝細辛枳殼人參芍藥麻黃防風各半兩甘草一分上藥為粗末每服五錢水二盞姜三片同煎至七分濾去滓溫服日三服有汗須避風釋義川芎氣味辛溫入足少陽厥陰葛根氣味辛甘平入足陽明桂枝氣味辛溫入足太陽細辛氣味辛溫入足少陰枳殼氣味苦寒入足太陰人參氣味甘溫入足陽明白芍氣味酸微寒入足厥陰麻黃氣味辛溫入足太陽防風氣味辛甘微溫入足太陽甘草氣味甘平入足太陰通行十二經絡能緩諸藥之性使以姜之辛通達表脅下疼痛不可忍兼有足弱不堪行走者乃膀胱之氣逆而不降故以甘溫護其中以酸甘平緩其勢諸辛溫苦辛之品得各行其性鮮有氣不行而疼不減者矣沈存中良方載向在建康醫者王琪按周本琪作珙言諸氣唯膀胱氣脅下痛最難治謂神保圓能治之熙寧中病項頸筋痛諸醫皆作風治之數月不瘥乃流入背膂久之又注右臂攣痛甚苦憶琪語有此一證乃合服之一服而瘥再發又二服瘥神保圓治脅下風氣作塊寒疝發則連少腹疼痛湊心其積屬肝在左脅下故病發則左邊手足痛頭面昏痛不思飲食止頭痛方乾葛一兩按舊鈔本作乾薑麻黃三兩側子一個川芎防風枳實芍藥桂枝羌活甘草當歸各四兩按周本作各四錢上藥為粗末每服四錢水一盞半姜三片同煎至七分濾去滓通口服日三四服有汗須避風釋義乾葛氣味辛甘平入足陽明麻黃氣味辛溫入足太陽側子氣味辛大熱入足太陽川芎氣味辛溫入足少陽厥陰防風氣味辛甘微溫入足太陽枳實氣味苦寒入足太陰白芍氣味酸微寒入足厥陰桂枝氣味辛溫入足太陽羌活氣味辛甘平入足太陽甘草氣味甘平入足太陰能緩諸藥之性當歸氣味辛甘微溫入手少陰足厥陰再佐以姜之辛溫和衛蓋辛熱辛溫輕揚上升之藥所以直達病所但升之太過惟恐血受傷故以酸甘辛甘之品護之庶幾兩不相悖矣雜病計十二條按注四字周本無雄黃治瘡瘍尚矣周禮瘍醫凡療瘍以五毒攻之鄭康成注云今醫方合五毒之藥用黃蝥置石膽丹砂雄黃礜石按周本作礬石磁石其中燒之三日三夜其煙上著以雞羽取之以注瘡惡肉破骨則盡出楊大年嘗筆記其事有族人楊嵎按周本嵎作嵋年少時有瘍生於頰按周本頰作頤連齒輔車外腫若覆甌內潰出膿血不輟吐之痛楚難忍療之百方彌年不瘥人語之依鄭法制藥成注之瘡中少頃朽骨連兩齒俱潰遂愈後便安寧益信古方攻病之速也黃蝥即瓦合也釋義石膽即膽礬酸辛而寒丹砂苦溫雄黃辛甘微溫石辛而大熱磁石辛溫燒煉三晝夜其煙上著以雞羽取之乃升藥之法黃蝥周禮注作黃蝥賈疏以為黃瓦缶也崔元亮海上方治一切心痛無問新久以生地黃一味隨人所食多少搗取汁搜面作餺飥按周本餺飥作餛飩或作冷淘良久當利出蟲長一尺許頭似壁宮後不復患劉禹錫傳信方貞元十年通事舍人崔抗女患心痛氣垂絕遂作地黃冷淘食之便吐一物可方一寸以來如蝦蟆狀無目足等微似有口蓋為此物所食也自此頓愈面中忌用鹽釋義生地黃氣味甘苦微寒入手足少陰厥陰搗汁和以面者以五穀之氣令其入胃也此心痛有蟲久不得愈以苦寒之藥佐以面引蟲上逆而出也唐峽州王及郎中充西路安撫使判官乘騾入駱谷及宿有痔疾因此大作其狀如胡瓜貫於腸頭熱如溏灰火至驛僵仆主驛吏云此病某曾患來須灸即瘥用柳枝濃煎湯先洗痔便以艾炷灸其上連灸三五壯忽覺一道熱氣入腸中因大轉瀉先血後穢一時至痛楚瀉後遂失胡瓜登騾而弛釋義柳枝氣味苦寒入手陽明艾氣味氣味苦溫入足三陰此治痔疾之要方也腸中蘊熱故以苦寒之藥煎湯薰洗再以苦溫之味灸之則腸頭得苦而收病乃去耳服桑枝法以桑枝一小升細切炒香以水三大升煎取二升一日服盡無時圖經云桑枝性平不冷不熱可以常服療體中風癢乾燥腳氣風氣四肢拘攣上氣眼暈肺氣嗽消食利小便久服輕身聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱朴子政和間予嘗病兩臂痛服諸藥不效依此作數劑臂痛尋愈釋義桑枝氣味苦甘辛涼入手足陽明厥陰久服涼血舒筋輕身明目此因四肢拘攣兩臂痛楚或煎湯或熬膏久遠服之自有裨益也治目方用黃連多矣而羊肝圓尤奇異用黃連末一兩白羊子肝一具去膜同於砂盆內研令極細眾手為圓如梧子大每服以溫水下三十圓連作五劑但是諸眼目疾及翳障青白皆治按諸本白俱作目忌豬肉冷水唐崔承元居官時治一死囚出活之囚後數年以病目致死按周本目作自一旦崔為內障所苦喪明逾年後夜半嘆息獨坐忽聞階除窸窣之聲崔問為誰徐曰是昔年蒙活之囚今故報恩至此遂以此方告言訖而沒崔依此方合服不數月眼復明釋義黃連氣味苦寒入手少陰白羊肝氣味苦寒入足厥陰此治目疾之方因操持謀慮用心太過厥陰上升肝陰必致內耗每每傷目者多故一味瀉心火兼以血肉之養肝宜其效驗之捷耳江右嘗有商人左膊上有瘡如人面亦無他苦商人戲滴酒口中其面亦赤色以物食之亦能食食多則覺膊內肉脹起或不食之則一臂痹有善醫者教其歷試諸藥不拘草木之類悉試之無所苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒毀其口灌之數日成痂遂愈然不知何疾也釋義貝母氣味苦甘微寒入手太陰少陰能解肺熱散心胸鬱結之氣凡癰疽瘍之患無過氣血凝滯郁遏而成貝母能使氣機流暢解散鬱熱故遂成痂也唐鄭相公云予為南海節度使時年七十有五按諸本俱無使時年三字越地卑濕傷於內外眾疾俱作陽氣衰絕乳石補益之藥日投終不應按五字周本作一日端不應舊鈔本作百端不應元和七年有訶陵國舶主李摩訶獻此方經七八日而覺應驗自爾常服其功神效十年二月罷郡歸京錄方傳之其方用破故紙十兩揀洗為末用胡桃肉去皮二十兩研如泥即入前末更以好煉蜜和勻如飴盛磁器中每日按周本作旦日以溫酒化藥一匙服之不飲酒者溫熟水化下彌久則延年益氣悅心明目補添筋骨但禁食蕓薹羊血番人呼為補骨脂圓釋義破故紙氣味辛大溫入足太陰兼入命門胡桃肉氣味溫澀入足少陰此下焦陽氣衰微筋骨懈弛耳目昏憒者他藥皆無效驗惟此服之自有神效也江陵府節度使按坊本有成訥二字進豨薟圓方云臣有弟訢按周本及坊本訢作訮年三十一中風床枕五年百醫不瘥有道人鍾針者因睹此患曰可餌豨薟圓必愈其藥多生沃壤按周本及坊本多作久五月間採收洗去泥土摘其葉及枝嫩頭曝乾鋪甑中層層灑酒與蜜按九字諸本無九蒸九曝不必太燥但取熟為度按周本熟作蒸坊本作足細末之蜜和圓如梧子大空心服溫酒或米飲送下二十圓至三十圓所患忽加不得憂慮加至四十圓按坊本作四千圓必復如故至五十服按坊本作五千圓當復如丁壯奉敕宣付醫院詳錄之又知益州張詠進表云臣因葺龍興觀按周本及坊本葺作換掘得一碑內說修養氣術並藥方二件依方差人訪問採覓其草頗有異金稜紫線素根紫荄按紫線坊本作銀線此節坊本異同俱與本草綱目所引合惟素根綱目作素莖對節而生蜀號火杴莖葉頗同蒼耳誰知至賤之中乃有殊常之效臣自吃至百服眼目清明服至千服髭鬢烏黑筋力矯健效驗多端臣本州有都押衙羅守一曾因中風墜馬失音不語臣與十服其病立痊又和尚智岩按周本及坊本岩作嚴年七十患偏風口眼喎斜時時吐涎臣與十服便得瘥今合一百劑差職員史元表進釋義豨薟草氣味苦寒入足少陰厥陰主治內風四肢麻痹足膝酸弱無力久服有驗雖至賤之品誠有殊常之效唐柳州纂救三死方云元和十二年二月得腳氣夜半痞絕脅中有塊大如石且死困塞不知人搐搦上視按四字周本無三日家人號哭滎陽鄭洵美傳杉木湯方服後半食頃按周本作日大下三次氣通塊散其方用杉木節六升按各本俱作一大升橘葉一升無葉以皮代之大腹檳榔七個連子碎之按周本連作合用童子小便三大升共煮一升半分二服若一服得快利停後服以前三死皆死矣會有教者皆得不死恐他人不幸有類予病故錄傳焉釋義杉木節氣味辛微溫入足太陰厥陰橘葉氣味辛溫入足厥陰檳榔氣味辛溫入足太陰此治腳氣上攻脅有塊痞如石欲死者以童便煎服取其咸能軟堅使氣逆得下泄自然效驗矣崔給事頃在澤潞與李抱真作判官李相方以球杖按球子其軍將以杖相格承勢不能止因傷李相拇指並爪甲擘裂遽索金瘡藥裹之強坐頻索酒飲至數杯已過量而色愈青忍痛不止有軍吏言取蔥新折者按周本言作官便入溏灰火煨熱剝皮擘開其間有涕取罨損處仍多煨取續續易熱者凡三易之面色卻赤斯須云已不痛按諸本憶作又凡十數度易用熱蔥並涕裹纏其指遂畢席笑語釋義蔥氣味辛微溫入手太陰足厥陰煨熟用能治打撲損傷以其能活血亦能止血也驢尿治反胃外臺載昔幼年曾經患此疾每食餅及羹粥等須臾吐出貞觀中許奉御兄弟及柴蔣等時稱名醫奉敕令治罄竭其術竟不能療漸至羸憊死在朝夕忽有一術士云按周本術作衛服驢小便極驗日服二合後食惟吐一半晡時又服二合人定時食粥吐即便定迄至今日午時奏知大內中五六人患反胃同服之一時俱瘥但此藥稍有毒服時不可過多盛取須熱服二合按周本須作及病深者七日以來服之良驗釋義驢尿氣味辛寒入足陽明厥陰能治白玷氣耳聾及噎膈反胃以其性之寒而能降也葛洪云鬼疰者是五屍之一疰又挾諸鬼邪為害按周本挾作狀其病變動乃有三十六種至九十九種大略使人寒熱淋瀝沉沉默默不的知其所苦無處不惡累年積月漸就沉滯以至於死傳與傍人乃至減門覺如是候者急治獺肝一具陰乾杵細末水服方寸匕日三服未知再作服肘後方云此方神良宣和間天慶觀一法師行考訟極精嚴時一婦人投狀述患人有祟所附須臾召至附語云非我為禍別是一鬼亦因病人命衰為祟爾渠今已成形在患人肺中為蟲食其肺系故令吐血聲嘶師掠之云此蟲還有畏忌否久而無語再掠之良久云容某說惟畏獺爪屑為末以酒服之則去矣患家如其言得愈此乃予目所見也究其患亦相似獺爪者殆獺肝之類歟釋義獺肝獺爪氣味甘鹹溫通行十二經絡能治鬼疰蠱毒及傳屍勞瘵五屍與屍勞之恙沉沉默默不知病之所苦積年累月淹滯至死是五臟六腑皆為傳染故必用獺肝獺爪以搜遂之使其無處留著耳
