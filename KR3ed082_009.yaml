body:
  text: 方卷第九傷寒治結胸灸法巴豆十四枚黃連七寸連皮用上藥搗細用津唾和成膏填入臍心以艾灸其上腹中有聲其病去矣不拘壯數病去為度才灸了便以溫湯浸手帕拭之恐生瘡釋義巴豆氣味辛溫入足太陰陽明黃連氣味苦寒入手少陰傷寒結胸症湯藥不能效者乃邪結於胸致升降失司以大辛溫之藥通之大苦寒之藥降之惟恐藥氣不能深入再以艾灸之入內必使腹中有聲庶幾升降有權方能中病耳治傷寒發狂或棄衣奔走逾牆上屋鵲石散黃連寒水石各等分上為細末每服二錢濃煎甘草湯放冷調服釋義黃連氣味苦寒入手少陰能瀉心火寒水石氣味甘寒入手足太陽能清暑熱傷寒熱邪上郁心胞致發狂奔走逾牆上屋晝夜不寧此二味能瀉丙丁使之下行則熱邪之勢衰神識自然安矣桂枝麻黃各半湯方在前嘗記一親戚病傷寒身熱頭疼無汗大便不通已四五日豫訊之見醫者治大黃朴消等欲下之豫曰子姑少待豫為視之脈浮緩臥密室中自稱甚惡風豫曰表證如此雖大便不通數日腹又不脹別無所苦何遽便下大抵仲景法須表證罷方可下不爾邪乘虛入不為結胸必為熱利也豫作桂枝麻黃各半湯與之繼以小柴胡漐漐汗出大便亦通而解仲景云凡傷寒之病多從風寒得之始表中風寒入里則不消矣擬欲攻之當先解表乃可下之若表已解而內不消大滿大堅實有燥屎自可徐下之雖四五日不能為禍也若不宜下而便攻之內虛邪入按周本邪作熱協熱遂利煩躁之變不可勝數輕者困篤重者必死矣按原本正文重迭難曉豫刪正此段其理甚明大抵風寒入里不消必有燥屎或大便堅祕須是脈不浮不惡風表證罷乃可下故大便不通雖四五日不能為害若不顧表而便下之遂為協熱利也治瘀血抵當圓水蛭五枚炙虻蟲五枚去翅足炒桃仁六枚炒按周本無炒字大黃三分去皮上為細末煉蜜糊作一圓以水一盞煎至七分頓服晬時當下血按周本晬作睡不下再作服之釋義水蛭氣味鹹苦平入足厥陰性喜食血虻蟲氣味鹹苦微溫入足厥陰性喜食血桃仁氣味辛甘平入足厥陰大黃氣味苦寒入足陽明傷寒熱邪入里內結瘀血身黃小腹脹滿發狂小便自利者宜服此藥以上四味皆能入血若小便不利者即非此症也有人病傷寒七八日脈微而沉身黃髮狂小腹脹滿臍下冷小便利豫曰仲景云太陽病身黃脈沉結小腹硬小便不利者為無血也小便自利其人如狂者血證諦也遂投以抵當圓下黑血數升狂止得汗解經云血在上則忘在下則狂太陽膀胱隨經而畜於膀胱故臍下膨脹由閼血闌門按周本無闌門二字他本無閼血二字滲入大腸若大便黑者此其症也按諸本症作候破陰丹方在前有人初得病四肢逆冷臍下築痛按周本築作重身疼如被杖蓋陰症也急服金液破陰來復等丹其脈遂沉而滑沉者陰也滑者陽也病雖陰而見陽脈有可生之理仲景所謂陰病見陽脈者生也乃灸氣海丹田百壯按周本乃作仍手足溫回陽按諸本作陽回得汗而解或問滑脈之狀如何便有生理豫曰仲景云翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故名曰滑古人論滑脈雖云往來前卻流利旋轉替替然與數相似仲景則三語便足按七字諸本作仲景三語而足也此三字極難曉翕合也言張而復合也故曰翕為正陽沉言忽降而下也故曰沉為正陰方翕而合俄降而下奄謂奄忽之間仲景論滑脈可謂諦當矣然其言皆有法故讀書難曉治傷寒汗後脾胃傷冷物胸膈不快尋常血氣不和宜服補脾湯人參淡乾薑白朮甘草陳橘皮去白青橘皮去白各等分上為細末每服三錢水一盞煎數沸去滓熱服入鹽點服亦得釋義此治傷寒後勞復方也人參氣味甘溫入足陽明乾薑氣味辛溫入手足太陰白朮氣味甘溫微苦入足太陰甘草氣味甘平入足太陰陳皮氣味苦辛微溫入手足太陰青皮氣味辛酸平入足厥陰病後易於勞復者由乎榮衛未和故必藉脾土氣旺肝木不致乘虛侵犯理中湯加陳皮又兼青皮者遠肝邪也又記有人患傷寒得汗數日忽身熱自汗脈弦數心不得寧真勞復也豫診曰此勞心所致神之所舍未復其初而又勞傷其神榮衛失度當補其子益其脾解其勞按周本解下有發字庶幾得愈授以補脾湯佐以小柴胡病遂得解或者難曰虛則補其母今補其子何也豫曰子不知虛勞之異乎難經曰虛則補其母實則瀉其子此虛當補其母人所共知也千金方曰心勞甚者補脾氣以益之脾旺則感於心矣此勞則當補其子人所未聞也蓋母生我者也子繼我而助我者也方治其虛則補其生我者與青囊所謂本骸得氣遺體受蔭同義按青囊周本作錦囊考二書俱有其說方治其勞則補其助我者與荀子所謂未有子富而父貧者同義此治虛與勞所以異也治中暍白虎湯方在本論中有人患頭疼身熱心煩燥渴診其脈大而虛豫授以白虎湯數服愈仲景云脈虛身熱得之傷暑又云其脈弦細芤遲何也素問云寒傷形熱傷氣蓋傷氣不傷形則氣消而脈虛弱所謂弦細芤遲者皆虛脈也仲景以弦為陰朱肱亦云中暑脈微弱按周本中暑作仲景則皆虛脈可知釋義石膏氣味辛寒入手太陰足陽明知母氣味苦寒入足陽明甘草氣味甘平入足太陰白粳米氣味甘平入手足太陰此治中暍之方也夫中暍即是中熱也動而得者謂之熱靜而得者謂之暑暑病之脈多虛而無力故寒涼之劑必須顧戀中宮司是術者宜細心體察焉麻黃湯方在前有人病傷寒身熱頭痛豫診之曰邪在表此表實證也當汗之與麻黃湯或人問曰傷寒大抵因虛故邪得以入之今邪在表何以雲表實也豫曰古人稱邪之所湊其氣必虛留而不去其病則實蓋邪之入人也始則因虛及邪居中則反為實矣大抵調治傷寒先要明表裡虛實能明此四字仲景三百九十七法可坐而定也何以言之有表實有表虛有裡實有裡虛有表裡俱實有表裡俱虛豫於表裡虛實歌中常論其事矣仲景麻黃湯之類為表實而設也桂枝湯之類為表虛而設也裡實則承氣之類是也裡虛則四逆之類是也表裡俱實所謂陽盛陰虛下之則愈也表裡俱虛所謂陽虛陰盛汗之則愈也嘗讀華他傳有府吏倪尋李延共止俱頭痛身熱所苦正同他曰尋當下之延當發汗或難其異他曰尋內實延外實按周本作尋外實延內實與魏志合故治之異也小柴胡湯柴胡二兩黃芩人參甘草各三分半夏六錢一字泡七次按諸本泡作洗上為粗末每服五錢水一盞半生薑五片棗二枚同煎至八分去滓溫服日三服加減法活人書所載甚詳釋義柴胡氣味辛甘平入足少陽黃芩氣味苦寒入手太陰少陰人參氣味甘溫入足陽明甘草氣味甘平入足太陰能緩諸藥之性半夏氣味辛溫入足陽明再以薑棗之辛甘和榮衛此治傷寒邪在半表半裡往來寒熱脈象不見少陰厥陰症者乃少陽證也故以甘溫甘平之藥守護中宮則辛甘辛溫苦寒諸藥搜逐外邪庶不致傷正氣耳有人患傷寒五六日但頭汗出自頸以下無汗按周本頸作頭手足冷心下痞悶大便祕結或者見四肢冷又汗出滿悶以為陰證豫診其脈沉而緊豫曰此症誠可疑然大便祕結非虛結也安得為陰雖脈沉緊為少陰症然多是自利未有祕結者此症半在裡半在表也投以小柴胡得愈仲景稱傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在外半在裡也脈雖沉緊不得為少陰症所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解今此疾症候同故得屎而解也有人難曰仲景云病人脈陰陽俱緊反汗出者亡陽也此屬少陰今云陰不得有汗何也又云頭汗出按五字周本作今頭汗出者故知非少陰何以頭汗出便知非少陰證也豫曰此一段正是仲景議論處意謂四肢冷脈沉緊腹滿全似少陰證然大便硬頭汗出不得為少陰蓋頭者三陽同聚若三陰至胸而還有頭汗出自是陽虛故曰汗出為陽微是陰不得有汗也若少陰證頭有汗則死矣故仲景平脈法云心者火也名少陰其頭無汗者可治有者死蓋心為手少陰腎為足少陰相與為上下惟以意逆者斯可得之治太陽陽明合病麻黃湯方在前有人病傷寒脈浮而長喘而胸滿身熱頭痛腰脊強鼻乾不得眠豫曰太陽陽明合病證仲景法中有三證下利者葛根湯不利嘔吐者加半夏喘而胸滿者麻黃湯也治以麻黃湯遂得解有人問傷寒傳入之序自太陽陽明少陽太陰少陰厥陰所傳有次第何哉豫曰仲景本論無說古今亦無言者惟龐安常謂陽主生故太陽水傳足陽明土土傳足少陽木為微邪陰主殺故足少陽木傳足太陰土土傳足少陰水水傳足厥陰木為賊邪豫以為不然足少陰水傳足厥陰木安得為賊邪蓋牽強附會失之穿鑿胡不觀素問陰陽離合論云太陽根起於至陰結於命門名曰陰中之陽陽明根起於厲兌名曰陰中之陽少陽根起於竅陰名曰陰中之少陽太陰根起於隱白名曰陰中之太陰少陰根起於湧泉名曰陰中之少陰厥陰根起於大敦陰之絶陽名曰陰中之絶陰其次序正與此合大抵傷寒始因中風寒得之於陰是以止傳足經者皆陰中之陽陰中之陰也不特此也以六氣在天者考之厥陰為初之氣少陰為二之氣太陰為三之氣少陽為四之氣陽明為五之氣太陽為終之氣此順也逆而言之太陽而後陽明陽明而後少陽少陽而後太陰太陰而後少陰少陰而後厥陰傷寒為病逆而非順故以是為序也小承氣湯方具仲景本論釋義大黃氣味苦寒入足陽明芒消氣味鹹苦寒入手足太陽陽明厥陰枳實氣味苦寒入足太陰厚朴氣味辛溫入足陽明太陰此治陽明病心中懊憹微煩者胃中有燥屎以大苦寒之藥下之惟恐不能即下故佐以辛溫氣味俱厚之藥導引入腸奏效自捷矣有人病傷寒八九日身熱無汗時時譫語時因下後按周本後作利大便不通三日矣非煩非躁按周本躁作燥下同非寒非痛終夜不得臥心中無曉會處或時發一聲如嘆息之狀醫者不曉是何症豫診之曰此懊憹怫鬱二證俱作也胃中有燥屎者承氣湯下燥屎二十餘枚得利而解仲景云陽明病下之心下懊憹微煩胃中有燥屎者可攻之又云病者小便不利大便乍難乍易時有微熱怫鬱不得臥者有燥屎也承氣湯主之素問云胃不和則臥不安此夜所以不得眠也仲景云胃中燥大便堅者按周本堅作難他本作艱必譫語此所以有時發譫語也非躁非煩非寒非痛所謂心中懊憹也聲如嘆息而時發一聲所謂外氣怫鬱也燥屎得除大便通利胃中安和故其病悉去也又有人病傷寒大便不利日晡發潮熱手循衣縫兩手撮空直視喘急更數醫矣見之皆走豫曰此誠惡候得此者十中九死仲景雖有證而無治法但云脈弦者生澀者死已經吐下難於用藥謾且救之若大便得通而脈弦者庶可治也與小承氣湯一服而大便利諸疾漸退脈且微弦半月遂愈或人問曰下之而脈弦者生此何意也豫曰金匱玉函經云按周本無經字下同循衣妄撮怵惕不安微喘直視脈弦者生澀者死微者但發熱譫語承氣湯主之豫嘗觀錢仲陽小兒直訣云手尋衣領及捻物者肝熱也此症在玉函經列於陽明部蓋陽明胃也肝有熱邪淫於胃經故以承氣瀉之且得脈弦則肝平而胃不受克此所以有生之理若讀仲景論而不能博通諸醫書以發明其隱奧專守一書者吾未見其能也又記有人病傷寒下利身熱神昏多困譫語不得眠或者見下利便以譫語為鄭聲為陰虛症豫曰此小承氣證衆駭然曰下利而服小承氣仲景之法乎豫曰此仲景之法也仲景云下利而譫語者有燥屎也屬小承氣湯與服得解按四字周本作而解二字豫嘗觀素問云微者逆之甚者從之逆者正治從者反治從少從多觀其事也帝曰何謂反治岐伯曰塞因塞用通因通用王冰注云大熱內結注瀉不止熱宜寒療結復須除以寒下之結散利止則通因通用也正合於此治項背強葛根湯葛根一兩麻黃三分桂枝甘草芍藥各半兩上為粗末按周本粗作細每服五錢水一盞半煎至八分去滓溫服覆汗為度釋義葛根氣味辛甘平入足陽明麻黃氣味辛溫入足太陽桂枝氣味辛甘溫入足太陽甘草氣味甘平入足太陰能緩諸藥之性白芍藥氣味酸微寒入足厥陰此陽明病項背強惡風無汗者宜服此藥外邪已過太陽直至陽明故項強𠘧𠘧然而用此藥者猶恐邪氣再深入他經耳有人患傷寒無汗惡風項既屈而且強豫曰項強𠘧𠘧葛根湯證或人問曰何謂𠘧𠘧豫曰𠘧𠘧者如足疾屈而強也按周本足上多一𠘧字謝復古謂病人羸弱須憑几而起誤也蓋仲景論中極有難曉處如振振欲劈地心中懊憹外邪怫鬱鬱冒不仁膈內拒痛如此之類甚多熙寧中邠守宋迪因其猶子感傷寒之初不能辨其病症見其煩渴而汗多以涼藥解治之至於再三遂成陰毒六日卒迪痛悼之遂著陰毒形症訣三篇按周本訣作論始得陰毒陰毒本因腎氣虛寒因欲事或食冷物後傷風內既伏陰外又感寒或先感外寒而伏內陰內外皆陰則陽氣不守遂發頭痛腰重腹痛眼睛疼身體倦怠而不甚熱四肢逆冷額上及手背冷汗不止或多煩渴精神恍惚如有所失二三日間或可起行不甚覺重診之則六脈俱沉細而疾尺部短小寸口或大六脈俱浮大或沉取之大而不甚疾者非陰症也若服涼藥過多則渴轉甚燥轉急有此病症急服還陽退陰二藥即安惟補血和氣而已宜服正元散退陰散五勝散陰症不宜發汗如氣口脈大身熱而未瘥用藥出汗無妨按諸本氣口俱作氣正正元散治傷寒如覺風寒吹著四肢按周本風作傷頭目百骨節疼痛急煎此藥服如人行五里許再服或連進三服出汗立瘥若患陰毒傷寒入通陰散半錢同煎或傷冷傷食頭昏氣滿及心腹諸疾服之無有不效麻黃去節陳皮生大黃甘草乾薑肉桂芍藥川附子炮按周本無炮字吳茱萸半夏洗各等分上麻黃加一半吳茱萸減一半同為末每服一大錢水一盞半生薑三片棗一枚去核煎至七分熱呷如出汗以衣被蓋覆切須候汗乾方去衣被如是陰毒證不可用麻黃免更出汗釋義麻黃氣味辛溫入足太陽陳皮氣味苦辛微溫入手足太陰大黃氣味苦寒入足陽明甘草氣味甘平入足太陰能緩諸藥之性乾薑氣味辛溫入手足太陰肉桂氣味辛甘大熱入足厥陰白芍氣味酸微寒入足厥陰附子氣味辛鹹大熱入手足少陰吳茱萸氣味辛熱入足陽明厥陰半夏氣味辛溫入足陽明生薑之辛溫入衛棗之甘平入榮傷寒如覺風寒吹著四肢頭目骨節疼痛或傷冷傷食頭昏氣滿及心腹諸疾皆宜服之此表裡未清陽氣先傷故以大辛熱之藥護其陽雖有辛溫之達表苦寒之直下皆不為害矣退陰散治陰毒傷寒手足逆冷脈沉細頭痛腰重連進三服小小傷寒冷按周本無寒字每服一字按周本字作匙入正元散內同煎入鹽一捻陰毒傷寒咳逆煎一服細細熱呷便止川烏生按周本無生字乾薑各等分上為粗末炒令轉色放冷再搗為細末每服一錢水一盞鹽一捻煎半盞去滓溫服釋義川烏氣味苦辛大熱入足太陽少陰乾薑氣味辛溫入手足太陰加鹽一捻者欲其入於至陰也治陰毒傷寒手足逆冷脈沉細頭痛腰重及咳逆者皆可服陽氣為陰邪郁遏故以大辛熱之藥引陽氣直達於外則陽氣得振而陰邪退避矣五勝散治傷寒頭痛壯熱骨節疼痛昏沉困倦咳嗽鼻塞不思飲食兼治傷寒夾冷氣並慢陰毒神效方白朮甘草五味子石膏各四兩按他本俱作各四錢周本缺末字乾薑三兩半上為末每服二錢用水八分一盞入鹽少許同煎至六分通口服如冷氣相挾入薑棗煎或治陰毒病入艾少許同煎釋義白朮氣味甘溫微苦入足太陰甘草氣味甘平入足太陰五味子氣味酸鹹辛甘苦俱全入足少陰石膏氣味辛寒入手太陰足陽明乾薑氣味辛溫入手足太陰少佐以艾引藥入經也薑棗同煎和榮衛也傷寒頭痛壯熱骨節疼痛昏沉困倦咳嗽鼻塞不思飲食及夾冷氣並陰毒等症皆宜服之使二氣和平必獲效驗耳陰毒漸深候積陰感於下則微陽消於上故其候沉重四肢逆冷腹痛轉甚或咽喉不利或心下脹滿結硬燥渴虛汗不止或時狂言指甲面色青黑六脈沉細而一息七至以來有此症者速於氣海或關元二穴灸二三百壯以手足和暖為效仍宜服金液丹來蘇丹玉女散還陽散退陰散等藥玉女散治陰毒氣上攻腹痛按諸本上攻俱作攻上四肢逆冷惡候並治之川烏去皮臍冷水浸七日後按周本日作次薄切曝乾經袋盛有患者取碾末一大錢入鹽一小錢水一盞半煎至七分通口服壓下陰毒所注按周本注作在如豬血相似未已良久再進一服釋義川烏氣味辛大熱入足太陽少陰陰毒氣攻上逆腹痛四肢逆冷如厥者此陽氣欲竭也佐之以鹽欲藥性之下達必壓下陰毒似豬血者陽乃得通也還陽散治陰毒面色青四肢逆冷心躁腹痛按周本躁作燥用硫黃末新汲水調下二錢良久或寒一起或熱一起更看緊慢再服二錢汗出瘥釋義硫黃氣味辛大熱入命門新汲水調下欲藥性之速也此陰毒為病面色青四肢逆冷心躁腹痛非大辛大熱之藥不能挽回陽氣於無何有之鄉也陰毒沉困候沉困之候與前漸深之候皆同而更加困重六脈附骨取之方有按之即無一息八至以上或不可數也至此則藥餌難為功矣但於臍中灼艾如半棗大三百壯以來手足不和暖者不可治也偶得和暖則以前硫黃及熱藥助之若陰氣散陽氣來即漸減熱藥而和治之以取瘥也辨少陰脈緊症記有人患傷寒六七日心煩昏睡多吐小便白色自汗豫診之寸口尺中俱緊豫曰寒中少陰之絡按諸本絡俱作經是以脈緊仲景云病人脈緊而汗出者亡陽也屬少陰法當咽痛而復下利蓋謂此也有難之曰脈訣緊脈屬七表仲景以緊脈屬少陰緊脈屬陽耶屬陰邪耶豫曰仲景云寸口脈俱緊者按周本口作尺清邪中於上焦濁邪中於下焦又云陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上滑苔勿妄治也又云緊則為寒又云諸緊為寒又云曾為人所難緊脈從何而來師云假令已汗若吐按坊本已作亡與仲景書合以肺裡寒故令脈緊假令咳者坐飲冷水故令脈緊假令下利以胃虛有三字諸本皆同而仲景書作以胃中虛冷故令脈緊又云寸口脈微尺脈緊其人虛損多汗由是觀之則是寒邪之氣久入經絡所致皆虛寒之脈也其在陽經則浮而緊在陰經則沉而緊故仲景云浮緊者名為傷寒又曰陽明脈浮而緊者必潮熱此在陽則浮而緊也在陰則沉而緊故仲景云寸口脈微尺脈緊其人虛損多汗則陰常在絶不見陽又云少陰脈緊至七八日自下利脈暴微手足反溫脈緊反去者此欲解也此在陰則沉而緊也仲景云浮為在表沉為在裡數為在府遲為在臟欲知表裡臟腑先以浮沉遲數為定然後兼診脈而別陰陽也按周本診作於故論傷寒當以仲景脈法為準傷寒必本仲景猶兵家之本孫吳葬書之本郭氏三命之本珞録按周本三作星壬課之本心鏡舍是而之他是猶舍規矩而求方圓舍律呂而合五音必乖繆矣豫嘗作傷寒歌百篇其首篇云傷寒脈證總論篇第一皆本仲景今謾録於後浮大數動滑陽脈按浮大周本作大浮陰病見陽生可得沉澀弦微弱屬陰陽病見陰終死厄仲景云脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也陰病見陽脈者生陽病見陰脈者死陰陽交互最難明輕重酌量當別白脈雖有陰陽須看輕重以分表裡在輕手脈浮為在表表實浮而兼有力但浮無力表中虛自汗惡風常淅淅傷寒先要辨表裡虛實此四者為急仲景云浮為在表沉為在裡然表症有虛有實浮而有力者表實也故無汗不惡風浮而無力者表虛也故自汗惡風重手脈沉為在裡裡實脈沉來亦實重手無力大而虛此是裡虛宜審的里症亦有虛實脈沉而有力者裡實也故腹滿大便不通沉而無力者裡虛也或泄利或陰症之類以上八句辨表裡虛實盡矣風則虛浮寒牢堅水停水蓄必沉潛按周本停作渟蓄作滀動則為痛數為熱支飲應須脈急弦太過之脈為可怪不及之脈亦如然仲景云風則虛浮寒則牢堅沉潛水滀支飲急弦動則為痛數則熱煩太過可怪不及亦然邪不空見中必有奸榮衛太盛名高章高章相搏名曰綱榮衛微時名惵卑按惵字下周本注徒頰翻恐懼也惵卑相搏損名楊按周本楊作彰榮衛既和名緩遲緩遲名沉此最良九種脈中辨疾症按周本疾症作虛實長沙之訣妙難量仲景云寸口衛氣盛名曰高榮氣盛名曰章高章相搏名曰綱衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損衛氣和名曰緩榮氣和名曰遲緩遲相搏名曰沉大抵仲景論傷寒症候自是一家瞥瞥有如羹上肥此脈定知陽氣微縈縈來如蛛絲細卻是體中陰氣衰脈如瀉漆之絶者病人亡血更何疑仲景云脈瞥瞥如羹上肥者陽氣微也脈縈縈如蛛絲細者陽氣衰也脈綿綿如瀉漆之絶者亡血也陽氣衰千金作陰氣衰陽結藹藹如車蓋陰結循竿亦象之仲景云藹藹如車蓋者陽結也纍纍如循長竿者按周本無長字陰結也陽盛則促來一止陰盛則結緩而遲此謂促結二脈也仲景云脈來緩時一止名曰結脈來數時一止名曰促陽盛則促陰盛則結縱橫逆順宜審察殘賊災怪要須知仲景云脈有相乘有縱有橫有逆有順何謂也曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也又問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名殘賊能為諸脈作病也又問曰脈有災怪何謂也答曰舊時服藥今乃發作為災怪脈靜人病內虛故人安脈病曰行尸仲景云脈病人不病曰行尸以無生氣按周本生作主疑誤坊本作王與仲景書合故卒眩僕不知人按周本無卒字人病脈不病名曰內虛以無谷神雖困無所苦右手氣口當主氣主血人迎左其位氣口緊盛食必傷人迎緊盛風邪熾左為人迎右為氣口人迎緊盛傷於風氣口緊盛傷於食數為在腑遲為臟浮為在表沉在裡仲景云浮為在表沉為在裡數為在腑遲為在臟脈浮而緩風傷衛浮緊堅澀寒傷榮按周本榮衛二字互易疑誤當二句互易叶韻為正脈微大忌令人吐欲下猶防虛且細仲景云脈微不可吐虛細不可下沉微氣弱汗為難三者要須常審記孫用和云陰虛脈沉微而氣弱者不可汗汗下吐三候脈有不可行者切當審之陽加於陰有汗證左手沉微卻應未按坊本應作汗素問云陽加於陰為有汗按周本為有作謂之趺陽胃脈定死生仲景云趺陽脈者凡十有一太溪腎脈為根蒂傷寒必診太溪趺陽者謂人以腎脈胃脈為主仲景譏世人握手不及足者以此脈來六至或七至邪氣漸深須用意浮大晝加病屬陽沉細夜加分陰位九至以上來短促狀若湧泉無入氣更加懸絶漸無根命絶天真當死矣孫用和云按周本作孫尚云脈及六至七至以上浮大晝加病沉細夜加病更及八至精氣消神氣亂必有散脫精神之候須切急為治療又加之九至十至雖和扁亦難治如八至九至加以懸絶者無根也如泉之湧脈無入氣天真盡而必死矣病人三部脈調勻大小浮沉遲數類此是陰陽氣已和勿藥自然應有喜仲景云寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解此脈已和為必愈發熱惡寒近似傷寒者有五種脈浮而數其人發熱而惡寒者傷寒之候也脈浮而緊其人發熱惡寒或有痛處是欲為癰疽也按周本疽作膿脈浮按之反澀其人發熱而惡寒或膈實而嘔吐此是傷食也脈浮而滑其人發熱而背寒按周本背作惡或頭眩而嘔吐此是風痰之症也脈浮而弦其人發熱而惡寒或思飲食按周本飲作凡此是欲作虐症也能辨其脈又驗其症斯無誤也
