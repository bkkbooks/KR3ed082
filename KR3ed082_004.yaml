body:
  text: 卷第四反胃嘔吐治翻胃附子散附子一枚極大者坐於磚上四面著火漸漸逼熱淬入生薑自然汁中再用火逼再淬約盡薑汁半碗焙乾末之每服二錢水一盞粟米少許同煎至七分去渣溫服不過三服釋義大附子氣味鹹辛大熱入手足少陰通下焦之陽生薑自然汁氣味辛大溫達表入手足太陰通中焦下焦之陽用火逼淬乾者但取通中下之陽不欲其發表也必加粟米者以反胃不能納食雖得薑附之通陽中宮無恃恐其陰濁復聚致令反復也鯽魚散大鯽魚一個去腸留膽納緑礬末填滿縫口以炭火炙令黃干為末每服一錢陳米飲調下日三服釋義鯽魚氣味甘溫入足陽明太陰緑礬氣味鹹酸微涼能引濁下行陳米飲送藥扶中氣也此亦治反胃之病中宮雖有濁陰竊踞不耐辛溫之剛燥以甘溫酸鹹之品引濁下趨即以陳米飲調中勿使中土失職真王道之藥也定嘔吐利膈枇杷葉散枇杷葉去毛人參各一錢按宋本錢作分茯苓半兩茅根二兩切按宋本兩作分半夏一錢切按宋本注三分切上細銼每服四錢水一盞半生薑七片慢火煎至七分去渣入檳榔末二錢錢按宋本作半錢和勻服之龐老方釋義枇杷葉氣味苦辛入手太陰陽明最能下氣冬夏不調得天地四時之氣人參氣味甘溫入足陽明茯苓氣味甘平淡滲入足陽明茅根氣味甘寒入手太陰足陽明能除伏郁之熱半夏氣味辛溫入足陽明使以生薑檳榔末取其辛通而能下行也此嘔吐中脘如痞膈間之氣不利苦辛之藥以下其氣急以甘溫補中之品護持中土則土旺而濁不侵犯矣食後多吐欲作反胃按宋本作翻胃白朮散澤瀉白朮茯苓各等分上為細末每服一錢白湯調溫服釋義澤瀉氣味鹹微寒入足太陽白朮氣味甘溫入足太陰茯苓氣味甘平淡滲入足陽明能引諸藥達於至陰之處此治食後多吐將成反胃之疴其人必是酒客中宮氣虛飲濁上干三味最能達陰泄濁又能和中養正所以確中病情也治胃熱嘔吐竹茹湯乾葛三兩甘草二錢按宋本作三分半夏三錢薑汁半盞漿水一升煮耗半按宋本錢作分上粗末每服五錢水二盞姜三片竹茹一彈大棗一個同煎至一盞去滓溫服胃熱者手足心俱熱政和中一宗人病傷寒得汗身涼數日忽嘔吐藥與飲食俱不下醫者皆進丁香藿香滑石等藥下咽即吐豫曰此汗後餘熱留於胃脘孫兆竹茹湯政相當爾亟治藥與之即時愈良方槐花散亦相類釋義乾葛氣味辛微溫能解酒毒入足陽明甘草氣味甘平入足太陰半夏氣味辛溫入足陽明竹茹氣味甘寒入足陽明薑棗以和榮衛胃熱嘔吐不止亦必因胃中酒氣蘊熱故以微辛溫之藥令其入胃引入甘寒之品則酒熱稍解氣得下降胃氣安而病自已也治霍亂吐瀉不止及轉筋諸藥不效者一粒治一人青金丹硫黃一兩研水銀八錢上二味銚子內炒柳木篦子不住攪勻更以柳枝蘸冷醋頻頻灑候如鐵色法如青金塊方成按坊本法作凝刮下再研如粉留少半為散餘以粽子尖三個醋約半盞研稀稠得所成膏和圓如雞頭肉大硃砂為衣每服一圓煎丁香湯磨化下熱服如服散丁香湯調下一錢傷寒陰陽乘伏用龍腦冷水磨下日三二服釋義硫黃氣味辛大熱入右腎命門水銀氣味辛寒能行九竅能伏五金為泥丁香湯送以熱為引也龍腦湯送以涼為引也此治霍亂轉筋陰陽乘伏二氣欲離諸藥不能效者乃急救之方司是術者當留心斟酌焉治嘔吐不止香靈圓丁香好辰砂研各八錢按宋本八作六五靈脂四錢上香脂先為細末後入砂再研勻狗膽汁或豬膽汁為圓如雞頭大每服一圓生薑橘皮湯磨下釋義丁香氣味辛溫入足陽明厥陰辰砂氣味苦溫入手少陰五靈脂氣味甘溫入手太陰足厥陰圓以狗膽汁及豬膽汁者以其苦寒直下也送以生薑橘皮湯者以辛通能入里也此胃中氣不得下濁飲上逆致嘔吐不止以辛溫苦溫之藥通其在上中之濁飲以苦寒之味引之下行則病情無有不中矣臟腑泄滑及諸痢治脾胃不和泄瀉不止諸藥不效訶子圓訶子皮川薑肉豆蔻龍骨木香赤石脂附子各等分上為細末蒸餅和圓按宋本無蒸餅二字如梧子大每服四十圓空心米飲下按宋本無空心二字釋義訶子皮氣味溫澀入手陽明足太陰川薑氣味辛溫入手足太陰肉豆蔻氣味辛溫入足太陰陽明龍骨氣味涼澀入手足少陰厥陰木香氣味辛溫入足太陰赤石脂氣味辛甘酸微溫入手足陽明附子氣味鹹辛大熱入手足少陰蒸餅和圓欲藥下行也米飲送者欲和中也此通塞互用之方也因脾胃不和泄瀉久不能止諸藥不效腎為胃之關久瀉無有不傷腎者非通塞互用不能效也治脾胃中風濕臟腑泄滑鞠藭圓芎藭神麯白朮附子各等分上為細末即以神麯煮糊圓按八字宋本作用糊圓三字如梧子大每服三五十圓食前米飲下按宋本無食前二字釋義芎藭氣味辛溫入足少陽厥陰神麯氣味辛甘平入足陽明太陰白朮甘溫入足太陰附子氣味鹹辛大熱入手足少陰送藥以米飲和中也此脾胃氣弱不振臟腑中風動濕生致泄滑不止必以風藥為主而佐以甘溫守中以風能勝濕甘緩能熄風耳左氏述楚子圍蕭蕭將潰還無杜與司馬卯言號申叔展叔展曰有麥曲乎有山鞠窮乎鞠窮芎藭也意欲令逃水中以避禍是知芎藭能除濕豫嘗加朮附以制方治脾濕而泄者萬無不中此藥亦治飧泄素問云春傷於風夏必飧泄飧泄者食穀不化蓋春木旺時肝生風邪淫於脾經至夏飲冷當風故多飧泄此藥尤宜磨積止泄痢治心腹冷痛陳曲圓陳曲一兩半乾薑官桂白朮當歸厚朴人參甘草各半兩上細末煉蜜圓如梧子大每服三四十圓溫酒或淡醋湯下空心食前日二服發時不時增數釋義陳曲氣味辛甘微溫入足陽明太陰乾薑氣味辛溫入手足太陰官桂辛溫入足厥陰白朮氣味甘溫入足太陰當歸氣味辛溫入手少陰足厥陰厚朴氣味辛溫入足陽明人參氣味甘溫入足陽明甘草氣味甘平入足太陰因中虛不運積聚不消泄痢不止心腹疼痛以理中護其中以歸桂和其榮曲朴疏其滯或酒或醋湯送者引至病所也此邪少虛多之治法也治冷氣下瀉木香圓木香半兩川烏一兩生上細末釅醋糊圓如梧子大陳皮醋湯下三五十圓不拘時候服釋義木香氣味辛溫入足太陰川烏氣味苦辛大熱入足太陰少陰醋糊圓陳皮醋湯送欲藥性之達病所也此冷氣內伏下利不止非辛溫大熱之藥不能直入以祛除也治痼冷在腸胃間連年腹痛泄瀉休作無時服諸熱藥不效宜先去宿積按五字宋本作宜先取去四字然後調治易瘥不可畏虛以養病也宜溫脾湯厚朴乾薑甘草桂心附子生各二兩按宋本二作半大黃生四錢碎切湯一盞漬半日搦去滓煎湯時和滓下上細銼水二升半煎八合後下大黃汁再煎六合去滓澄去腳不要太暖按宋本作不要晚食分三服溫溫自夜至曉令盡未進食前按宋本未進作不快更以乾薑圓佐之釋義厚朴氣味辛溫入足陽明乾薑氣味辛溫入手足太陰甘草氣味甘平入足太陰桂心氣味辛甘大熱入足厥陰附子氣味鹹辛大熱入手足少陰大黃氣味苦寒入足陽明此溫下之方也久痢不止成休息者必有宿積未去雖投溫補之藥不效不可畏攻而養病以貽害也古云樹德務滋去疾務盡乾薑圓乾薑巴豆去心炒黃研大黃人參各一兩按宋本兩作錢上除巴豆餘為末同研煉蜜圓如梧子大服前湯時用湯下一圓米飲亦得釋義乾薑氣味辛溫入手足太陰巴豆氣味辛溫入足太陰陽明大黃氣味苦寒入足陽明人參氣味甘溫入足陽明此即古方中之備急圓加參也因憂愁中傷食積久在腸胃吐痢頻發暑月更甚以數年久不愈之證欲攻病慮其體虛欲補虛慮其留邪故溫下之藥佐以扶正則兩不相悖矣有人因憂愁中傷食結積在腸胃故發吐利自後至暑月稍傷則發暴下數日不已玉函云下利至隔年月日不期而發者此為有積宜下之止用溫脾湯尤佳如難取效可佐以乾薑圓後服白朮散白朮散白朮木香附子人參各等分上細末每服二錢水一盞生薑三片棗一個煎六分食前溫服按宋本無食前二字釋義白朮氣味甘溫入足太陰木香氣味辛溫入足太陰附子氣味鹹辛大熱入手足少陰人參氣味甘溫入脾胃薑棗和榮衛此方因溫下之後病去元虛尤恐未盡之積復聚治以辛香疏滯中焦不致留邪鹹辛暖下下焦亦不致留邪則甘溫之補行受其益焉有不能復元者乎治積痢靈砂丹硇砂硃砂各一分並研極細上另用黃蠟半兩巴豆三七粒去殼皮膜同於銀石器內重湯煮一伏時候巴豆紫色為度去二七粒止將一七粒與前藥二味同再研極勻再熔蠟匱藥每旋圓緑豆大每服三圓至五圓水瀉生薑湯下白痢艾葉下赤痢按赤痢宋本作赤白烏梅湯下服時須極空腹服畢一時方可吃食臨臥尤佳次食淡粥一日瘧疾乳香湯麵東五更服按宋本無五更二字不發日晚間服此藥不動氣服之瀉者止痢者斷疼者愈有積者內化亦不動臟腑大凡痢有沉積者不先去其積雖然暫安按宋本作雖安暫安後必為害嘗記陳侍郎涇仲庚戍秋過儀真求診初不覺有疾及診視則肝脈沉弦附骨重取則牢按宋本無重字豫曰病在左脅有血積必發痛陳曰誠如是前此守九江被召冒暑涉長江暨抵行朝血痢已數日矣急欲登對醫者以剛劑燥之雖得止數日臍下一塊大如杯不旬日如碗大發則不可忍故急請宮祠以歸為之奈何豫曰積痢不可強止故血結於臍脅下非抵當圓不可渠疑而不肯服次年竟以此疾終釋義硇砂氣味鹹苦微溫入足陽明厥陰硃砂氣味苦溫入手少陰黃蠟味甘平微溫淡而能滲入手足太陰巴豆氣味辛溫入足太陰陽明送藥用各種湯者因何病而用何湯也此方主治瘧痢及積聚腹痛泄瀉之疾亦因積久不去難投補劑若不先去必成大患故善治病者必欲去之盡也治隔年痢不止木香散木香用黃連各半兩銼細同炒按宋本作用黃連半兩各銼炒甘草炙一兩罌粟殼銼用生薑半兩碎同炒上細末入麝香少許研勻陳米飲下二錢佛智和尚傳云在閩中嘗合以濟人治血痢尤奇釋義木香氣味辛溫入足太陰黃連氣味苦寒入手少陰甘草氣味甘平入足太陰罌粟殼氣味酸澀微寒入足少陰少加麝香欲藥性之入里也陳米飲送取其和中也此治久痢不止欲脫肛者以香連通腸胃之積滯佐以甘緩酸澀固塞之藥其病焉有不去哉治腎泄五味子散五味子二兩吳茱萸半兩細粒緑色者上二味同炒香熟為度細末每服二錢陳米飲下頃年有一親識每五更初欲曉時必溏痢一次如是數月有人云此名腎泄腎感陰氣而然得此方服之而愈釋義五味子氣味酸鹹微溫入足少陰然研碎用則五味皆全兼能入五臟也吳茱萸氣味辛溫入足陽明厥陰此方治腎泄不止而送藥以米飲者中宮有穀氣可恃使藥性直入少陰則所感之陰氣得辛溫之益而腎中之陽自振矣虛熱風壅喉閉清利頭目治虛煩上盛脾肺有熱咽喉生瘡利膈湯雞蘇葉荊芥穗防風桔梗人參按宋本此味在末注半兩牛蒡子隔紙炒甘草各一兩上細末每服一錢沸湯點服如咽痛口瘡甚者加殭蠶一兩都君子方按宋本作國醫都君子方釋義雞蘇葉氣味辛溫而散入手太陰足太陽荊芥穗氣味辛溫入足太陽少陰厥陰防風氣味辛甘微溫入足太陽桔梗氣味苦辛平入手太陰能利咽喉為諸藥之舟楫人參氣味甘溫入足陽明牛蒡子氣味苦辛微寒入手太陰手足陽明引經之藥甘草氣味甘平入足太陰能行十二經絡能緩諸藥之性此因虛煩上盛脾肺中有熱咽喉生瘡不利者以辛散之藥清其上焦以甘桔利咽喉惟恐中氣再虛以甘緩護中俾各味有權耳治