一半生一半熟用桑白皮赤茯苓漢防己羌活陳橘皮澤瀉以上各三分上細末與上二味同研煉蜜圓和入臼內杵之按宋本杵作治圓如梧子大初服十圓空心晚食前日二服生薑橘皮湯下不知加至二三十圓以知為度釋義甜葶藶氣味苦辛寒入手太陰性能行水下氣郁李仁氣味辛平入手足太陰陽明白朮氣味甘溫入足太陰牽牛子氣味苦寒入手足陽明足太陽善能行水桑白皮氣味苦辛入手太陰赤茯苓氣味甘平淡滲入足陽明太陽漢防己氣味苦辛平入足太陽能行下焦祛風利濕羌活氣味苦辛甘平入足太陽善能行水陳橘皮氣味辛溫入手足太陰澤瀉氣味苦鹹平入足太陽此藥因濕熱浮腫本病在腎標病在肺致中滿氣急咳喘不得臥者非利濕行水不能效也送藥以生薑橘皮之辛通則在上之邪從汗而去在下之邪從溲而去也治脾元虛浮腫實脾散大附子一個草果乾薑各二兩甘草一兩大腹皮連皮六個木瓜一個去穰切片上用水於砂器內同煮至水存一半按五字宋本作一半以來四字劈開乾薑心內不白為度不得全令水乾恐近底焦取出銼焙為末每服二錢按宋本無服二錢三字空心日午用沸湯點服釋義此溫通之方也大附子氣味鹹辛大熱入手足少陰草果氣味辛溫入足太陰乾薑氣味辛溫入手足太陰甘草氣味甘平入足太陰大腹皮氣味苦辛溫入手足太陰能下氣利濕木瓜氣味酸平入手足太陰此脾元虛弱不能運濕致面浮足腫非辛溫通陽則脾陽不能振也治水氣羌活散羌活蘿蔔子各等分上同炒香熟去蘿蔔子不用末之溫酒調下二錢一日一服二日二服三日三服取效嘉興主簿張昌時傳方釋義羌活氣味辛甘平入足太陽善能行水蘿蔔子氣味苦辛溫入足太陰陽明善能導滯以酒送藥取其溫通也因水氣盤踞滯濁阻痹不行故行水之藥與行滯之藥兼而行之厥功大矣治四肢腫滿大棗湯白朮三兩㕮咀每服半兩水一盞半大棗三枚拍破同煎至九分去滓溫日三四服不拘時候釋義白朮氣味甘溫微苦入足太陰大棗氣味甘酸微溫入手少陰足太陰陽明四肢浮腫由乎中宮氣弱土衰不能運濕故用培土之藥得中焦氣旺脾胃不致失職自然腫消而病安矣治腫滿小便不利茯苓散郁李仁四錢檳榔二個赤茯苓白朮甘遂切片炒各一錢按宋本作各二錢橘皮一錢半上細末每服一錢薑棗湯調下不拘時候服釋義郁李仁氣味辛平而潤入手足太陰陽明檳榔氣味苦辛溫入足太陰太陽能消積氣赤茯苓氣味甘平淡滲入足陽明白朮氣味甘溫微苦入足太陰甘遂氣味苦寒入足太陽泄水之聖藥橘皮氣味苦辛微溫入手足太陰此因濕邪腫滿小溲不利故用分消群劑使水氣下泄惟恐土衰水不能去以術培土薑棗和榮衛則溺得通利豈有不奏績耶又方厚朴半兩牽牛子二兩炒研取末一兩按宋本作五兩炒取末上細末每服二錢不拘時候薑棗湯調下釋義厚朴氣味辛溫入足陽明太陰牽牛子氣味苦寒入手足陽明太陽善能行水此水腫脹滿小便不利以辛溫泄其表苦寒泄其里得小溲下行脹滿自減矣治遊風攻頭面或四肢作腫塊知母湯知母一兩麻黃黃耆甘草羌活白朮枳殼各半兩上粗末每服四錢水一盞半牛蒡子百粒研碎煎至七分溫日三四服覺冷不用牛蒡子釋義知母氣味苦寒入足陽明少陰麻黃氣味辛溫發散入足太陽黃耆氣味甘平入手足太陰甘草氣味甘平入足太陰羌活氣味辛甘平入足太陽白朮氣味甘溫微苦入足太陰枳殼氣味苦寒入足太陰牛蒡子氣味辛涼入手太陰此治遊風攻頭面或四肢作腫發塊致手足拘攣以甘平之品護其正以苦寒之藥熄其風以辛溫表散之藥泄其邪則邪散風熄正旺氣和而痊安矣有一達官其母年七十中風手足拘攣平日止是附子之類自養一日面浮腫手背亦腫尋常有一國醫供藥診云是水病欲下大戟牽牛以導之其家大驚憂惶召豫議之豫曰素問稱面腫曰風足脛腫曰水此服附子太過正虛風生熱之症咽必噎塞膈中不利誠如豫言按宋本無如豫二字乃進升麻牛蒡元參湯按宋本元參作團參繼以知母湯三日悉愈嘗見一醫書中論水蠱二病臍腹四肢悉腫者為水但腹脹四肢不甚腫者為蠱有中表一婦人患蠱病豫謂不可下當實脾不然之卒後入棺木腹與棺蓋平治蠱宜石中黃圓方缺按宋本無方缺二字腎臟風及足膝腰腿腳氣等疾治腎臟風攻注腳膝方連珠甘遂一兩木鱉子二個一雌一雄去殼上細末豶豬腰子二個批開藥末一錢摻勻濕紙裹數重慢火煨熟放溫五更初細嚼米飲下釋義連珠甘遂氣味苦寒入足太陽善能泄水木鱉子氣味甘溫微苦入足太陰豶豬腰子氣味鹹寒入足少陰且豬為北方水畜用其腎取其引藥入下也此腎臟風水攻注腳膝非苦寒導水及有毒之藥不能走入筋骨之間雖有似乎丹方然而功效最捷積水多則利多少則少也宜軟飯將息若患一腳切看左右如左腳用左邊腰子右用右邊者藥末止一錢壬子年間在毗陵有姓馬人鬻酒按宋本酒作油久不見因詢其親云宿患腎臟風今一足發腫如瓠自腰以下巨細通為一律痛不可忍臥欲轉側必兩人挾持方可動或者欲以鈹刃決之豫曰未可豫有藥當合以贈如上法服之辰巳間下膿如水晶者數升即時痛止腫退一月後尚拄拐而行豫再以赤烏散令塗貼其膝方愈後十年過毗陵率其子列拜以謝云向腳疾至今不復作雖積年腎臟風並已失去今健步自若矣按宋本自作不治腎臟風上攻下注按宋本注作疰生瘡並癬烏頭圓川烏二兩草烏一兩二味以黑豆半升煮透軟去皮臍切日乾天麻地龍去土稱白附子各半兩上為細末酒糊圓如梧子大每服二三十圓空心食前鹽酒鹽湯吞下釋義川烏氣味苦辛大熱入足太陽少陰草烏氣味苦辛大熱入足太陽少陰皆善能走經絡天麻氣味辛平入足陽明厥陰地龍氣味鹹寒入足陽明厥陰能入經絡皮膚白附子氣味辛甘大熱入足陽明鹽酒送藥令其入下也黑豆煮藥解藥毒也此腎臟風毒上攻下注生瘡癬者非大熱入絡之藥不能掃除其患也去風補血益氣壯筋骨強腳力虎骨酒虎脛骨真者萆薢仙靈脾薏苡仁牛膝熟地黃各二兩上細銼絹袋盛浸酒二斗七日後可用飲一盞再入一盞可得百日按十六字宋本作飲子一盞入一盞可得百日十一字婦人去牛膝釋義虎脛骨氣味辛溫入足厥陰萆薢氣味苦辛入足太陽仙靈脾氣味辛寒入手足陽明三焦命門薏苡仁氣味甘平淡滲入手足太陰牛膝氣味酸鹹平入足厥陰熟地黃氣味甘苦微寒入足少陰此酒祛風補血益氣壯筋強骨行走有力乃王道之品久服自有效驗也又方治腳腰疼痛攣急不得屈伸及腿膝冷麻虎骨酒虎骨一具及脛骨二莖用酥塗炙黃槌碎浸無灰酒三斗密封七日空心晚食溫之隨意飲釋義虎全骨氣味辛溫微咸虎脛骨氣味辛溫皆入足厥陰不用他藥獨以之浸酒者取其大能祛風強筋骨也治腳氣檳榔湯按此方宋本在虎骨酒第一方之下與總目不符檳榔末三錢按宋本作三錢匕生薑三片紫蘇葉七葉陳橘三枚上以水一大盞煎七分去滓稍熱服不拘時候釋義檳榔氣味辛溫能下氣入足太陰太陽生薑氣味辛溫入手足太陰紫蘇氣味辛溫入足太陽陳橘子氣味辛溫微酸入足厥陰腳氣疼痛不能履地者皆因風濕入絡氣血凝滯不得流行故以辛溫疏其經絡也少府監韓正彥暴得疾手足不舉諸醫以為風針灸臂腿不知痛孫兆作腳氣治與此藥乃愈益氣血補肝腎祛風濕壯腳膝地黃圓熟乾地黃一兩牛膝石斛各三分肉蓯蓉茵芋防風川芎五味子桂心附子薏苡仁各半兩上為末煉蜜圓如梧子大每服三四十圓酒吞下空心食前釋義熟乾地黃氣味甘苦微寒入足少陰牛膝氣味酸鹹平入足厥陰石斛氣味甘平微苦鹹入足太陰少陰肉蓯蓉氣味鹹溫入足少陰茵芋氣味苦辛溫入手足陽明防風氣味辛甘微溫入足太陽川芎氣味辛溫入足少陽厥陰五味子氣味酸鹹微溫入足少陰桂心氣味辛甘大熱入足厥陰附子氣味辛鹹大熱入手足少陰薏苡仁氣味甘平淡滲入手足太陰此補虛祛邪之方也虛而邪走下焦不能即愈者宜此緩治之治肝腎虛風氣弱按虛風宋本作風虛腳不可踐地腰脊疼痛風毒流注下部按宋本作流疰下經行止艱難小便餘瀝此藥補五臟內傷調中益精涼血堅強筋骨益智輕身耐寒按宋本作耐老思仙續斷圓思仙木五兩杜仲也五加皮防風薏苡仁羌活川續斷牛膝各三兩萆薢四兩生地黃五兩上細末好酒三升化青鹽三兩用大木瓜半斤去皮子以鹽酒煮木瓜成膏和杵圓如梧子大每服三四十圓空心食前溫酒鹽湯下膏子少益以酒糊釋義思仙木氣味甘平微溫入足少陰厥陰五加皮氣味辛溫入足陽明厥陰能逐瘀去傷防風氣味辛甘平入足太陽薏苡仁氣味甘平淡滲入手足太陰羌活氣味辛甘平入足太陽川續斷氣味苦辛微溫入足厥陰牛膝氣味酸鹹平入足厥陰萆薢氣味苦平入足太陽生地黃氣味苦甘微寒入手足少陰再以木瓜之酸平能入下好酒之辛溫能入絡及鹽之下行則下虛足痿者得補藥之養正風藥與利濕藥之祛除其病焉有不愈者哉治兩腳軟弱虛羸無力及小兒不能行續骨丹天麻明淨大者酒浸一夕白附子牛膝木鱉子各半兩烏頭一分炮川羌活半兩地龍去土稱一分滴乳真沒藥各二錢硃砂一錢另研按宋本無另研二字上為細末按宋本無為細末三字以生南星末一兩無灰酒煮糊如雞頭大硃砂為衣薄荷湯磨一粒食前服釋義天麻氣味辛平入足陽明厥陰白附子氣味辛甘大溫入足陽明牛膝氣味酸鹹平足厥陰木鱉子氣味甘溫微苦入足太陰烏頭氣味苦辛大熱入足太陽少陰羌活氣味辛甘平入足太陽地龍氣味鹹寒入足陽明厥陰乳香氣味辛溫入足少陰沒藥氣味苦平入足陽明硃砂氣味苦溫入手少陰南星氣味苦辛溫入手足太陰以酒圓薄荷湯送取其引藥入絡也此治虛羸無力兩腳軟弱及小兒不能行走者皆用辛通熱藥少佐以下行之品不欲其停留在上而任行於筋骨也治風氣積滯成腳氣常覺微腫發則或痛茵芋圓茵芋葉炒薏苡仁各半兩郁李一兩牽牛子三兩生取末一兩半上細末煉蜜圓如梧子大每服二十圓五更薑棗湯下未利加至三十圓日三快為度白粥補釋義茵芋氣味苦辛溫入手足陽明薏苡仁氣味甘平淡滲入手足太陰郁李仁氣味辛平入手足太陰陽明牽牛子氣味苦寒入手足陽明太陽最能行水利濕此因風氣積滯既久而成非行水下走之藥不能中病也治腰腳走注疼痛此是腳氣宜薏苡仁圓薏苡仁茵芋白芍藥牛膝川芎丹參防風獨活各半兩熟乾地黃桂心橘紅各一兩側子一枚上細末煉蜜圓如梧子大每服三四十圓酒下食前日三服木瓜湯下亦得釋義薏苡仁氣味甘平淡滲入手足太陰茵芋氣味苦辛溫入手足陽明白芍藥氣味酸微寒入足厥陰牛膝氣味鹹酸平入足厥陰川芎氣味辛溫入足少陽厥陰丹參氣味苦微寒入手少陰防風氣味辛甘微溫入足太陽獨活氣味辛甘平入足少陰熟地黃氣味甘苦微寒入足少陰桂心氣味辛甘大熱入足厥陰橘紅氣味苦辛微溫入手足太陰側子氣味苦辛鹹大熱入足太陽少陰之經腳氣疼痛腰腳走注痛不可忍者以血藥養其經絡而以風藥辛熱滲濕之味搜剔其邪病自祛矣今人謂之腳氣者黃帝所謂緩風濕痹也千金方云頑弱名緩風疼痛為濕痹大抵此疾不可以三五服便效須久服得力唐張文仲云風有一百二十四種氣有八十種唯腳氣頭風上氣常須服藥不絶自余則隨其發動臨時消息但有風氣之人春未夏初及秋暮得通泄則不困劇所謂通泄者如麻黃牽牛郁李仁之類是已不必苦駃利藥也治腎虛腰痛鹿茸圓鹿茸不拘多少切作片子酥炙黃末之酒糊圓如梧子大空心食前鹽湯下三五十圓釋義鹿茸氣味甘溫入足太陽少陰能通補督脈下焦腎虛以致腰疼不已只用一味者取其專走入腎酒和圓鹽湯送欲其下行兼通足太陽也治腰腿痛氣滯藥棋子牽牛不拘多少用新瓦入文煿得通赤便以牽牛頓在瓦上自然一半生一半熟不得撥動取末一兩入細研硫黃一分同研勻分三分每用白麵一匙水和擀開切作棋子五更初以水一盞煮熟連湯溫送下住即巳未住隔日再作豫嘗有此疾每發止一服痛止巢氏病源曰腿腰痛者或墮傷腰是以痛釋義牽牛氣味苦寒入手足陽明太陽半生半熟用者不欲其行之速也研入硫黃和以白麵者欲藥入經絡行至痛楚處也跌撲墮傷腰痛亦有用之而愈者
